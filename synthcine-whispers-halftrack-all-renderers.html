<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SYNTHCINE · Halftrack render laboratory</title>
<style>
:root{
  --paper:#f4f4f0; --card:#ffffff; --line:#111111; --ink:#111111; --dim:#8a8a86;
  --a:#0033cc; --b:#c8a800; --c:#e60000; --bw:2px;
}
*{box-sizing:border-box;margin:0;padding:0;border-radius:0!important}
html,body{height:100%}
body{background:var(--paper);color:var(--ink);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ---- header: one hairline, a mark, a scene switch, nothing else ---- */
header{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:var(--bw) solid var(--line)}
header .mark{width:11px;height:11px;flex:none;
  background:radial-gradient(circle 1.6px at 2.5px 2.5px,var(--ink) 98%,transparent),
             radial-gradient(circle 1.6px at 8.5px 2.5px,var(--ink) 98%,transparent),
             radial-gradient(circle 1.6px at 2.5px 8.5px,var(--ink) 98%,transparent),
             radial-gradient(circle 1.6px at 8.5px 8.5px,var(--ink) 98%,transparent)}
header h1{font-size:11px;font-weight:900;letter-spacing:.30em;text-transform:uppercase}
.scene-switch{margin-left:auto;display:flex;border:var(--bw) solid var(--line)}
.scene-switch button{appearance:none;border:0;background:var(--card);color:var(--ink);
  font:900 10px/1 Helvetica,Arial;letter-spacing:.16em;padding:7px 13px;cursor:pointer}
.scene-switch button+button{border-left:var(--bw) solid var(--line)}
.scene-switch button.on{background:var(--ink);color:var(--paper)}
header .keybtn{appearance:none;border:var(--bw) solid var(--line);background:var(--card);color:var(--ink);
  font:900 10px/1 Helvetica,Arial;letter-spacing:.14em;padding:7px 11px;cursor:pointer}
header .keybtn.set{border-color:var(--a);color:var(--a)}
#renderBtn{min-width:72px}
body[data-render="grid"] #renderBtn,body[data-render="mesh"] #renderBtn{background:var(--ink);color:var(--paper)}

/* ---- stage ---- */
#stage{flex:1;min-height:0;position:relative;background:var(--paper);padding:10px;overflow:hidden}
#grid{height:100%;display:grid;gap:10px;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
  transition:opacity .3s}
.tile{position:relative;background:#fff;overflow:hidden;cursor:pointer;border:var(--bw) solid var(--line);display:flex}
.tile canvas{width:100%;height:100%;display:block}
.tile .name{position:absolute;left:0;top:0;font:900 9px/1 Helvetica,Arial;letter-spacing:.16em;
  padding:5px 8px;pointer-events:none;color:var(--ink);mix-blend-mode:multiply}
.tile .mood{position:absolute;left:8px;bottom:8px;right:8px;pointer-events:none;display:flex;align-items:center;gap:6px}
.tile .mood i{font:900 8px/1 Helvetica,Arial;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);flex:none;font-style:normal}
.tile .mood u{flex:1;height:3px;background:#ddd;text-decoration:none;display:block}
.tile .mood u b{display:block;height:100%;background:var(--c);width:0}
.tile.think .think-dot{opacity:1}
.tile .think-dot{position:absolute;right:8px;top:8px;width:7px;height:7px;background:var(--a);opacity:0;
  animation:pulse 1s infinite ease-in-out;pointer-events:none}
@keyframes pulse{0%,100%{transform:scale(.6);opacity:.35}50%{transform:scale(1);opacity:1}}
.tile.sel{border-color:var(--a);border-width:3px}
.tile.speaking{border-color:var(--c);border-width:3px}
.ring{position:absolute;left:50%;top:44%;width:18px;height:18px;margin:-9px 0 0 -9px;border:3px solid var(--a);
  pointer-events:none;animation:ringout 1.25s ease-out forwards}
.ring.echo{border-color:var(--b)}
@keyframes ringout{from{transform:scale(1);opacity:.9}to{transform:scale(15);opacity:0}}

/* the YOU tile carries a single camera control */
.tile.you .youtools{position:absolute;right:6px;top:6px;display:flex;gap:4px;z-index:3}
.tile.you .youtools button{appearance:none;border:2px solid var(--line);background:#fff;color:var(--ink);
  font:900 9px/1 Helvetica,Arial;letter-spacing:.1em;padding:5px 8px;cursor:pointer;min-width:44px}
.tile.you .youtools button.on{background:var(--a);border-color:var(--a);color:#fff}
.tile.driven{border-color:var(--a);border-width:3px}

/* ---- focus: go closer ---- */
#focus{position:absolute;inset:10px;background:var(--paper);border:3px solid var(--line);
  display:none;flex-direction:column;z-index:20}
#focus.open{display:flex}
#focus .fclose{position:absolute;right:10px;top:10px;z-index:4;appearance:none;border:2px solid var(--line);
  background:#fff;font:900 10px Helvetica;letter-spacing:.14em;padding:7px 11px;cursor:pointer}
#focusStage{flex:1;min-height:0;display:grid;grid-template-columns:1.4fr 1fr;gap:0}
#focusCanvasWrap{position:relative;background:#fff;border-right:3px solid var(--line);overflow:hidden}
#focusCanvas{width:100%;height:100%;display:block}
#focusSide{display:flex;flex-direction:column;min-height:0}
#focusHead{padding:14px 16px 10px;border-bottom:2px solid var(--line)}
#focusHead .fn{font:900 15px/1 Helvetica;letter-spacing:.18em}
#focusHead .fd{font:400 11px/1.5 Helvetica;color:var(--dim);margin-top:6px}
#focusHead .fm{font:900 9px/1 Helvetica;letter-spacing:.14em;margin-top:8px;text-transform:uppercase}
#focusCtl{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
#focusCtl button{appearance:none;border:2px solid var(--line);background:var(--card);color:var(--ink);
  font:900 9px/1 Helvetica;letter-spacing:.12em;padding:7px 11px;cursor:pointer}
#focusCtl button.on{background:var(--a);border-color:var(--a);color:#fff}
#focusCtl #recenter{display:none}
#focusCtl.live #recenter{display:inline-block}
#camStat{font:700 9px Helvetica;letter-spacing:.06em;color:var(--dim)}
#poseBar{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;max-height:96px;overflow-y:auto;padding-right:4px}
#poseBar button{appearance:none;border:1.5px solid #bbb;background:var(--card);color:var(--ink);
  font:700 8px/1 Helvetica;letter-spacing:.06em;padding:5px 7px;cursor:pointer;text-transform:uppercase}
#poseBar button:hover{border-color:var(--line)}
#poseBar button.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}
#focusCtl #audition.on{background:var(--c);border-color:var(--c);color:#fff}
#thread{flex:1;min-height:0;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:9px}
.msg{max-width:92%;font:400 12px/1.5 Helvetica}
.msg .r{font:900 8px/1 Helvetica;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:3px}
.msg.them{align-self:flex-start}
.msg.them .bub{border-left:3px solid var(--ink);padding-left:9px}
.msg.you{align-self:flex-end;text-align:right}
.msg.you .bub{border-right:3px solid var(--a);padding-right:9px;color:var(--a)}
.msg.thought{align-self:flex-start;opacity:.72}
.msg.thought .bub{font-style:italic;color:#555}
.msg.thought .r{color:var(--a)}

/* ---- console: one field, one toggle ---- */
#console{display:flex;align-items:stretch;border-top:var(--bw) solid var(--line);background:var(--card)}
#mode{flex:none;display:flex;border-right:2px solid var(--line)}
#mode button{appearance:none;border:0;background:var(--card);color:var(--dim);
  font:900 10px/1 Helvetica;letter-spacing:.12em;padding:0 15px;cursor:pointer}
#mode button.on{color:var(--paper)}
#mode button[data-m="whisper"].on{background:var(--a)}
#mode button[data-m="speak"].on{background:var(--ink)}
#line{flex:1;min-width:0;appearance:none;border:0;background:var(--card);color:var(--ink);
  font:700 13px Helvetica;padding:13px 14px;outline:none}
#line:focus-visible{outline:2px solid var(--b);outline-offset:-2px}
#send{appearance:none;border:0;border-left:2px solid var(--line);background:var(--card);color:var(--ink);
  font:900 10px/1 Helvetica;letter-spacing:.14em;padding:0 18px;cursor:pointer}
#send:hover{background:var(--ink);color:var(--paper)}
#send:disabled{color:var(--dim)}
#hint{position:absolute;left:0;right:0;bottom:100%;padding:5px 16px;font:700 9px Helvetica;letter-spacing:.04em;
  color:var(--dim);background:var(--paper);border-top:1px solid #ddd;pointer-events:none}

/* ---- key sheet ---- */
#keySheet{position:fixed;inset:0;background:rgba(20,20,18,.55);display:none;align-items:center;justify-content:center;z-index:40}
#keySheet.open{display:flex}
#keyCard{background:var(--card);border:3px solid var(--line);width:min(440px,92vw);padding:22px}
#keyCard h2{font:900 12px/1 Helvetica;letter-spacing:.16em;text-transform:uppercase}
#keyCard p{font:400 11px/1.6 Helvetica;color:var(--dim);margin:10px 0 14px}
#keyCard input{width:100%;appearance:none;border:2px solid var(--line);background:var(--paper);
  font:700 12px Helvetica;padding:11px 12px;outline:none}
#keyCard input:focus-visible{outline:2px solid var(--b);outline-offset:-2px}
#keyCard .row{display:flex;gap:8px;margin-top:14px}
#keyCard button{flex:1;appearance:none;border:2px solid var(--line);background:var(--card);
  font:900 10px Helvetica;letter-spacing:.14em;padding:11px;cursor:pointer}
#keyCard button.prime{background:var(--ink);color:var(--paper)}
#keyStatus{font:700 10px Helvetica;margin-top:10px;min-height:14px}
#keyStatus.err{color:var(--c)}

#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--c);color:#fff;
  border:3px solid #000;font:900 10px Helvetica;letter-spacing:.1em;padding:8px 14px;display:none;z-index:50}
#toast.on{display:block}

@media(max-width:820px){
  header{gap:7px;padding:8px 9px}
  header h1{font-size:10px;letter-spacing:.2em}
  .scene-switch button{padding:7px 9px;letter-spacing:.08em}
  header .keybtn{padding:7px 8px;letter-spacing:.08em}
  #grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr)}
  #focusStage{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  #focusCanvasWrap{border-right:0;border-bottom:3px solid var(--line)}
}
</style>
</head>
<body>
<header>
  <div class="mark" aria-hidden="true"></div>
  <h1>Synthcine</h1>
  <div class="scene-switch" id="sceneSwitch">
    <button data-scene="call" class="on">The Call</button>
    <button data-scene="train">The Train</button>
  </div>
  <button class="keybtn" id="renderBtn" title="Cycle Halftrack rendering pipeline" aria-label="Rendering pipeline: Sheet">SHEET</button>
  <button class="keybtn" id="keyBtn">API KEY</button>
</header>

<div id="stage">
  <div id="grid"></div>

  <div id="focus">
    <button class="fclose" id="fclose">CLOSE</button>
    <div id="focusStage">
      <div id="focusCanvasWrap"><canvas id="focusCanvas"></canvas></div>
      <div id="focusSide">
        <div id="focusHead">
          <div class="fn" id="focusName">—</div>
          <div class="fd" id="focusDesc"></div>
          <div class="fm" id="focusMood"></div>
          <div id="focusCtl">
            <button id="playAs">PLAY AS</button>
            <button id="recenter">RECENTER</button>
            <button id="audition">AUDITION</button>
            <span id="camStat"></span>
          </div>
          <div id="poseBar"></div>
        </div>
        <div id="thread"></div>
      </div>
    </div>
  </div>
</div>

<div id="console" style="position:relative">
  <div id="hint">Whisper reaches only their thoughts — it bends what they think next, and ripples to whoever's beside them.</div>
  <div id="mode">
    <button data-m="whisper" class="on">WHISPER</button>
    <button data-m="speak">SPEAK</button>
  </div>
  <input id="line" type="text" placeholder="whisper into their thoughts…" autocomplete="off">
  <button id="send">SEND</button>
</div>

<div id="keySheet">
  <div id="keyCard">
    <h2>OpenAI API key</h2>
    <p>Optional. Paste a key to voice the cast with OpenAI. Left empty, everything still runs on the built-in model. Kept in this browser only.</p>
    <input id="keyInput" type="password" placeholder="sk-…" autocomplete="off">
    <div id="keyStatus"></div>
    <div class="row">
      <button id="keyClear">USE BUILT-IN</button>
      <button id="keySave" class="prime">SAVE KEY</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
"use strict";
/* Load MediaPipe only when the camera is requested. The room and avatars
   render normally from a local file even when the CDN is unavailable. */
let FilesetResolver=null,PoseLandmarker=null,HandLandmarker=null,FaceLandmarker=null;
let halftrackVisionPromise=null;
async function ensureHalftrackVision(){
  if(FilesetResolver&&PoseLandmarker&&HandLandmarker&&FaceLandmarker)return true;
  if(!halftrackVisionPromise){
    halftrackVisionPromise=import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14")
      .then(m=>{
        FilesetResolver=m.FilesetResolver;PoseLandmarker=m.PoseLandmarker;
        HandLandmarker=m.HandLandmarker;FaceLandmarker=m.FaceLandmarker;
        return true;
      })
      .catch(err=>{halftrackVisionPromise=null;console.error("Halftrack vision module could not load",err);throw err;});
  }
  return halftrackVisionPromise;
}
/* ============================================================
   SYNTHCINE — a room to think in · all Halftrack renderers
   One ideal halftone head, cast by tone/hair/glasses.
   RIPPLES affect engine drives idle performance.
   Whisper perturbs interior monologue; ripples to neighbours.
   Focus a face to go closer and converse.
   A sixth angle is YOU — the same rig, driven live by your camera
   through a face mesh — that the cast can glance toward.
   ============================================================ */
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const clamp01=x=>clamp(x,0,1);
const smooth=t=>{t=clamp(t,0,1);return t*t*(3-2*t)};
const lerp=(a,b,t)=>a+(b-a)*t;
const pulse=(u,w)=>{if(u<0||u>w)return 0;return Math.sin(u/w*Math.PI);};
const wall=()=>performance.now()/1000;
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const gray=v=>{v=clamp(Math.round(v),0,255);return`rgb(${v},${v},${v})`;};
const ink2gray=v=>gray(Math.round(255-v*255/7));
const inkQ=v=>ink2gray(clamp(Math.round((255-v)/255*7),0,7));

/* ---------------- cast ---------------- */
const YOU="YOU";
const CALL_CAST=["NAT","CHRIS","SAMANTHA","ERNIE","PHIL"];
const TRAIN_CAST=["BARBARA","KIM","DANIEL","FRIEDRICH","SUSANNA"];

const CHAR={
  NAT:{label:"NAT",accent:"#2f7fd6",pitch:1.15,adj:["CHRIS","ERNIE"],style:"long",skinInk:1,hairTone:78,attire:126,attire2:180,glasses:0,toneB:1,tic:"reorganize",
    desc:"Capable, warm, over-scheduled. Just spun her chair mid-sentence.",
    dossier:"Nat owns the onboarding plan and her review with Phil is minutes away. Three monitors, cold coffee, a to-do list she rewrites instead of finishing. Apologizes fast, recovers faster."},
  CHRIS:{label:"CHRIS",accent:"#b39400",pitch:0.82,adj:["NAT","SAMANTHA","PHIL"],style:"shaved",skinInk:4,hairTone:70,attire:62,attire2:88,glasses:0,toneB:.55,tic:"press-lips",
    desc:"Practical, direct, dry. Won't reschedule the client meeting again.",
    dossier:"Chris carries the client meeting rescheduled three times. Distrusts optimism with no calendar attached. Liked Nat's chair spin more than he'll admit."},
  SAMANTHA:{label:"SAMANTHA",accent:"#2f9f5a",pitch:1.1,adj:["CHRIS","PHIL"],style:"bob",skinInk:2,hairTone:64,attire:104,attire2:150,glasses:0,toneB:.88,tic:"soft-nod",
    desc:"Perceptive, warm, lightly skeptical. Sees everyone.",
    dossier:"Samantha notices everything — the spin, the swallowed laughs, the tie Phil straightens before bad news. Keeps a private tally of who is actually okay."},
  ERNIE:{label:"ERNIE",accent:"#c23a3a",pitch:1.0,adj:["NAT","PHIL"],style:"curly",skinInk:3,hairTone:56,attire:148,attire2:120,glasses:0,toneB:.72,tic:"lean-forward",
    desc:"Energetic, candid, solution-first. Treats silence as a slot.",
    dossier:"Ernie wants the new team onboarded pronto. A wall of vinyl he never plays during work. Asks if people are okay and means it."},
  PHIL:{label:"PHIL",accent:"#111111",pitch:0.72,adj:["ERNIE","CHRIS"],style:"exec",skinInk:1,hairTone:150,attire:42,attire2:242,glasses:1,toneB:1,tic:"tie-straighten",
    desc:"Polished executive. Deliberate, controlled, quietly consequential.",
    dossier:"Phil is conducting Nat's review. Read the report twice, one page of notes he won't fully use. Straightens his tie before saying something that matters."},

  BARBARA:{label:"BARBARA",accent:"#2f7fd6",pitch:1.05,adj:["FRIEDRICH","SUSANNA"],style:"bob",skinInk:2,hairTone:70,attire:120,attire2:170,glasses:0,toneB:.9,tic:"store-detail",
    desc:"Thirty-six, project manager, returning to Berlin. Holding a folder she won't reopen.",
    dossier:"Two days in Munich; a specialist confirmed her daughter Lena's diagnosis and offered no new path. She read the assessment once in the corridor and hasn't opened it since. She stores small details of Lena with unusual precision and treats the most important thing in her life as a logistics problem, knowing that isn't adequate. Tomorrow is at nine."},
  KIM:{label:"KIM",accent:"#2f9f5a",pitch:1.12,adj:["SUSANNA","DANIEL"],style:"long",skinInk:1,hairTone:40,attire:104,attire2:150,glasses:0,toneB:.95,tic:"look-away",
    desc:"Mid-twenties, Munich-raised, political-science MA. Moved seats away from Daniel.",
    dossier:"She applied to a Cambridge fellowship in November, was accepted in February, and told Daniel this weekend. He said: you had already decided — not just about Cambridge, about us. She didn't answer. She is going to Cambridge; she's not yet sure what else is settled. She moved one row up and across the aisle and has not looked back."},
  DANIEL:{label:"DANIEL",accent:"#b39400",pitch:0.88,adj:["KIM","FRIEDRICH"],style:"shaved",skinInk:3,hairTone:56,attire:62,attire2:100,glasses:0,toneB:.7,tic:"rehearse",
    desc:"Late twenties, studies the Stasi's institutional periphery. Two rows behind Kim.",
    dossier:"In January he sat on a research offer for three weeks without telling Kim; she found out from a friend. This weekend she told him about Cambridge and he heard himself using her own sentence back at her. He can generate explanations for why she didn't tell him — the same explanations he used in January. He studies processing other people's lives at procedural distance and does not see it about himself. He can see the back of her head."},
  FRIEDRICH:{label:"FRIEDRICH",accent:"#6a6a66",pitch:0.72,adj:["DANIEL","BARBARA"],style:"exec",skinInk:1,hairTone:180,attire:52,attire2:120,glasses:1,toneB:1,tic:"listen-still",
    desc:"Early seventies, former Stasi signals analyst. Watching a man who passed through the carriage.",
    dossier:"Twenty-six years intercepting and transcribing in Halle. A man in a heavy coat passed through and paused near his row; Friedrich knows the voice of a teacher he monitored 1979–82 (Thomas Reusch, 263 calls) but not his face at seventy. He has twice typed the name into a search bar and closed the window before it loaded. Memory manufactures patterns; he is not persuaded by this. He's traveling to see his granddaughter Klara."},
  SUSANNA:{label:"SUSANNA",accent:"#c23a3a",pitch:1.0,adj:["KIM","BARBARA"],style:"bob",skinInk:2,hairTone:150,attire:130,attire2:200,glasses:0,toneB:.92,tic:"steady-breath",
    desc:"Sixty-one, head pediatric nurse at the Charité, returning home. One small bag.",
    dossier:"Thirty-five years nursing; widowed since 2017 and living alone since. Tomorrow at nine she'll be in a specialist consultation for a child on her ward — the mother is somewhere on this train and Susanna doesn't know it. She is good at being present when something terrible is happening and less practiced at her own life, and considers it a reasonable trade. She hopes the plants at home had enough water."},

  YOU:{label:"YOU",accent:"#111111",pitch:1.0,adj:[],style:"shaved",skinInk:1,hairTone:64,attire:96,attire2:140,glasses:0,toneB:.85,tic:"soft-nod",
    desc:"You — the angle they can watch. Halftrack drives face, body, hands, and stance live.",
    dossier:"The viewer, present in the scene."}
};

/* baseline affect per character */
const AFF0={
  NAT:["nervous",.34],CHRIS:["guarded",.26],SAMANTHA:["calm",.24],ERNIE:["hopeful",.30],PHIL:["guarded",.30],
  BARBARA:["guarded",.42],KIM:["guarded",.34],DANIEL:["nervous",.36],FRIEDRICH:["guarded",.30],SUSANNA:["calm",.26],
  YOU:["calm",.20]
};
const AFF={};
for(const n of Object.keys(CHAR))AFF[n]={emotion:AFF0[n][0],intensity:AFF0[n][1],baseE:AFF0[n][0],baseI:AFF0[n][1]};

/* ---------------- parametric bodies + Halftrack performance frame ----------------
   The same cast identity is preserved, but every character now carries a full
   Halftrack-compatible body: shoulders, arms, hands, hips, legs, head carriage,
   breath, sway, and bounded face proportions. */
function mkBody(o){return Object.assign({
  shW:1.0, slope:1.0, neckW:1.0, neckL:1.0, headS:1.0, asym:0,
  breathAmp:1.0, breathRate:0.9, swayAmp:1.0, faceW:1.0, faceH:1.0, jaw:1.0
},o);}
const BODY={
  NAT:mkBody({shW:.86,slope:1.25,neckW:.82,neckL:1.10,headS:.96,asym:.6,breathAmp:1.15,breathRate:1.05,faceW:.93,faceH:1.04,jaw:.92}),
  CHRIS:mkBody({shW:1.14,slope:.80,neckW:1.15,neckL:.90,headS:1.02,asym:0,breathAmp:.80,breathRate:.75,faceW:1.06,faceH:.99,jaw:1.10}),
  SAMANTHA:mkBody({shW:.92,slope:1.10,neckW:.90,neckL:1.00,headS:.98,asym:-.8,breathAmp:1.0,breathRate:.95,faceW:.99,faceH:.95,jaw:.96}),
  ERNIE:mkBody({shW:1.05,slope:.90,neckW:1.05,neckL:.85,headS:1.0,asym:1.0,breathAmp:1.35,breathRate:1.25,faceW:1.03,faceH:.95,jaw:1.06}),

const LEX={
  calm:["calm","steady","quiet","settled","rest","ease","still","soft","gentle","breathe","home","water"],
  nervous:["nervous","worry","worried","fear","panic","danger","unsafe","hurry","rush","tense","alarm","dread","deadline","late","nine"],

  guarded:["careful","guarded","private","contained","watch","measured","control","folder"]

function hits(t,kw){const e=kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");const m=t.match(new RegExp("\\b"+e+"\\b","g"));return m?m.length:0;}
function computeSignal(kind,text){
  const t=String(text||"").toLowerCase().replace(/\s+/g," ").trim();
  let best="guarded",score=0;
  for(const[emo,ws]of Object.entries(LEX)){const s=ws.reduce((a,w)=>a+hits(t,w),0);if(s>score){best=emo;score=s;}}
  if(!score)best=/!|\b(now|must|stop|run|don't|dont)\b/.test(t)?"nervous":"guarded";
  const punch=Math.min(.10,(t.match(/[!?]/g)||[]).length*.015);
  const brief=t&&t.length<28?.05:0;
  const base=kind==="WHISPER"?DYN.whisperBase:DYN.listenBase;
  return{emotion:best,intensity:Math.max(.08,clamp01(base+Math.min(.22,score*.04)+punch+brief))};
}
function applySignal(id,sig,scale){
  const s=AFF[id];if(!s)return;
  const inf=clamp01(sig.intensity*Math.max(0,scale));if(!inf)return;
  if(s.emotion===sig.emotion){s.intensity=clamp01(s.intensity+inf*.55);return;}
  if(inf>=Math.max(.14,s.intensity*.75)){s.emotion=sig.emotion;s.intensity=clamp01(s.intensity*.45+inf);return;}
  s.intensity=clamp01(s.intensity*.92+inf*.18);
}
function stabilize(){for(const s of Object.values(AFF)){
  s.intensity=clamp01(Math.max(.05,s.intensity+(s.baseI-s.intensity)*DYN.recovery));
  if(s.intensity<=Math.max(.18,s.baseI+.04))s.emotion=s.baseE;}}
function ripple(sourceId,kind,whisperText,thoughtText){
  const sig=computeSignal(kind,kind==="WHISPER"?(whisperText||thoughtText):(thoughtText||whisperText));
  applySignal(sourceId,sig,kind==="WHISPER"?DYN.directWhisper:DYN.directThought);
  for(const adj of(CHAR[sourceId].adj||[]))if(active().includes(adj))applySignal(adj,sig,DYN.sharedRipple);
  stabilize();renderMoods();
}

  if(!EMOTIONS.includes(emotion))return;

}

/* ---------------- viseme + cue compilers ---------------- */
function visemeSchedule(text,dur){
  const groups=[];const words=text.split(/\s+/);
  for(const w of words){
    const core=w.replace(/[^A-Za-z’']/g,'').toLowerCase();let i=0,pc=false;
    while(i<core.length){const ch=core[i];
      if('aeiou'.includes(ch)){const m={a:[1,.95],e:[2,.55],i:[2,.5],o:[3,.85],u:[3,.6]};groups.push({s:m[ch][0],o:m[ch][1],w:1});pc=false;}
      else if('mbp'.includes(ch)){groups.push({s:4,o:0,w:.7});pc=false;}
      else if('fv'.includes(ch)){groups.push({s:5,o:.15,w:.7});pc=false;}
      else{if(!pc)groups.push({s:2,o:.22,w:.6});pc=true;}i++;}
    if(/[.,!?…]|\.\.\./.test(w))groups.push({s:0,o:0,w:1.2});else groups.push({s:0,o:.05,w:.25});}
  if(!groups.length)groups.push({s:0,o:0,w:1});
  const tot=groups.reduce((a,g)=>a+g.w,0);const sched=[];let t=0;
  for(const g of groups){const gd=dur*g.w/tot;sched.push({t0:t,t1:t+gd,s:g.s,o:g.o});t+=gd;}return sched;
}
function visemeAt(sched,u){
  for(let i=0;i<sched.length;i++){const g=sched[i];
    if(u>=g.t0&&u<g.t1){const f=(u-g.t0)/(g.t1-g.t0);const nx=sched[i+1]||g;
      const o=f>.7?lerp(g.o,nx.o,(f-.7)/.3):g.o;return{s:g.s,o};}}return{s:0,o:0};
}
function wordFrac(text,word){
  const cl=s=>s.toLowerCase().replace(/[^a-z0-9’']/g,'');
  const tg=cl(word.split('-')[0]);const ws=text.split(/\s+/);
  let acc=0,hit=-1;const ln=ws.map(w=>w.length+1);const tot=ln.reduce((a,b)=>a+b,0);
  for(let i=0;i<ws.length;i++){if(hit<0&&cl(ws[i]).startsWith(tg)&&tg)hit=acc;acc+=ln[i];}
  if(word==='end')return .9;return hit<0?.5:clamp(hit/tot,0,.95);
}

 'eyebrow-one','squint','eyes-wide','small-smile','wide-smile','sympathetic-smile','lips-press-tail',

function parseMotion(m,text){
  const toks=String(m||"").split(';').map(s=>s.trim()).filter(Boolean);
  return toks.map((tok,i)=>{let name=tok,at=null;const a=name.indexOf('@');

}

/* ---- living-head carriage: critically-damped spring, per character ---- */
function updateHeadCarriage(rig,p,dt,now,captureOwned){
  const P=CARRIAGE[rig.name]||CARRIAGE.DEFAULT;
  const h=clamp(Number.isFinite(dt)?dt:1/60,1/240,1/24);
  const seed=Number.isFinite(rig.seed)?rig.seed:0;
  let st=rig._carriage;
  if(!st||!Number.isFinite(st.x)||now-st.lastTime>.2||now<st.lastTime){
    st=rig._carriage={x:0,y:0,vx:0,vy:0,yaw:p.yaw||0,yv:0,bx:p.captureBodyX||0,by:p.captureBodyY||0,lastTime:now};
  }
  const speech=clamp((p.mouthO||0)*.6,0,1);
  const reaction=clamp(Math.max(p.eyeWide||0,(p.browY||0)*.75,(p.shrug||0)*.55),0,1);
  const autonomy=captureOwned?.28:1;
  const idleX=P.idle*autonomy*(Math.sin(now*.58+seed*1.71)*.105+Math.sin(now*1.37+seed*2.43)*.032);
  const idleY=P.idle*autonomy*(Math.sin(now*.73+seed*1.19)*.047+Math.sin(now*1.91+seed*.83)*.014);
  const speechSway=autonomy*speech*Math.sin(now*2.75+seed)*.042;
  const speechBob=autonomy*speech*(-.028+Math.sin(now*3.15+seed*.7)*.019);
  const gazeLeanX=clamp(p.gazeX||0,-1,1)*.025, gazeLeanY=clamp(p.gazeY||0,-1,1)*.016;
  const bx=p.captureBodyX||0, by=p.captureBodyY||0;
  const inX=clamp(-((bx-st.bx)/h)*.0105,-.075,.075), inY=clamp(-((by-st.by)/h)*.008,-.06,.06);
  const capX=captureOwned?clamp(p.captureHeadX||0,-1.3,1.3)*.76:0;
  const capY=captureOwned?clamp(p.captureHeadY||0,-1.3,1.3)*.72:0;
  const tX=clamp(capX+idleX+speechSway+gazeLeanX+inX,-P.maxX,P.maxX);
  const tY=clamp(capY+idleY+speechBob+gazeLeanY-reaction*autonomy*.018+inY,-P.maxY,P.maxY);
  const spring=(v,vel,tgt,k,d)=>{vel+=((tgt-v)*k-vel*d)*h;v+=vel*h;return[v,vel];};
  [st.x,st.vx]=spring(st.x,st.vx,tX,P.stiff,P.damp);
  [st.y,st.vy]=spring(st.y,st.vy,tY,P.stiff*.94,P.damp*1.03);

class Rig{
  constructor(name){
    this.name=name;this.pose=mkPose();
    this.blinkT=-2;this.nextBlink=2+Math.random()*3;
    this.gazeGoal={x:0,y:0};this.gazeT=0;this.seed=Math.random()*10;
    this.perf=null;this.think=null;this.ticT=4+Math.random()*8;
    this.lastEmo=AFF[name].emotion;this.onset=null;
  }
  perform(text,{cues="",thought=false}={}){
    const words=text.trim().split(/\s+/).filter(Boolean).length||1;
    const d=thought?clamp(words*.34,3,13):clamp(words*.42,1.2,14);
    this.perf={t0:wall(),d,text,thought,sched:thought?null:visemeSchedule(text,d),cues:parseMotion(cues,text)};
    return this.perf;
  }
  startThinking(){this.think={t0:wall()};}      /* pre-generation "gathering a thought" */
  setPose(name,d){if(!POSES[name])return;this.poseHold={name,t0:wall(),d:d==null?2.6:d};}
  clearPose(){this.poseHold=null;}
  poseActive(now){const h=this.poseHold;if(!h)return null;
    if(h.d!==Infinity&&now-h.t0>h.d+.45){this.poseHold=null;return null;}return h;}
  stopThinking(){this.think=null;}
  performing(now){return(this.perf&&now-this.perf.t0<this.perf.d)?this.perf:null;}

  eval(dt,now,gazeTarget){
    const p=this.pose,tgt=mkPose();

    const C=CHAR[this.name];

    /* detect emotion onset -> queue a reaction gesture */
    if(A.emotion!==this.lastEmo){this.onset={t0:now,list:EMO_ONSET[A.emotion]||[]};this.lastEmo=A.emotion;}

    /* breathing / posture / sway — per-character body dials */
    const BD=BODY[this.name]||BODY.NAT;

    tgt.postX=Math.sin(now*.14+this.seed*2)*1.6*BD.swayAmp;
    tgt.leanY=Math.sin(now*.8+this.seed)*.5+(AP.leanY||0)*k*1.4;
    tgt.roll=Math.sin(now*.3+this.seed)*.015;

    /* affect register */
    tgt.smile=(AP.smile||0)*k;
    tgt.browKnit=(AP.browKnit||0)*k;
    tgt.browY=(AP.browY||0)*k;
    tgt.eyeWide=(AP.eyeWide||0)*k;
    tgt.squint=(AP.squint||0)*k;
    tgt.lean=(AP.lean||0)*k;
    tgt.bounce=(AP.bounce||0)*Math.sin(now*2.6+this.seed)*.35+(AP.jitter||0)*k*Math.sin(now*9.3+this.seed)*.45;

    /* LIVE CAPTURE layer — a real camera drives this exact rig.
       When present, it overrides idle/affect so YOU performs the way
       Nat or Phil do, through the same mesh + body. */
    const D=this.drive;
    const driven=!!(D&&D.on);

    const P=this.performing(now);
    const thinking=this.think&&!P&&!driven;
    if(thinking){
      const u=now-this.think.t0;
      tgt.think=smooth(clamp(u/.5,0,1));
      tgt.gazeY=-.35-.12*Math.sin(u*.7);          /* eyes up, searching */
      tgt.gazeX=.4*Math.sin(u*.5+this.seed);

      tgt.captureHeadX=clamp(D.headX||0,-1.3,1.3);
      tgt.captureHeadY=clamp(D.headY||0,-1.3,1.3);
      tgt.captureBodyX=clamp(D.bodyX!=null?D.bodyX:(D.headX||0)*.35,-1,1);
      tgt.captureBodyY=clamp(D.bodyY!=null?D.bodyY:(D.headY||0)*.25,-1,1);
      tgt.captureShoulderTilt=clamp(D.shoulderTilt!=null?D.shoulderTilt:(D.roll||0)*1.2,-.5,.5);
      tgt.captureTorsoLean=clamp(D.torsoLean!=null?D.torsoLean:(D.headX||0)*.4,-1,1);
      tgt.captureChest=clamp(D.chest!=null?D.chest:(D.depth||0)*.35,-.6,.8);
      tgt.captureDepth=clamp(D.depth||0,-.75,1.15);

    let poseW=0,PS=null,poseGaze=null;
    const hold=this.poseActive(now);
    if(hold&&!driven){
      PS=POSES[hold.name];
      const u=now-hold.t0;
      const inW=smooth(clamp(u/.35,0,1));
      const outW=hold.d===Infinity?1:smooth(clamp((hold.d+.45-u)/.45,0,1));
      poseW=inW*outW;
      if(PS.yaw!=null)tgt.yaw=lerp(tgt.yaw,PS.yaw,poseW);
      if(PS.pitch!=null)tgt.nod=lerp(tgt.nod,PS.pitch*.9,poseW),tgt.pitch=PS.pitch*poseW;
      if(PS.roll!=null)tgt.roll=lerp(tgt.roll,PS.roll,poseW);
      if(PS.lean!=null)tgt.lean=lerp(tgt.lean,PS.lean,poseW);
      if(PS.leanY!=null)tgt.leanY=lerp(tgt.leanY,PS.leanY*2,poseW);
      if(PS.shrug!=null)tgt.shrug=Math.max(tgt.shrug,PS.shrug*poseW);
      if(PS.breathK)tgt.breath*=1+(PS.breathK-1)*poseW;
      if(PS.depth!=null)tgt.poseDepth=PS.depth*poseW;
      if(PS.face){const F2=PS.face;
        if(F2.smile!=null)tgt.smile=lerp(tgt.smile,F2.smile,poseW);
        if(F2.browY!=null)tgt.browY=Math.max(tgt.browY,F2.browY*poseW);
        if(F2.browKnit!=null)tgt.browKnit=Math.max(tgt.browKnit,F2.browKnit*poseW);
        if(F2.browOne!=null)tgt.browOne=Math.max(tgt.browOne,F2.browOne*poseW);
        if(F2.eyeWide!=null)tgt.eyeWide=Math.max(tgt.eyeWide,F2.eyeWide*poseW);
        if(F2.squint!=null)tgt.squint=Math.max(tgt.squint,F2.squint*poseW);
        if(F2.mouthO!=null&&!P)tgt.mouthO=Math.max(tgt.mouthO,F2.mouthO*poseW);}
      if(PS.gaze)poseGaze=PS.gaze;

      switch(PS.fx){

        case"nodloop":tgt.nod+=Math.sin(u*7)*.55*poseW;break;
        case"snap":tgt.yaw=lerp(tgt.yaw,(Math.floor(u*2.2)%2?1.1:-1.1),poseW);tgt.eyeWide=Math.max(tgt.eyeWide,.5*poseW);break;
        case"bounce":tgt.bounce+=Math.sin(u*9)*.9*poseW;tgt.leanY+=Math.sin(u*9)*.4*poseW;break;
        case"tap":tgt.bounce+=Math.max(0,Math.sin(u*8))*.5*poseW;break;
        case"jitter":tgt.shakeX+=Math.sin(u*23)*.3*poseW;break;
      }

      if(PS.stance==="walk")this._walk=(this._walk||0)+dt*6.2;
    }
    /* discrete pose channels (snap when weight majority) */
    p.poseName=(poseW>.02&&PS)?hold.name:null;
    p.poseW=poseW;
    if(driven){const ay=Math.abs(D.yaw||0);p.facing=ay>.82?"profile":(ay>.34?"threeq":"front");}
    else p.facing=(poseW>.5&&PS&&PS.facing)?PS.facing:"front";
    p.stance=(poseW>.4&&PS&&PS.stance)?PS.stance:"stand";
    p.walkPhase=this._walk||0;
    p.crouch=lerp(p.crouch,(PS&&PS.stance==="crouch")?poseW:((PS&&PS.stance==="kneel")?0:0),1-Math.exp(-dt*8));
    p.weightX=lerp(p.weightX,(PS&&PS.stance==="weight")?poseW:0,1-Math.exp(-dt*6));
    p.poseDepth=lerp(p.poseDepth,tgt.poseDepth||0,1-Math.exp(-dt*6));

    if(!driven&&!thinking&&!P&&!gazeTarget){

      if(this.gazeT<=0){this.gazeGoal={x:(Math.random()-.5)*.28*range,y:(Math.random()-.5)*.12*range+(AP.gazeY||0)*k*.5};
        this.gazeT=(3+Math.random()*3.5)/Math.max(.5,rate);}

    }

    if(gazeTarget&&!P&&!driven){

      if(P.sched){const v=visemeAt(P.sched,u);tgt.mouthS=v.s;tgt.mouthO=v.o;gx=0;gy=0;tgt.lean=Math.max(tgt.lean,.4);}

      case'lean++':tgt.lean=Math.max(tgt.lean,1.25);break;
      case'nod':tgt.nod+=Pw(.7);break;
      case'nod-small':tgt.nod+=Pw(.7)*.6;break;
      case'head-shake-small':tgt.shakeX+=Math.sin(u*18)*smooth(1-frac)*.6;break;
      case'head-tilt':tgt.roll+=.14;break;
      case'brow-knit':tgt.browKnit=Math.max(tgt.browKnit,.8);break;
      case'brows-up':tgt.browY=Math.max(tgt.browY,local>-.05?.9:0);break;
      case'eyebrow-one':tgt.browOne=.9;break;
      case'squint':tgt.squint=Math.max(tgt.squint,.7);break;
      case'eyes-wide':tgt.eyeWide=Math.max(tgt.eyeWide,.9);break;
      case'small-smile':tgt.smile=Math.max(tgt.smile,local>0?.45:tgt.smile);break;
      case'wide-smile':tgt.smile=Math.max(tgt.smile,local>-.05?1:tgt.smile);break;
      case'sympathetic-smile':tgt.smile=Math.max(tgt.smile,.5);tgt.browY=Math.max(tgt.browY,.4);break;
      case'grin-tail':if(frac>.65)tgt.smile=Math.max(tgt.smile,.8);break;
      case'lips-press-tail':if(frac>.6){tgt.mouthS=4;tgt.mouthO=0;}break;
      case'contain-laugh':tgt.bounce+=Math.sin(now*22)*.4;tgt.smile=Math.max(tgt.smile,.35);break;
      case'mouth-open':if(local>-.02)tgt.mouthO=Math.max(tgt.mouthO,.5);break;
      case'glance-right':if(local>0&&local<.3){ngx=.9;ngy=.1;}break;
      case'glance-left':if(local>0&&local<.3){ngx=-.9;ngy=.1;}break;
      case'glance-down-once':if(local>-.02&&local<.35){ngx=0;ngy=.8;tgt.nod=Math.max(tgt.nod,.3);}break;
      case'look-away':if(local>0&&local<.5){ngx=-.85;ngy=.15;tgt.yaw=-.3;}break;
      case'look-at-you':if(local>0){ngx=0;ngy=0;tgt.smile=Math.max(tgt.smile,.06);}break;
      case'scan-tiles':ngx=Math.sin(u*3.5)*.8;ngy=0;break;
      case'direct-camera':ngx=0;ngy=0;break;
      case'posture-up':tgt.lean=.2;tgt.leanY=-.6;break;
      case'finger-up':this._armCue=Math.max(this._armCue||0,.7);tgt.nod+=Pw(.5)*.3;break;
      case'hand-raise':this._armCue=Math.max(this._armCue||0,1);break;
      case'palms-up':this._armCue=Math.max(this._armCue||0,.6);break;
      case'swallow':tgt.nod+=Pw(.3)*.3;break;

      case'settle':if(frac>.6){tgt.lean*=.5;tgt.browKnit*=.5;}break;
      default:
        if(POSES[f.name]&&local>-.02&&local<.06&&(!this.poseHold||this.poseHold.name!==f.name))

        break;
    }
    setGaze({gx:ngx,gy:ngy});
  }
}

  const hipY=sy+headR*2.55+brY*.3;
  const hipW=shw*.62*profileK;
  const lHip={x:cx+capLean*.6-hipW*.62+(p.weightX||0)*W*.02,y:hipY};
  const rHip={x:cx+capLean*.6+hipW*.62+(p.weightX||0)*W*.02,y:hipY};

  /* ---- legs (drawn first, behind torso hem) ---- */
  const LT=(groundY-hipY)*.52, LS_=(groundY-hipY)*.46;
  const wTh=hipW*.72, wSh=hipW*.5;
  let legsInfo=[];
  const trackedLegs=p.captureLegs;
  if(trackedLegs&&(trackedLegs.left||trackedLegs.right)){
    const li=drawHalftrackLeg(g,lHip,trackedLegs.left,LT,LS_,wTh,wSh,pantInk,-1,groundY,W,H);
    const ri=drawHalftrackLeg(g,rHip,trackedLegs.right,LT,LS_,wTh,wSh,pantInk,1,groundY,W,H);
    legsInfo.push(li||drawLeg(g,lHip.x,lHip.y,-.06,0,LT,LS_,wTh,wSh,pantInk,-1,groundY));
    legsInfo.push(ri||drawLeg(g,rHip.x,rHip.y,.06,0,LT,LS_,wTh,wSh,pantInk,1,groundY));
  }else if(stance==='walk'){
    const ph=p.walkPhase;
    const sw=Math.sin(ph);
    /* back leg first (lighter overlap) */
    legsInfo.push(drawLeg(g,lHip.x,lHip.y,-sw*.42,Math.max(0,Math.sin(ph+Math.PI))* .55,LT,LS_,wTh,wSh,pantInk,1,groundY));
    legsInfo.push(drawLeg(g,rHip.x,rHip.y,sw*.42,Math.max(0,Math.sin(ph))* .55,LT,LS_,wTh,wSh,pantInk,1,groundY));
  }else if(stance==='crouch'){
    const c=poseW;
    legsInfo.push(drawLeg(g,lHip.x,lHip.y,-.55*c,1.0*c,LT,LS_,wTh,wSh,pantInk,-1,groundY));
    legsInfo.push(drawLeg(g,rHip.x,rHip.y,.55*c,-1.0*c,LT,LS_,wTh,wSh,pantInk,1,groundY));
  }else if(stance==='kneel'){
    /* knees on the ground, shins tucked back */
    for(const[hp,sd]of[[lHip,-1],[rHip,1]]){
      const kx=hp.x+sd*hipW*.15,ky=groundY-LS_*.28;
      taperedCapsule(g,{x:hp.x,y:hp.y},{x:kx,y:ky},wTh,wTh*.8,pantInk);
      taperedCapsule(g,{x:kx,y:ky},{x:kx-sd*LS_*.5,y:ky+LS_*.16},wTh*.8,wSh,pantInk);
      drawShoe(g,kx-sd*LS_*.62,groundY,-sd,LS_*.34,pantInk);
    }
  }else if(stance==='step-fwd'||stance==='step-back'){
    const dir=stance==='step-fwd'?1:-1;
    legsInfo.push(drawLeg(g,lHip.x,lHip.y,-.22*dir*poseW,.12*poseW,LT,LS_,wTh,wSh,pantInk,1,groundY));
    legsInfo.push(drawLeg(g,rHip.x,rHip.y,.30*dir*poseW,.10*poseW,LT,LS_,wTh,wSh,pantInk,1,groundY));
  }else if(stance==='weight'){
    const wgt=(p.weightX||0);
    legsInfo.push(drawLeg(g,lHip.x,lHip.y,-.06-wgt*.18,.16*Math.abs(wgt),LT,LS_,wTh,wSh,pantInk,1,groundY));
    legsInfo.push(drawLeg(g,rHip.x,rHip.y,.06+wgt*.04,0,LT,LS_,wTh,wSh,pantInk,1,groundY));
  }else{
    const a=facing==='profile'?.03:.075;
    legsInfo.push(drawLeg(g,lHip.x,lHip.y,-a,0,LT,LS_,wTh,wSh,pantInk,facing==='profile'?profDir:1,groundY));
    legsInfo.push(drawLeg(g,rHip.x,rHip.y,a,.02,LT,LS_,wTh,wSh,pantInk,facing==='profile'?profDir:1,groundY));
  }

  /* pelvis bridge */
  g.fillStyle=pantInk;g.beginPath();
  g.moveTo(lHip.x-wTh*.55,hipY-headR*.35);g.lineTo(rHip.x+wTh*.55,hipY-headR*.35);
  g.lineTo(rHip.x+wTh*.5,hipY+headR*.42);g.lineTo(lHip.x-wTh*.5,hipY+headR*.42);g.closePath();g.fill();

  /* ---- arms: build body rig, choose captured / pose / procedural ---- */
  const shoulderSpan=Math.max(W*.2,Math.hypot(rS.x-lS.x,rS.y-lS.y))*1.35;
  const bodyRig={leftShoulder:lS,rightShoulder:rS,mid:{x:(lS.x+rS.x)/2,y:(lS.y+rS.y)/2},
    span:shoulderSpan,frameWidth:W,frameHeight:hipY+headR*1.6,
    speechPhase:(p.speechPhase||0),bilateralCue:(p.armCue||0)>.4};
  const AB=ARM_BEHAV[name]||ARM_BEHAV.NAT;
  const speechE=clamp(p.speechArm||0,0,1), cueE=clamp(p.armCue||0,0,1);
  const cap=p.captureArms;
  const U=headR;   /* pose offsets are in headR units */
  function poseLimb(side,spec){
    if(!spec)return null;
    const sh=side<0?lS:rS;
    const el={x:sh.x+side*spec.el[0]*U,y:sh.y+spec.el[1]*U*1.35};
    const wr={x:el.x+side*spec.wr[0]*U,y:el.y+spec.wr[1]*U*1.35};
    return{side,shoulder:sh,elbow:el,wrist:wr,handPoints:null,depth:side<0?.05:.04,
      procedural:true,handPose:spec.hand||'relaxed',gesture:.5,fore:spec.fore||0};
  }
  function blendLimb(a,b,t){ /* a=base, b=pose, t weight */
    if(!b)return a; if(!a)return b;
    const mix=(q1,q2)=>({x:lerp(q1.x,q2.x,t),y:lerp(q1.y,q2.y,t)});
    return{side:b.side,shoulder:mix(a.shoulder,b.shoulder),elbow:mix(a.elbow,b.elbow),wrist:mix(a.wrist,b.wrist),
      handPoints:null,depth:b.depth,procedural:true,handPose:t>.5?b.handPose:a.handPose,gesture:Math.max(a.gesture||0,b.gesture||0),fore:(b.fore||0)*t};
  }
  let leftLimb,rightLimb;
  if(cap){
    const L1=headR*1.30,L2=headR*1.23;
    leftLimb=halftrackLimb(-1,cap.lS,cap.lE,cap.lW,cap.lH,lS,L1,L2,W,H,cap.shoulderSpan)||solveProceduralLimb(-1,speechE*AB.bilateral,cueE,bodyRig);
    rightLimb=halftrackLimb(1,cap.rS,cap.rE,cap.rW,cap.rH,rS,L1,L2,W,H,cap.shoulderSpan)||solveProceduralLimb(1,speechE,cueE,bodyRig);
  }else{
    let baseL=solveProceduralLimb(-1,speechE*(AB.dominant<0?1:AB.bilateral),cueE,bodyRig);
    let baseR=solveProceduralLimb(1,speechE*(AB.dominant>0?1:AB.bilateral),cueE,bodyRig);
    if(stance==='walk'){ /* arm counter-swing */
      const sw=Math.sin(p.walkPhase);
      const swingL=poseLimb(-1,{el:[.35,1.0],wr:[sw>0?.6:-.4,.85],hand:'relaxed'});
      const swingR=poseLimb(1,{el:[.35,1.0],wr:[sw>0?-.4:.6,.85],hand:'relaxed'});
      baseL=blendLimb(baseL,swingL,poseW);baseR=blendLimb(baseR,swingR,poseW);
    }
    const pl=PS?poseLimb(-1,PS.armL):null, pr=PS?poseLimb(1,PS.armR):null;
    leftLimb=blendLimb(baseL,pl,poseW);rightLimb=blendLimb(baseR,pr,poseW);
    /* fx on wrists */
    if(PS&&poseW>.1){
      const u=now;
      if(PS.fx==='wristwave'&&rightLimb)rightLimb.wrist.x+=Math.sin(u*9)*U*.45*poseW;
      if(PS.fx==='beckon'&&rightLimb)rightLimb.handPose=(Math.sin(u*6)>0?'open':'fist');
      if(PS.fx==='quotewiggle'){for(const L of[leftLimb,rightLimb])if(L)L.wrist.y+=Math.sin(u*11+L.side)*U*.14*poseW;}
      if(PS.fx==='jitter'){for(const L of[leftLimb,rightLimb])if(L){L.wrist.x+=Math.sin(u*21+L.side*3)*U*.09;L.wrist.y+=Math.cos(u*17+L.side)*U*.07;}}
    }
  }
  const limbs=[leftLimb,rightLimb].filter(Boolean);

  /* upper sleeves behind torso */
  for(const limb of limbs)drawUpperSleeve(g,limb,shoulderSpan,attire);

  /* ---- torso ---- */
  const nw=headR*.30*BD.neckW;
  const neckBaseCenterX=cx+capLean+Math.sin(neckYaw)*headR*.05+headTrackX*.07;
  const nL={x:neckBaseCenterX-nw*1.24,y:sy+headR*.10+capTilt*.06};
  const nR={x:neckBaseCenterX+nw*1.24,y:sy+headR*.10-capTilt*.06};
  const lC={x:cx+capLean-shw*.38*profileK,y:sy+headR*.16+capTilt*.2+asym};
  const rC={x:cx+capLean+shw*.38*profileK,y:sy+headR*.16-capTilt*.2-asym};
  const lO={x:cx+capLean-shw*profileK,y:lS.y+headR*.22};
  const rO={x:cx+capLean+shw*profileK,y:rS.y+headR*.22};
  const hemY=hipY+headR*.15;
  g.fillStyle=attire;g.beginPath();
  g.moveTo(lHip.x-wTh*.35,hemY);
  g.quadraticCurveTo(cx+capLean-shw*.92*profileK,hipY-headR*.9,lO.x,lO.y);
  g.quadraticCurveTo(lS.x-shw*.07,lS.y+headR*.08,lS.x,lS.y);
  g.quadraticCurveTo(lC.x,lC.y,nL.x,nL.y);
  g.quadraticCurveTo((nL.x+nR.x)/2,nL.y+headR*.10,nR.x,nR.y);
  g.quadraticCurveTo(rC.x,rC.y,rS.x,rS.y);
  g.quadraticCurveTo(rS.x+shw*.07,rS.y+headR*.08,rO.x,rO.y);
  g.quadraticCurveTo(cx+capLean+shw*.92*profileK,hipY-headR*.9,rHip.x+wTh*.35,hemY);
  g.closePath();g.fill();
  /* hem line */
  g.strokeStyle=ink2gray(INKMAP.EDGE);g.globalAlpha=.4;g.lineWidth=Math.max(1,headR*.05);
  g.beginPath();g.moveTo(lHip.x-wTh*.3,hemY-headR*.06);g.quadraticCurveTo(cx+capLean,hemY+headR*.06,rHip.x+wTh*.3,hemY-headR*.06);g.stroke();g.globalAlpha=1;

  if(facing!=='back'){
    /* collar */
    g.strokeStyle=ink2gray(Math.min(7,INKMAP.EDGE));g.globalAlpha=.55;g.lineWidth=Math.max(1,headR*.06);
    g.beginPath();g.ellipse(neckBaseCenterX,nL.y+headR*.02,nw*1.5,nw*.62,0,0,Math.PI);g.stroke();g.globalAlpha=1;
    if(F.glasses&&F.attire<60){ /* tie for dark-suit execs */
      g.fillStyle=gray(30);g.beginPath();
      g.moveTo(neckBaseCenterX-headR*.10,nL.y+headR*.12);g.lineTo(neckBaseCenterX+headR*.10,nL.y+headR*.12);
      g.lineTo(neckBaseCenterX+headR*.16,hemY-headR*.1);g.lineTo(neckBaseCenterX-headR*.16,hemY-headR*.1);g.closePath();g.fill();}
  }else{
    /* back seam */
    g.strokeStyle=ink2gray(INKMAP.EDGE);g.globalAlpha=.35;g.lineWidth=Math.max(1,headR*.05);
    g.beginPath();g.moveTo(cx+capLean,nL.y+headR*.3);g.lineTo(cx+capLean,hemY-headR*.1);g.stroke();g.globalAlpha=1;
  }

  /* neck */
  g.fillStyle=skin;g.beginPath();
  const ntX=cx+capLean+Math.sin(headYaw)*headR*.16+headTrackX*.6;
  const ntY=headY+headR*.55;
  g.moveTo(nL.x,nL.y);
  g.quadraticCurveTo(neckBaseCenterX-nw,lerp(nL.y,ntY,.5),ntX-nw*.8,ntY);
  g.lineTo(ntX+nw*.8,ntY);
  g.quadraticCurveTo(neckBaseCenterX+nw,lerp(nR.y,ntY,.5),nR.x,nR.y);
  g.closePath();g.fill();

  /* forearms + hands in front */
  const frontOrder=limbs.slice().sort((a,b)=>(b.depth||0)-(a.depth||0));
  const claspMode=PS&&((PS.armL&&PS.armL.hand==='clasp')||(PS.armR&&PS.armR.hand==='clasp'))&&poseW>.4;
  for(const limb of frontOrder){
    if(claspMode)limb.handPose='none';
    drawForearmAndHand(g,limb,shoulderSpan,attire,skin,now);
  }
  if(claspMode&&leftLimb&&rightLimb){ /* two hands pressed together */
    const mx=(leftLimb.wrist.x+rightLimb.wrist.x)/2,my=(leftLimb.wrist.y+rightLimb.wrist.y)/2;
    g.fillStyle=skin;g.beginPath();g.ellipse(mx,my,headR*.34,headR*.46,.2,0,7);g.fill();
    g.strokeStyle=ink2gray(INKMAP.EDGE);g.lineWidth=Math.max(1,headR*.05);
    g.beginPath();g.ellipse(mx,my,headR*.34,headR*.46,.2,0,7);g.stroke();
    for(let i=0;i<3;i++){g.beginPath();g.moveTo(mx-headR*.2,my-headR*.25+i*headR*.16);
      g.quadraticCurveTo(mx,my-headR*.32+i*headR*.16,mx+headR*.2,my-headR*.25+i*headR*.16);g.stroke();}
  }

  /* ---- head ---- */
  if(facing==='back'){
    backHead(g,hx,headY,headR,F);
  }else if(facing==='profile'){
    profileHead(g,hx,headY,headR,profDir,F,p);
  }else{
    const headPose=Math.abs(headYaw-(p.yaw||0))>1e-5?Object.assign({},p,{yaw:headYaw}):p;
    const face=meshFace(name,headPose,now);
    g.save();g.translate(hx,headY);g.rotate(p.roll*.78+pitch*.03);
    const sh=headR*2.34,sw=sh*92/112*BD.faceW;g.drawImage(face,-sw/2,-sh*.545,sw,sh);g.restore();
  }

  /* ground shadow */
  g.fillStyle='rgba(0,0,0,.10)';g.beginPath();
  g.ellipse(cx+capLean*.5,groundY+H*.012,shw*1.15,H*.012,0,0,7);g.fill();

  /* thinking accent — three rising dots at the temple */
  if(p.think>.1){const tk=p.think;g.fillStyle=ink2gray(INKMAP.EDGE);
    for(let i=0;i<3;i++){const ph=(now*1.4+i*.5)%1.6;if(ph>1)continue;const a=clamp(1-ph,0,1)*tk;
      const r=(i+1)*W*.010*(1+ph*.3);g.globalAlpha=a*.85;
      g.beginPath();g.arc(hx+headR*1.15+i*W*.035,headY-headR*.6-ph*H*.045,r,0,7);g.fill();}
    g.globalAlpha=1;}
}




/* ============================================================
   HALFTRACK NATIVE AVATAR RENDERER
   ------------------------------------------------------------
   This is the actual Halftrack figure compositor isolated inside
   Synthcine: native metrics, native girdles, native rounded limbs,
   native feet, native hand silhouettes, native facing bands and
   native heads. No Synthcine body or face geometry is mixed in.
   ============================================================ */
/* ============================================================
   HALFTRACK RENDERING PIPELINES
   The source rig has four materially different compositors:
   direct outlined sheet, direct no-line tone fields, coarse grid
   halftone, and fine mesh halftone. One global switch drives every
   tile and the focus view so the room never fractures stylistically.
   ============================================================ */
const RENDER_PIPELINES={
  SHEET:{outline:true,tones:"sheet",post:null},
  NOLINE:{outline:false,tones:"clean",post:null},
  GRID:{outline:true,tones:"post",post:{cell:8,bg:"dots",gain:1.0}},
  MESH:{outline:true,tones:"post",post:{cell:5,bg:"lines",gain:1.05}}
};
const RENDER_ORDER=Object.keys(RENDER_PIPELINES);
let RENDER_NAME="SHEET";
function renderPipeline(){return RENDER_PIPELINES[RENDER_NAME]||RENDER_PIPELINES.SHEET;}
function setRenderPipeline(name){
  if(!RENDER_PIPELINES[name])return;
  RENDER_NAME=name;
  document.body.dataset.render=name.toLowerCase();
  const b=document.getElementById("renderBtn");
  if(b){b.textContent=name;b.title="Halftrack renderer: "+name+" · click or press R";b.setAttribute("aria-label","Rendering pipeline: "+name);}
}

const HalftrackNativeRenderer=(()=>{
  const INK="#141414", LW=4, STYLE={outline:true,tones:"sheet",post:null};
  let ctx=null,AV=null,S=null,F=0,TONES=null,SWEATER=null,SKINT=null,CC=null;
  let drive="PUPPET",poseName="neutral",P=null;

  const CAST_PRESETS={
    HERO:{hair:"none",glasses:false,beard:false,headS:1.00,build:1.00,h:1.00,browW:1.0,eyeS:1.00,mouthW:1.00,shirt:"#d3d3cd",skin:"#e3e0d9",garment:"sweater"},
    SLIM:{hair:"cap",glasses:false,beard:false,headS:.92,build:.80,h:1.10,browW:.8,eyeS:.90,mouthW:.85,shirt:"#c2c2bb",skin:"#cbbfae",garment:"sweater"},
    BOSS:{hair:"none",glasses:false,beard:true,headS:1.05,build:1.24,h:.94,browW:1.6,eyeS:.85,mouthW:1.10,shirt:"#b8b8b1",skin:"#a28b74",garment:"sweater"},
    PROF:{hair:"ring",glasses:true,beard:false,headS:1.00,build:.95,h:1.00,browW:1.1,eyeS:1.00,mouthW:.90,shirt:"#cbcbc4",skin:"#e3e0d9",garment:"sweater"},
    KID:{hair:"flat",glasses:false,beard:false,headS:1.16,build:.80,h:.80,browW:.9,eyeS:1.30,mouthW:.80,shirt:"#dcdcd5",skin:"#b7a68f",garment:"tee"},
    NOVA:{hair:"long",glasses:false,beard:false,headS:1.00,build:.88,h:1.04,browW:.85,eyeS:1.10,mouthW:.95,shirt:"#c8c8c1",skin:"#8f7a64",garment:"dress"},
    JUNE:{hair:"bun",glasses:false,beard:false,headS:.98,build:.92,h:.98,browW:.9,eyeS:1.05,mouthW:.90,shirt:"#d6d6cf",skin:"#cbbfae",garment:"tee"},
    ACE:{hair:"curly",glasses:false,beard:false,headS:1.02,build:1.05,h:1.02,browW:1.2,eyeS:.95,mouthW:1.00,shirt:"#bfbfb8",skin:"#e3e0d9",garment:"hoodie"}
  };
  const CHAR_SPEC={
    NAT:{...CAST_PRESETS.JUNE,hair:"long",garment:"sweater",shirt:"#c8c8c1",skin:"#e3e0d9"},
    CHRIS:{...CAST_PRESETS.BOSS,hair:"none",beard:false,shirt:"#b8b8b1"},
    SAMANTHA:{...CAST_PRESETS.JUNE,hair:"long",garment:"tee",skin:"#cbbfae"},
    ERNIE:{...CAST_PRESETS.ACE},
    PHIL:{...CAST_PRESETS.PROF},
    BARBARA:{...CAST_PRESETS.JUNE,hair:"bun",garment:"sweater"},
    KIM:{...CAST_PRESETS.SLIM,hair:"long",garment:"sweater"},
    DANIEL:{...CAST_PRESETS.HERO,hair:"cap"},
    FRIEDRICH:{...CAST_PRESETS.PROF},
    SUSANNA:{...CAST_PRESETS.NOVA,hair:"bun",garment:"dress",skin:"#cbbfae"},
    YOU:{...CAST_PRESETS.HERO}
  };
  const STATE={};
  const TONE_CACHE=new WeakMap();
  const solid=base=>({base,pat:null});
  function mkTone(base,dotR,gap){
    const c=document.createElement("canvas"),sz=Math.max(3,Math.round(gap));
    c.width=c.height=sz;
    const q=c.getContext("2d");q.fillStyle="#1c1c1c";q.beginPath();q.arc(sz/2,sz/2,dotR,0,7);q.fill();
    return{base,pat:ctx.createPattern(c,"repeat")};
  }
  function hexLum(hex){
    const n=parseInt(String(hex||"#808080").replace("#","").padEnd(6,"0").slice(0,6),16);
    return((n>>16)*.299+((n>>8)&255)*.587+(n&255)*.114)/255;
  }
  function toneSet(spec,toneName){
    let cache=TONE_CACHE.get(ctx);if(!cache){cache=new Map();TONE_CACHE.set(ctx,cache);}
    const key=[toneName,spec.skin,spec.shirt].join("|");if(cache.has(key))return cache.get(key);
    const skin=spec.skin||"#e3e0d9",sl=hexLum(skin),skinDot=.5+(1-sl)*1.5;
    const postGray=Math.round(0x58+sl*0x60),postHex="#"+((postGray<<16)|(postGray<<8)|postGray).toString(16).padStart(6,"0");
    let t;
    if(toneName==="clean")t={
      skin:mkTone(shade(skin,-8),skinDot*1.05,4),
      sweater:mkTone(shade(spec.shirt,-16),1.20,4),
      pants:mkTone("#b4b4ad",1.35,4),shoe:mkTone("#9d9d96",1.45,3.4)};
    else if(toneName==="post")t={skin:solid(postHex),sweater:solid("#2a2a2a"),pants:solid("#3a3a3a"),shoe:solid("#161616")};
    else t={skin:mkTone(skin,skinDot,4),sweater:mkTone(spec.shirt,1.10,4),pants:mkTone("#ccccc6",1.25,4),shoe:mkTone("#c2c2bc",1.35,3.4)};
    cache.set(key,t);return t;
  }
  const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
  const norm=v=>{const n=Math.hypot(v.x,v.y)||1;return{x:v.x/n,y:v.y/n};};
  const px=l=>({x:(1-l.x)*AV.W,y:l.y*AV.H});
  function mkMetrics(W,H,spec){
    const hs=spec.h,bs=spec.build,groundY=H*.94;
    const ry=H*.118*spec.headS*hs,rx=ry*.82,baseR=H*.118*.82;
    return{W,H,groundY,hipY:groundY-H*.275*hs,shoulderY:groundY-H*.485*hs,rx,ry,
      shw:baseR*2*1.42*hs*bs,hipW:baseR*2*.72*hs*bs,
      L1:H*.115*hs,L2:H*.105*hs,LT:H*.130*hs,LS:H*.125*hs,
      handLen:H*.045*hs*(.5+.5*bs),
      arms:{L:{el:null,wr:null},R:{el:null,wr:null}},legs:{L:{k:null,a:null},R:{k:null,a:null}}};
  }
  function stateFor(name,W,H,spec){
    let q=STATE[name];
    if(!q||q.W!==W||q.H!==H){q=STATE[name]={W,H,M:mkMetrics(W,H,spec),F:0,handSm:{L:null,R:null}};}
    return q;
  }
  function easePt(cur,tgt,a=.26){return cur?{x:lerp(cur.x,tgt.x,a),y:lerp(cur.y,tgt.y,a)}:{x:tgt.x,y:tgt.y};}
  function restArm(AJ,side,t){
    const sway=Math.sin(t/1000+(side<0?0:2.1))*.015,d1=norm({x:side*.14+sway,y:.99});
    const el={x:AJ.x+d1.x*AV.L1,y:AJ.y+d1.y*AV.L1},d2=norm({x:side*.04,y:1});
    return{el,wr:{x:el.x+d2.x*AV.L2,y:el.y+d2.y*AV.L2}};
  }
  function walkArm(slot,AJ,t,ph){
    const p=ph+(slot==="L"?0:Math.PI),d1=norm({x:.38*Math.sin(p),y:.95}),d2=norm({x:.22*Math.sin(p-.5),y:1});
    const el={x:AJ.x+d1.x*AV.L1,y:AJ.y+d1.y*AV.L1};return{el,wr:{x:el.x+d2.x*AV.L2,y:el.y+d2.y*AV.L2}};
  }
  function poseArm(slot,AJ,side,spec){
    if(!spec)return null;const U=AV.ry;
    const el={x:AJ.x+side*spec.el[0]*U,y:AJ.y+spec.el[1]*U*1.35};
    return{el,wr:{x:el.x+side*spec.wr[0]*U,y:el.y+spec.wr[1]*U*1.35}};
  }
  function armTargets(slot,AJ,side,t){
    if(drive==="CAPTURE"&&P.captureArms){
      const C=P.captureArms,L=slot==="L";
      const q=halftrackLimb(side,L?C.lS:C.rS,L?C.lE:C.rE,L?C.lW:C.rW,L?C.lH:C.rH,AJ,AV.L1,AV.L2,AV.W,AV.H,C.shoulderSpan);
      if(q)return{el:q.elbow,wr:q.wrist};
    }
    if(P.stance==="walk")return walkArm(slot,AJ,t,P.walkPhase||t/360);
    const ps=P.poseName?POSES[P.poseName]:null,spec=ps&&(slot==="L"?ps.armL:ps.armR);
    const posed=poseArm(slot,AJ,side,spec);
    if(posed&&P.poseW>.02){const r=restArm(AJ,side,t),k=P.poseW;return{el:easePt(r.el,posed.el,k),wr:easePt(r.wr,posed.wr,k)};}
    if((P.speechArm||0)>.04||(P.armCue||0)>.04){
      const rig={leftShoulder:slot==="L"?AJ:{x:AJ.x-AV.shw,y:AJ.y},rightShoulder:slot==="R"?AJ:{x:AJ.x+AV.shw,y:AJ.y},mid:AJ,span:AV.shw,frameWidth:AV.W,frameHeight:AV.H,bilateralCue:(P.armCue||0)>.4,speechPhase:P.speechPhase||0};
      const q=solveProceduralLimb(side,P.speechArm||0,P.armCue||0,rig);if(q)return{el:q.elbow,wr:q.wrist};
    }
    return restArm(AJ,side,t);
  }
  function legTargets(slot,HJ,side,t){
    const C=P.captureLegs&&P.captureLegs[slot==="L"?"left":"right"];
    if(C){const h=mapPt(C.h,AV.W,AV.H),k=mapPt(C.k,AV.W,AV.H),a=mapPt(C.a,AV.W,AV.H),d1=unitFrom(h,k),d2=unitFrom(k,a);
      if(d1&&d2){const kk={x:HJ.x+d1.x*AV.LT,y:HJ.y+d1.y*AV.LT};return{k:kk,a:{x:kk.x+d2.x*AV.LS,y:kk.y+d2.y*AV.LS}};}}
    if(P.stance==="walk"){
      const ph=(P.walkPhase||0)+(slot==="L"?Math.PI:0),d1=norm({x:.5*Math.sin(ph),y:1}),bend=Math.max(0,-Math.sin(ph-.9))*.55,d2=norm({x:.5*Math.sin(ph)-bend*.3,y:1});
      const k={x:HJ.x+d1.x*AV.LT,y:HJ.y+d1.y*AV.LT};return{k,a:{x:k.x+d2.x*AV.LS,y:k.y+d2.y*AV.LS}};
    }
    if(P.stance==="crouch"){
      const d1=norm({x:side*.5,y:.86}),d2=norm({x:-side*.48,y:.86}),k={x:HJ.x+d1.x*AV.LT,y:HJ.y+d1.y*AV.LT};return{k,a:{x:k.x+d2.x*AV.LS,y:k.y+d2.y*AV.LS}};
    }
    if(P.stance==="kneel"){
      const k={x:HJ.x+side*AV.hipW*.08,y:AV.groundY-AV.LS*.28};return{k,a:{x:k.x-side*AV.LS*.5,y:k.y+AV.LS*.16}};
    }
    if(P.stance==="step-fwd"||P.stance==="step-back"){
      const d=P.stance==="step-fwd"?1:-1,a=side*(slot==="L"?-.18:.18)*d*(P.poseW||1),d1=norm({x:a,y:1});
      const k={x:HJ.x+d1.x*AV.LT,y:HJ.y+d1.y*AV.LT};return{k,a:{x:k.x,y:k.y+AV.LS}};
    }
    const k={x:HJ.x+side*AV.hipW*.05,y:HJ.y+AV.LT};return{k,a:{x:k.x,y:k.y+AV.LS}};
  }
  function nearestHand(slot){
    const C=P&&P.captureArms;if(!C)return null;return slot==="L"?C.lH:C.rH;
  }

function paint(pathFn, tone, lw=LW){
  ctx.beginPath(); pathFn();
  ctx.fillStyle = tone.base; ctx.fill();
  if (tone.pat){ ctx.fillStyle = tone.pat; ctx.fill(); }
  if (STYLE.outline){
    ctx.strokeStyle = INK; ctx.lineWidth = lw;
    ctx.lineJoin = "round"; ctx.stroke();
  }
}
function limb(pathFn, tone, lw){
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  if (STYLE.outline){
    ctx.strokeStyle = INK; ctx.lineWidth = lw + LW*1.9;
    ctx.beginPath(); pathFn(); ctx.stroke();
  }
  ctx.strokeStyle = tone.base; ctx.lineWidth = lw;
  ctx.beginPath(); pathFn(); ctx.stroke();
  if (tone.pat){
    ctx.strokeStyle = tone.pat; ctx.lineWidth = lw;
    ctx.beginPath(); pathFn(); ctx.stroke();
  }
}
function ink(pathFn, lw=3){
  ctx.strokeStyle = INK; ctx.lineWidth = lw;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath(); pathFn(); ctx.stroke();
}
// garment seams (hem, soles, back seam) follow the style; facial ink doesn't
function seam(pathFn, lw=3){ if (STYLE.outline) ink(pathFn, lw); }
function band(){
  const a=Math.abs(F);
  return a<0.4?"front":a<0.85?"threeq":a<1.3?"profile":"back";
}

function drawFigure(t){
  const { W, groundY, hipY, shoulderY, shw, hipW, rx, ry } = AV;
  const bd = band();
  const dir = Math.sign(F) || 1;
  const sq = bd==="front" ? 1 : bd==="threeq" ? 0.84 : bd==="profile" ? 0.58 : 1;
  const shwE = shw*sq, hipWE = hipW*(0.55 + 0.45*sq);
  const cx = W/2;

  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.beginPath();
  ctx.ellipse(cx, groundY + 5, hipW*1.6, hipW*0.20, 0, 0, 7);
  ctx.fill();

  // band-aware girdles: in profile both collapse to a near-single column,
  // the near-side joint sits slightly forward of the far one
  let aL = -shwE/2 + shwE*0.03, aR = shwE/2 - shwE*0.03;
  let hL = -hipWE/2, hR = hipWE/2;
  if (bd === "profile"){
    aL = dir>0 ? -shw*0.055 : -shw*0.105;
    aR = dir>0 ?  shw*0.105 :  shw*0.055;
    hL = dir>0 ? -AV.hipW*0.05 : -AV.hipW*0.12;
    hR = dir>0 ?  AV.hipW*0.12 :  AV.hipW*0.05;
  } else if (bd === "threeq"){
    aL = -shwE*(dir>0?0.40:0.47); aR = shwE*(dir>0?0.47:0.40);
    hL = -hipWE*(dir>0?0.40:0.50); hR = hipWE*(dir>0?0.50:0.40);
  }
  const HJL = { x:cx + hL, y:hipY }, HJR = { x:cx + hR, y:hipY };
  const tiltDy = Math.tan(S.tilt*0.6)*shwE/2;
  const AJL = { x:cx + aL, y:shoulderY - tiltDy };
  const AJR = { x:cx + aR, y:shoulderY + tiltDy };

  for (const [slot, HJ, side] of [["L",HJL,-1],["R",HJR,1]]){
    const tgt = legTargets(slot, HJ, side, t);
    const l = AV.legs[slot];
    l.k = easePt(l.k, tgt.k); l.a = easePt(l.a, tgt.a);
  }
  for (const [slot, AJ, side] of [["L",AJL,-1],["R",AJR,1]]){
    const tgt = armTargets(slot, AJ, side, t);
    const a = AV.arms[slot];
    a.el = easePt(a.el, tgt.el, 0.28); a.wr = easePt(a.wr, tgt.wr, 0.28);
  }

  // painter order by band: in profile the far arm goes behind the torso
  const nearSlot = dir>0 ? "R" : "L", farSlot = dir>0 ? "L" : "R";
  const farBehind = (bd==="profile" || bd==="threeq");

  if (farBehind) drawArm(farSlot, farSlot==="L"?AJL:AJR, t,
    (drive!=="CAPTURE" && (POSES[poseName]||{}).prop) || null);

  drawLegs(HJL, HJR, bd, dir);
  drawTorso(cx, shoulderY, hipY, shwE, hipWE, bd);
  if (CC && CC.decals.torso.length){
    ctx.save(); ctx.translate(cx, shoulderY);
    for (const st of CC.decals.torso)
      ink(()=>{
        ctx.moveTo(st.pts[0].x*AV.shw, st.pts[0].y*AV.shw);
        for (const q of st.pts.slice(1)) ctx.lineTo(q.x*AV.shw, q.y*AV.shw);
      }, 3.2);
    ctx.restore();
  }
  drawNeckAndHead(cx, shoulderY, shwE, bd, dir, t);

  const prop = (drive!=="CAPTURE" && (POSES[poseName]||{}).prop) || null;
  if (prop === "box") drawBox(AV.arms.L.wr, AV.arms.R.wr);

  if (farBehind){ drawArm(nearSlot, nearSlot==="L"?AJL:AJR, t, prop); }
  else { drawArm("L", AJL, t, prop); drawArm("R", AJR, t, prop); }
}

function drawLegs(HJL, HJR, bd, dir){
  const order = (bd==="profile" || bd==="threeq")
    ? (dir>0 ? [["L",HJL],["R",HJR]] : [["R",HJR],["L",HJL]])   // far leg first
    : [["L",HJL],["R",HJR]];
  for (const [slot, HJ] of order){
    const l = AV.legs[slot];
    limb(()=>{ ctx.moveTo(HJ.x, HJ.y);
               ctx.lineTo(l.k.x, l.k.y);
               ctx.lineTo(l.a.x, l.a.y); }, TONES.pants, AV.hipW*0.50);
    const fw = AV.hipW*0.46;
    const toe = bd==="profile" ? dir*fw*0.40 : (slot==="L"?-1:1)*fw*0.16;
    const fx0 = l.a.x + toe;
    const fy0 = l.a.y + AV.hipW*0.16;
    paint(()=>{ ctx.ellipse(fx0, fy0, fw*0.60, fw*0.30, 0, 0, 7); }, TONES.shoe);
    seam(()=>{ ctx.moveTo(fx0-fw*0.58, fy0+fw*0.20); ctx.lineTo(fx0+fw*0.58, fy0+fw*0.20); }, 3);
  }
}

function drawTorso(cx, shoulderY, hipY, shwE, hipWE, bd){
  const g = SPEC().garment || "sweater";
  const hemY = hipY + AV.hipW*(g==="dress" ? 0.95 : 0.26);
  const hemW = g==="dress" ? 0.62 : 0.40;
  ctx.save();
  ctx.translate(cx, hipY);
  const sy = shoulderY - hipY;
  paint(()=>{
    ctx.moveTo(-shwE*hemW, hemY - hipY);
    ctx.quadraticCurveTo(-shwE*0.47, sy*0.45, -shwE*0.44, sy + shwE*0.10);
    ctx.quadraticCurveTo(-shwE*0.44, sy - shwE*0.075, -shwE*0.20, sy - shwE*0.085);
    ctx.quadraticCurveTo(0, sy - shwE*0.10, shwE*0.20, sy - shwE*0.085);
    ctx.quadraticCurveTo(shwE*0.44, sy - shwE*0.075, shwE*0.44, sy + shwE*0.10);
    ctx.quadraticCurveTo(shwE*0.47, sy*0.45, shwE*hemW, hemY - hipY);
    ctx.closePath();
  }, SWEATER || TONES.sweater);
  if (g === "hoodie"){
    seam(()=>{ ctx.moveTo(-shwE*0.20, hemY-hipY-AV.hipW*0.55);
               ctx.lineTo(-shwE*0.20, hemY-hipY-AV.hipW*0.22);
               ctx.lineTo( shwE*0.20, hemY-hipY-AV.hipW*0.22);
               ctx.lineTo( shwE*0.20, hemY-hipY-AV.hipW*0.55); }, 2.5);
  }
  if (g !== "dress")
    seam(()=>{ ctx.moveTo(-shwE*0.38, hemY-hipY-AV.hipW*0.15);
               ctx.lineTo( shwE*0.38, hemY-hipY-AV.hipW*0.15); }, 2.5);
  if (bd === "back")
    seam(()=>{ ctx.moveTo(0, sy + shwE*0.14); ctx.lineTo(0, hemY-hipY-AV.hipW*0.3); }, 2.5);
  ctx.restore();
}

function drawNeckAndHead(cx, shoulderY, shwE, bd, dir, t){
  const { rx, ry } = AV;
  const headC = {
    x: cx + clamp(S.headX, -1, 1) * rx * 0.28,
    y: shoulderY - shwE*0.085 - ry*0.92 + S.headY * ry * 0.22,
  };
  const chin = { x: headC.x, y: headC.y + ry*0.70 };
  limb(()=>{ ctx.moveTo(chin.x, chin.y);
             ctx.lineTo(cx, shoulderY - shwE*0.04); }, (SKINT||TONES.skin), rx*0.50);
  if (SPEC().garment === "hoodie")
    paint(()=>{
      ctx.ellipse(headC.x, headC.y + ry*0.55, rx*1.22, ry*0.62, 0, 0, 7);
    }, SWEATER || TONES.sweater, 3);
  paint(()=>{
    ctx.ellipse(cx, shoulderY - shwE*0.065, rx*0.46*Math.max(0.7,shwE/AV.shw+0.3), rx*0.17, 0, 0, 7);
  }, SWEATER || TONES.sweater, 3);
  HEADS[bd](headC, dir, t);
  if (CC){
    CC._anchors = { headC:{...headC}, cx, shoulderY };
    if (CC.decals.head.length){
      ctx.save();
      ctx.translate(headC.x, headC.y);
      ctx.rotate(S.roll * 0.85);
      for (const st of CC.decals.head)
        ink(()=>{
          ctx.moveTo(st.pts[0].x*ry, st.pts[0].y*ry);
          for (const q of st.pts.slice(1)) ctx.lineTo(q.x*ry, q.y*ry);
        }, 3.0);
      ctx.restore();
    }
  }
}

function drawArm(slot, AJ, t, prop){
  const a = AV.arms[slot];
  const lw = AV.shw*0.125;
  const shortSleeve = ["tee","dress"].includes(SPEC().garment);
  if (!shortSleeve){
    limb(()=>{ ctx.moveTo(AJ.x, AJ.y);
               ctx.lineTo(a.el.x, a.el.y);
               ctx.lineTo(a.wr.x, a.wr.y); }, SWEATER || TONES.sweater, lw);
  } else {
    // one continuous ink silhouette; sleeve ends at the elbow, skin below
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (STYLE.outline){
      ctx.strokeStyle = INK; ctx.lineWidth = lw + LW*1.9;
      ctx.beginPath();
      ctx.moveTo(AJ.x, AJ.y); ctx.lineTo(a.el.x, a.el.y); ctx.lineTo(a.wr.x, a.wr.y);
      ctx.stroke();
    }
    const seg = (p, q, tone, w)=>{
      ctx.strokeStyle = tone.base; ctx.lineWidth = w;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
      if (tone.pat){
        ctx.strokeStyle = tone.pat; ctx.lineWidth = w;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
      }
    };
    seg(AJ, a.el, SWEATER || TONES.sweater, lw);
    seg(a.el, a.wr, (SKINT||TONES.skin), lw*0.88);
    // sleeve hem at the elbow
    const d1 = norm({ x:a.el.x-AJ.x, y:a.el.y-AJ.y });
    seam(()=>{
      const n = { x:-d1.y, y:d1.x }, w2 = lw*0.55;
      ctx.moveTo(a.el.x - d1.x*4 + n.x*w2, a.el.y - d1.y*4 + n.y*w2);
      ctx.lineTo(a.el.x - d1.x*4 - n.x*w2, a.el.y - d1.y*4 - n.y*w2);
    }, 2.5);
  }
  const d2 = norm({ x:a.wr.x-a.el.x, y:a.wr.y-a.el.y });
  if (STYLE.outline) ink(()=>{
    const n = { x:-d2.y, y:d2.x }, w = AV.shw*0.066;
    ctx.moveTo(a.wr.x - d2.x*AV.handLen*0.25 + n.x*w, a.wr.y - d2.y*AV.handLen*0.25 + n.y*w);
    ctx.lineTo(a.wr.x - d2.x*AV.handLen*0.25 - n.x*w, a.wr.y - d2.y*AV.handLen*0.25 - n.y*w);
  }, 2.5);
  if (prop && prop !== "box" && slot === "R"){
    const wrP = { x: a.wr.x + d2.x*AV.handLen*0.3, y: a.wr.y + d2.y*AV.handLen*0.3 };
    drawProp(prop, wrP, d2);
  }
  drawHand(slot, a, d2);
}


const HAND_SHAPES = {
  open:  { curls:[0.02,0.02,0.02,0.02], thumb:0.1,  spread:0.7 },
  mitt:  { curls:[0.62,0.60,0.62,0.65], thumb:0.65, spread:0.1 },
  fist:  { curls:[1,1,1,1],             thumb:0.9,  spread:0 },
  point: { curls:[0,1,1,1],             thumb:0.85, spread:0 },
  grip:  { curls:[0.82,0.80,0.82,0.85], thumb:0.35, spread:0.05 },
};
function handParams(h){
  const W0 = px(h[0]);
  const sc = Math.max(8, dist(W0, px(h[9])));
  const curls = [];
  for (const [mcp,tip] of [[5,8],[9,12],[13,16],[17,20]]){
    const r = dist(px(h[tip]), W0) / Math.max(1, dist(px(h[mcp]), W0));
    curls.push(clamp((1.72 - r)/0.8, 0, 1));
  }
  const thumb = clamp(1.25 - dist(px(h[4]), px(h[17]))/(1.5*sc), 0, 1);
  const spread = clamp((dist(px(h[8]), px(h[20]))/sc - 0.55)/0.9, 0, 1);
  const dirV = norm({ x:px(h[9]).x - W0.x, y:px(h[9]).y - W0.y });
  return { curls, thumb, spread, dir:dirV };
}

let handSm = { L:null, R:null };
function smoothParams(slot, prm){
  let s = handSm[slot];
  if (!s) s = handSm[slot] = { curls:[...prm.curls], thumb:prm.thumb, spread:prm.spread, dir:{...prm.dir} };
  for (let i=0;i<4;i++) s.curls[i] = lerp(s.curls[i], prm.curls[i], 0.3);
  s.thumb  = lerp(s.thumb,  prm.thumb,  0.3);
  s.spread = lerp(s.spread, prm.spread, 0.3);
  s.dir = norm({ x:lerp(s.dir.x, prm.dir.x, 0.3), y:lerp(s.dir.y, prm.dir.y, 0.3) });
  return s;
}

function drawHand(slot, arm, d2){
  const wr = { x: arm.wr.x + d2.x*AV.handLen*0.3, y: arm.wr.y + d2.y*AV.handLen*0.3 };
  if (drive === "CAPTURE"){
    const h = nearestHand(slot);
    if (h){ const prm = smoothParams(slot, handParams(h)); drawParamHand(wr, prm.dir, prm, slot); return; }
    drawParamHand(wr, d2, HAND_SHAPES.mitt, slot); return;
  }
  const p = POSES[poseName] || {};
  const shape = p[slot==="L"?"handL":"handR"] || p.hand || "mitt";
  if (shape === "thumb"){
    drawParamHand(wr, { x: slot==="L"?1:-1, y:0 },
      { curls:[1,1,1,1], thumb:0, spread:0 }, slot);
    return;
  }
  if (shape === "peace"){
    drawParamHand(wr, { x:0, y:-1 },
      { curls:[0,0,1,1], thumb:0.9, spread:0.5,
        thumbSide: slot==="L" ? -1 : 1 }, slot);
    return;
  }
  drawParamHand(wr, d2, HAND_SHAPES[shape] || HAND_SHAPES.mitt, slot);
}

/* the whole hand is ONE closed path — palm, scalloped fingertips,
   thumb bump. A fist collapses to a clean mitt with no interior
   marks; an open hand is a notched paddle. No capsules anywhere. */
function handSilhouette(prm, r){
  const FL = prm.curls.map(c => r*(0.22 + 0.72*(1-c)));
  const spread = prm.spread || 0;
  const ys = [-0.40,-0.135,0.135,0.40].map(v => v*r*1.12*(1 + spread*0.3));
  const fw = r*0.15;
  const px0 = 0.42*r;
  const tl = r*(0.12 + 0.72*(1 - clamp(prm.thumb ?? 0.6, 0, 1)));

  ctx.moveTo(-0.32*r, -0.50*r);
  ctx.lineTo(px0*0.92, -0.52*r);
  for (let i=0;i<4;i++){
    const tip = px0 + FL[i];
    ctx.lineTo(tip - fw, ys[i] - fw*1.05);
    ctx.quadraticCurveTo(tip + fw*0.95, ys[i], tip - fw, ys[i] + fw*1.05);
    if (i<3) ctx.lineTo(px0 + Math.min(FL[i],FL[i+1])*0.42, (ys[i]+ys[i+1])/2);
  }
  ctx.lineTo(px0*0.92, 0.52*r);
  // thumb bump on the +y side (mirrored outside for the other hand)
  ctx.lineTo(0.30*r, 0.52*r);
  ctx.lineTo(0.16*r + tl*0.55, 0.52*r + tl*0.9);
  ctx.quadraticCurveTo(0.02*r + tl*0.35, 0.62*r + tl*0.95, -0.02*r, 0.56*r);
  ctx.lineTo(-0.32*r, 0.50*r);
  ctx.quadraticCurveTo(-0.52*r, 0, -0.32*r, -0.50*r);
  ctx.closePath();
}
function drawParamHand(wr, dirV, prm, slot){
  const r = AV.handLen*1.18;
  const a = Math.atan2(dirV.y, dirV.x);
  const ts = prm.thumbSide ?? (slot==="L" ? -1 : 1);
  ctx.save();
  ctx.translate(wr.x, wr.y);
  ctx.rotate(a);
  if (ts < 0) ctx.scale(1,-1);
  paint(()=>handSilhouette(prm, r), (SKINT||TONES.skin), 3.2);

/* ---------- props: the hand holds things ---------- */
function drawProp(kind, wr, d2){
  const r = AV.handLen;
  const n = norm({ x:-d2.y, y:d2.x });        // across the grip
  if (kind === "stick"){
    limb(()=>{
      ctx.moveTo(wr.x - n.x*r*2.6, wr.y - n.y*r*2.6);
      ctx.lineTo(wr.x + n.x*r*2.6, wr.y + n.y*r*2.6);
    }, TONES.shoe, r*0.28);
  }
  if (kind === "cup"){
    const cx0 = wr.x - n.x*r*0.9, cy0 = wr.y - n.y*r*0.9;
    paint(()=>{
      ctx.moveTo(cx0 - r*0.5, cy0 - r*0.7);
      ctx.lineTo(cx0 + r*0.5, cy0 - r*0.7);
      ctx.lineTo(cx0 + r*0.38, cy0 + r*0.55);
      ctx.lineTo(cx0 - r*0.38, cy0 + r*0.55);
      ctx.closePath();
    }, TONES.pants, 3);
    seam(()=>{ ctx.ellipse(cx0, cy0 - r*0.7, r*0.5, r*0.14, 0, 0, 7); }, 2.5);
  }
  if (kind === "phone"){
    ctx.save();
    ctx.translate(wr.x, wr.y);
    ctx.rotate(Math.atan2(d2.y, d2.x) + Math.PI/2);
    paint(()=>{
      const w = r*0.62, h = r*1.5;
      ctx.moveTo(-w, -h/2); ctx.lineTo(w, -h/2);
      ctx.lineTo(w, h/2); ctx.lineTo(-w, h/2); ctx.closePath();

  }
}
function drawBox(wrL, wrR){
  const midX = (wrL.x + wrR.x)/2, midY = (wrL.y + wrR.y)/2;
  const w = Math.max(AV.handLen*2.2, Math.abs(wrR.x - wrL.x)*0.9);
  const h = w*0.72;
  paint(()=>{
    ctx.moveTo(midX - w/2, midY - h/2);
    ctx.lineTo(midX + w/2, midY - h/2);
    ctx.lineTo(midX + w/2, midY + h/2);
    ctx.lineTo(midX - w/2, midY + h/2);
    ctx.closePath();
  }, TONES.pants, 3.5);
  seam(()=>{ ctx.moveTo(midX - w/2, midY - h*0.18); ctx.lineTo(midX + w/2, midY - h*0.18); }, 2.5);
}


const HEADS = { front:frontHead, threeq:threeQHead, profile:profileHead, back:backHead };

function skull(){
  const { rx, ry } = AV;
  paint(()=>{
    ctx.moveTo(-rx, 0);
    ctx.bezierCurveTo(-rx, -ry*1.33, rx, -ry*1.33, rx, 0);
    ctx.bezierCurveTo(rx*0.97, ry*0.58, rx*0.56, ry, 0, ry);
    ctx.bezierCurveTo(-rx*0.56, ry, -rx*0.97, ry*0.58, -rx, 0);
    ctx.closePath();
  }, (SKINT||TONES.skin));
}
function ear(x, y, sc){
  const { rx } = AV;
  paint(()=>{ ctx.ellipse(x, y, rx*0.15*sc, rx*0.24*sc, 0, 0, 7); }, (SKINT||TONES.skin), 3.5);
  ink(()=>{ ctx.arc(x, y, rx*0.075*sc, -1.2, 1.6); }, 2.4);
}
function mouthAt(mx, my){
  const { rx, ry } = AV;
  const curve = S.smile - S.frown;
  const mw = rx*(0.46 + S.smile*0.20 - S.pucker*0.24 + S.press*0.14)*SPEC().mouthW;
  const mh = ry*(0.02 + S.jaw*0.50);
  ctx.save();
  ctx.translate(mx, my);
  if (mh < ry*0.07){
    ink(()=>{
      ctx.moveTo(-mw/2, -curve*ry*0.07);
      ctx.quadraticCurveTo(0, curve*ry*0.15 + ry*0.01, mw/2, -curve*ry*0.07);
    }, ry*(0.05 - S.press*0.018));
  } else {
    ctx.fillStyle = "#3c3733"; ctx.strokeStyle = INK; ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(-mw/2, -curve*ry*0.06);
    ctx.quadraticCurveTo(0, -mh*0.3, mw/2, -curve*ry*0.06);
    ctx.quadraticCurveTo(mw*0.55, mh*0.45, 0, mh);
    ctx.quadraticCurveTo(-mw*0.55, mh*0.45, -mw/2, -curve*ry*0.06);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.clip();
    ctx.fillStyle = "#f2efe9";
    ctx.fillRect(-mw/2, -mh*0.55, mw, mh*0.42);

}
function eyeAt(ex, ey, blink, wScale=1){
  const { rx, ry } = AV;

  const es = SPEC().eyeS;
  const ew = rx*0.195*wScale*es, eh = ry*0.125*Math.min(open,1)*es;
  if (open < 0.14){
    ink(()=>{
      ctx.moveTo(ex - ew, ey);

    }, ry*0.045);
    return;
  }
  ctx.fillStyle = "#f7f6f2";
  ctx.strokeStyle = INK; ctx.lineWidth = 2.6;
  ctx.beginPath(); ctx.ellipse(ex, ey, ew, eh, 0, 0, 7);
  ctx.fill(); ctx.stroke();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(ex, ey, ew, eh, 0, 0, 7); ctx.clip();
  ctx.fillStyle = INK;
  ctx.beginPath();
  ctx.arc(ex + S.gazeX*ew*0.45, ey + S.gazeY*eh*0.5, AV.rx*0.075*wScale, 0, 7);
  ctx.fill();
  ctx.restore();
  ink(()=>{
    ctx.moveTo(ex - ew*0.95, ey - eh*0.55);
    ctx.quadraticCurveTo(ex, ey - eh*1.35, ex + ew*0.95, ey - eh*0.55);
  }, ry*0.045);
}
function browAt(bx, by, s){
  const { rx, ry } = AV;
  const knitDip = S.browKnit * ry*0.10;
  ink(()=>{
    ctx.moveTo(bx - s*rx*0.27, by + knitDip);
    ctx.quadraticCurveTo(bx, by - ry*0.055, bx + s*rx*0.24, by + ry*0.01);
  }, ry*0.075*SPEC().browW);

function SPEC(){ return (CC && CC.spec) || CAST_PRESETS.HERO; }

function drawHairBack(band, dir, fx, fy){
  const { rx, ry } = AV;
  const kind = SPEC().hair;
  const dark = TONES.shoe;
  if (kind === "long"){
    paint(()=>{
      ctx.moveTo(-rx*1.12, -ry*0.35);
      ctx.bezierCurveTo(-rx*1.12, -ry*1.30, rx*1.12, -ry*1.30, rx*1.12, -ry*0.35);
      ctx.quadraticCurveTo(rx*1.18, ry*1.15, rx*0.85, ry*1.35);
      ctx.lineTo(-rx*0.85, ry*1.35);
      ctx.quadraticCurveTo(-rx*1.18, ry*1.15, -rx*1.12, -ry*0.35);
      ctx.closePath();
    }, dark, 3);
  }
  if (kind === "bun"){
    paint(()=>{ ctx.ellipse(0, -ry*1.18, rx*0.30, rx*0.28, 0, 0, 7); }, dark, 3);
  }
  if (kind === "braids"){
    for (const sd of [-1,1])
      paint(()=>{
        ctx.moveTo(sd*rx*0.85, -ry*0.15);
        ctx.quadraticCurveTo(sd*rx*1.15, ry*0.5, sd*rx*0.95, ry*1.35);
        ctx.lineTo(sd*rx*0.70, ry*1.30);
        ctx.quadraticCurveTo(sd*rx*0.88, ry*0.5, sd*rx*0.62, -ry*0.10);
        ctx.closePath();
      }, dark, 3);
  }
  if (kind === "curly"){
    paint(()=>{ ctx.ellipse(0, -ry*0.85, rx*1.12, ry*0.55, 0, 0, 7); }, dark, 3);
  }
}
function drawHair(band, dir, fx, fy){
  const { rx, ry } = AV;
  const kind = SPEC().hair;
  if (!kind || kind === "none") return;
  const dark = TONES.shoe;
  if (kind === "long" || kind === "bun" || kind === "braids"){
    paint(()=>{
      ctx.moveTo(-rx*0.97, -ry*0.30);
      ctx.bezierCurveTo(-rx*0.97, -ry*1.26, rx*0.97, -ry*1.26, rx*0.97, -ry*0.30);
      ctx.quadraticCurveTo(rx*0.55, -ry*0.58, 0, -ry*0.60);
      ctx.quadraticCurveTo(-rx*0.55, -ry*0.58, -rx*0.97, -ry*0.30);
      ctx.closePath();
    }, dark, 3);
    return;
  }
  if (kind === "curly"){
    for (const o of [-0.72,-0.36,0,0.36,0.72])
      paint(()=>{ ctx.ellipse(o*rx, -ry*0.92 + Math.abs(o)*ry*0.12, rx*0.28, rx*0.26, 0, 0, 7); }, dark, 3);
    return;
  }
  if (kind === "cap"){
    paint(()=>{
      ctx.moveTo(-rx*0.97, -ry*0.22);
      ctx.bezierCurveTo(-rx*0.97, -ry*1.28, rx*0.97, -ry*1.28, rx*0.97, -ry*0.22);
      ctx.quadraticCurveTo(rx*0.55, -ry*0.55, 0, -ry*0.56);
      ctx.quadraticCurveTo(-rx*0.55, -ry*0.55, -rx*0.97, -ry*0.22);
      ctx.closePath();
    }, dark, 3);
  }
  if (kind === "flat"){
    paint(()=>{
      ctx.moveTo(-rx*0.9, -ry*0.55);
      ctx.lineTo(-rx*0.85, -ry*1.12);
      ctx.lineTo(rx*0.85, -ry*1.12);
      ctx.lineTo(rx*0.9, -ry*0.55);
      ctx.quadraticCurveTo(0, -ry*0.68, -rx*0.9, -ry*0.55);
      ctx.closePath();
    }, dark, 3);
  }

    for (const sd of (band==="profile" ? [-1] : [-1,1]))
      paint(()=>{
        ctx.ellipse(sd*rx*0.82, ry*0.02, rx*0.20, rx*0.34, 0, 0, 7);
      }, dark, 3);

}
function drawGlasses(band, dir, fx, eyeY, eyeDX){
  if (!SPEC().glasses) return;
  const { rx, ry } = AV;
  const gr = rx*0.26;
  if (band === "profile"){
    ink(()=>{ ctx.arc(rx*0.42, eyeY - ry*0.03, gr, 0, 7); }, 3);
    ink(()=>{ ctx.moveTo(rx*0.42 - gr, eyeY - ry*0.03);
              ctx.lineTo(-rx*0.15, eyeY - ry*0.03); }, 2.6);
    return;
  }
  for (const sd of [-1,1])
    ink(()=>{ ctx.arc(fx + sd*eyeDX, eyeY, gr, 0, 7); }, 3);
  ink(()=>{ ctx.moveTo(fx - eyeDX + gr, eyeY); ctx.lineTo(fx + eyeDX - gr, eyeY); }, 2.6);
  ink(()=>{ ctx.moveTo(fx - eyeDX - gr, eyeY); ctx.lineTo(-rx*0.96, eyeY + ry*0.04); }, 2.4);
  ink(()=>{ ctx.moveTo(fx + eyeDX + gr, eyeY); ctx.lineTo(rx*0.96, eyeY + ry*0.04); }, 2.4);

function drawBeard(band, fx, fy){
  if (!SPEC().beard) return;
  const { rx, ry } = AV;
  paint(()=>{
    ctx.moveTo(fx - rx*0.72, ry*0.18 + fy*0.5);
    ctx.quadraticCurveTo(fx - rx*0.6, ry*0.95, fx, ry*0.98);
    ctx.quadraticCurveTo(fx + rx*0.6, ry*0.95, fx + rx*0.72, ry*0.18 + fy*0.5);
    ctx.quadraticCurveTo(fx + rx*0.4, ry*0.60 + fy*0.5, fx, ry*0.58 + fy*0.5);
    ctx.quadraticCurveTo(fx - rx*0.4, ry*0.60 + fy*0.5, fx - rx*0.72, ry*0.18 + fy*0.5);

function frontHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(S.roll * 0.85);
  const fx = clamp(F, -0.4, 0.4) * rx * 0.9;
  const fy = S.pitch * ry * 0.38;
  drawHairBack("front", dir, fx, fy);
  ear(-rx*0.98 + fx*0.12, ry*0.06 + fy*0.4, 1);
  ear( rx*0.98 + fx*0.12, ry*0.06 + fy*0.4, 1);

  drawHair("front", dir, fx, fy);

  eyeAt(fx - eyeDX, eyeY, S.blinkL); eyeAt(fx + eyeDX, eyeY, S.blinkR);
  drawGlasses("front", dir, fx, eyeY, eyeDX);

    ctx.moveTo(fx*1.1, eyeY + ry*0.06);
    ctx.lineTo(fx*1.1, eyeY + ry*0.32);
    ctx.lineTo(fx*1.1 + hook, eyeY + ry*0.36);
  }, ry*0.042);

  ctx.restore();
}

function threeQHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(S.roll * 0.7);
  const fx = dir * rx * 0.42;
  const fy = S.pitch * ry * 0.36;
  // only the trailing ear shows, pushed to the back edge
  drawHairBack("threeq", dir, fx, fy);
  ear(-dir*rx*0.92, ry*0.06 + fy*0.4, 1.05);
  skull();
  drawBeard("threeq", fx, fy);
  drawHair("threeq", dir, fx, fy);
  const eyeY = -ry*0.02 + fy;
  const nearX = fx + dir*rx*0.34, farX = fx - dir*rx*0.42;
  const browY = eyeY - ry*0.24 - S.browUp*ry*0.13 + S.browKnit*ry*0.06;
  browAt(farX, browY, -dir); browAt(nearX, browY, dir);
  eyeAt(farX, eyeY, dir>0?S.blinkL:S.blinkR, 0.62);   // far eye compressed
  eyeAt(nearX, eyeY, dir>0?S.blinkR:S.blinkL, 1);
  drawGlasses("front", dir, fx, eyeY, dir*rx*0.38);

  ink(()=>{
    ctx.moveTo(fx + dir*rx*0.06, eyeY + ry*0.04);
    ctx.lineTo(fx + dir*rx*0.10, eyeY + ry*0.30);
    ctx.lineTo(fx + dir*rx*0.24, eyeY + ry*0.34);
  }, ry*0.045);
  mouthAt(fx*0.9, ry*0.60 + fy*0.7);
  ctx.restore();
}

function profileHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(dir, 1);                     // draw facing +x, mirror for left
  ctx.rotate(S.roll * 0.5 * dir);
  const fy = S.pitch * ry * 0.3;
  // profile skull with brow shelf, nose wedge, lip step, chin
  paint(()=>{
    ctx.moveTo(-rx*0.55, ry*0.74);                              // jaw back
    ctx.bezierCurveTo(-rx*1.05, ry*0.45, -rx*1.05, -ry*0.9, -rx*0.25, -ry*1.06);
    ctx.bezierCurveTo(rx*0.25, -ry*1.18, rx*0.72, -ry*0.72, rx*0.74, -ry*0.28); // forehead
    ctx.lineTo(rx*0.70, fy - ry*0.10);                          // brow shelf
    ctx.lineTo(rx*0.98, fy + ry*0.24);                          // nose tip
    ctx.lineTo(rx*0.72, fy + ry*0.32);                          // under nose
    ctx.lineTo(rx*0.74, fy + ry*0.46);                          // upper lip
    ctx.lineTo(rx*0.62, fy + ry*0.56);                          // mouth corner step
    ctx.quadraticCurveTo(rx*0.66, ry*0.82, rx*0.30, ry*0.92);   // chin
    ctx.quadraticCurveTo(-rx*0.1, ry*1.0, -rx*0.55, ry*0.74);   // jawline
    ctx.closePath();
  }, (SKINT||TONES.skin));
  ear(-rx*0.18, ry*0.08, 1.1);
  drawHair("profile", 1, 0, fy);
  // single eye near the front edge
  eyeAt(rx*0.42, fy - ry*0.05, Math.max(S.blinkL,S.blinkR), 0.62);
  const browY = fy - ry*0.30 - S.browUp*ry*0.12;
  ink(()=>{ ctx.moveTo(rx*0.20, browY + S.browKnit*ry*0.08);
            ctx.lineTo(rx*0.62, browY - ry*0.02); }, ry*0.07);
  drawGlasses("profile", 1, 0, fy - ry*0.05, 0);
  // mouth: short line cut in from the lip step
  const curve = S.smile - S.frown;
  ink(()=>{
    ctx.moveTo(rx*0.66, fy + ry*0.50);
    ctx.quadraticCurveTo(rx*0.44, fy + ry*(0.52 + 0.1*curve) + S.jaw*ry*0.1,
                         rx*0.30, fy + ry*(0.50 - 0.08*curve));
  }, ry*0.05);
  ctx.restore();
}

function backHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(S.roll * 0.4);
