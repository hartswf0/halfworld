const POSE_ORDER = Object.keys(POSES);
const MAJORS = ["wave","pointing","thumbs up","shrug","arms crossed",
                "surprised","angry","happy","walk"];
let poseName = "neutral";
let audition = false, lastCycle = 0;
let blinkT = 0;

const poseBar = $("poseBar");
let chips = {};
const audChip = document.createElement("button");
audChip.className = "pchip aud"; audChip.textContent = "AUDITION";
audChip.addEventListener("click", ()=>{
  audition = !audition;
  audChip.classList.toggle("on", audition);
});
function mkChip(label, cls, fn){
  const b = document.createElement("button");
  b.className = cls; b.innerHTML = label;
  b.addEventListener("click", fn);
  poseBar.appendChild(b);
  return b;
}
/* pose control — referenced by chips, keys, and stage taps but never defined
   in the original file (setPose/nextPose ReferenceErrors). The rig renders
   from the bound `poseName`, which bind(C) reads off selected.pose. */
function setPose(name){
  if (!selected || !POSES[name]) return;
  selected.pose = name;
  if (typeof chips === "object" && chips){
    for (const k in chips){ if (chips[k]) chips[k].classList.remove("on"); }
    if (chips[name]) chips[name].classList.add("on");
  }
}
function nextPose(){
  if (!selected) return;
  const i = POSE_ORDER.indexOf(selected.pose);
  setPose(POSE_ORDER[(i + 1) % POSE_ORDER.length]);
}
function buildPoseChips(withScene){
  poseBar.innerHTML = ""; chips = {};
  if (withScene){
    mkChip("DEMO SCENE", "pchip aud", ()=>playScene(DEMO_SCENE));
  } else {
    poseBar.appendChild(audChip);
  }
  for (const name of POSE_ORDER){
    const k = MAJORS.indexOf(name);
    chips[name] = mkChip((k>=0 ? `<b>${k+1} </b>` : "") + name, "pchip", ()=>{
      setPose(name); audition=false; audChip.classList.remove("on");
    });
  }
  const cur = selected ? selected.pose : "neutral";
  if (chips[cur]) chips[cur].classList.add("on");
}
const MAKE_TRAITS = {
  hair:   ["none","cap","ring","flat","long","bun","curly","braids"],
  skin:   ["#e3e0d9","#cbbfae","#b7a68f","#a28b74","#8f7a64"],
  garment:["sweater","tee","dress","hoodie"],
  build:  [0.8, 1.0, 1.24],
  h:      [0.8, 1.0, 1.1],
  headS:  [0.92, 1.0, 1.16],
  glasses:[false, true],
  beard:  [false, true],
  shirt:  ["#dcdcd5","#d3d3cd","#c2c2bb","#b0b0a9"],
};
function buildMakeChips(){
  poseBar.innerHTML = ""; chips = {};
  for (const trait in MAKE_TRAITS){
    const opts = MAKE_TRAITS[trait];
    const label = ()=> trait.toUpperCase()+": "+String(selected.spec[trait]);
    const b = mkChip(label(), "pchip", ()=>{
      const i = opts.findIndex(o=>String(o)===String(selected.spec[trait]));
      selected.spec[trait] = opts[(i+1) % opts.length];
      rebuildChar(selected);
      b.textContent = label();
    });
  }
}
function buildDrawChips(){
  poseBar.innerHTML = ""; chips = {};
  mkChip("CLEAR MARKS", "pchip", ()=>{
    if (selected) selected.decals = { head:[], torso:[] };
  });
}
function buildCastChips(){
  const bar = $("castBar");
  bar.innerHTML = "";
  for (const C of characters){
    const b = document.createElement("button");
    b.className = "cchip" + (C===selected ? " on" : "");
    b.textContent = C.id;
    b.addEventListener("click", ()=>selectChar(C.id));
    bar.appendChild(b);
  }
}
function selectChar(id){
  if (view === "ATLAS"){
    atlasFilter = atlasFilter===id ? null : id;
    const ss = scenesOf(id);
    hint.textContent = atlasFilter
      ? id + " appears in " + ss.length + " scene" + (ss.length===1?"":"s") +
        (ss.length ? ": " + ss.join(", ") : "")
      : "";
    buildCastChips();
    return;
  }
  const C = characters.find(k=>k.id===id);
  if (!C) return;
  selected = C;
  buildCastChips();
  if (drive!=="MAKE" && drive!=="DRAW") buildPoseChips(drive==="GAME");
}

function applyPose(t){
  const p = POSES[poseName] || {};
  if (drive==="PUPPET" && audition && CC===selected && t - lastCycle > 2100){ lastCycle = t; nextPose(); }

  const FLD = ["yaw","pitch","roll","jaw","smile","frown","pucker","press",
               "browUp","browKnit","squint","wide","gazeX","gazeY"];
  for (const k of FLD) S[k] = lerp(S[k], p[k] ?? 0, 0.14);
  S.headX = lerp(S.headX, (p.yaw ?? 0)*0.35, 0.1);
  S.headY = lerp(S.headY, 0, 0.1);
  S.tilt  = lerp(S.tilt, (p.roll ?? 0)*0.4, 0.1);
  if (drive !== "GAME"){
    S.bodyX = lerp(S.bodyX, 0, 0.08);
    if (!(drive==="CAPTURE" && CC===selected)){
      if (p.facing !== undefined) Ftgt = p.facing;
      else if (p.yaw !== undefined) Ftgt = p.yaw*0.45;
      // otherwise external face() commands keep their value
    }
  }
  S.faceSeen = true;

  if (t - blinkT > 3200) blinkT = t;
  const bt = t - blinkT;
  S.blinkL = S.blinkR = bt < 160 ? Math.sin(bt/160*Math.PI) : 0;

  if (p.fx === "nod")    S.pitch = 0.42*Math.sin(t/260);
  if (p.fx === "shake"){ S.yaw = 0.6*Math.sin(t/240); if (drive==="PUPPET") Ftgt = S.yaw*0.5; }
  if (p.fx === "bounce") S.pitch = -0.15 + 0.12*Math.sin(t/140);
}

function rot(v, a){
  const c = Math.cos(a), s = Math.sin(a);
  return { x: v.x*c - v.y*s, y: v.x*s + v.y*c };
}

/* ───────────── [3b] game drive ─────────────
   The figure is a token in pseudo-3D: x across, d = depth (0 far,
   1 near). Scale + ground height come from d. Facing comes from
   velocity: sideways -> profile, away -> back, toward -> front.
   Inputs: drag / tap sets a move target; WASD-arrows steer. */
function mkGame(x=0.5, d=0.72){ return { x, d, tx:x, td:d, vx:0, vd:0, speed:0, walkPh:0 }; }
let game = mkGame();
const keys = {};
window.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (/^[1-9]$/.test(k) && drive!=="CAPTURE"){
    const name = MAJORS[+k-1];
    if (name){ setPose(name); audition=false; audChip.classList.remove("on"); }
  }
  if (k===" " && drive!=="CAPTURE"){ nextPose(); e.preventDefault(); }
});
window.addEventListener("keyup", e=>{ keys[e.key.toLowerCase()] = false; });

function stagePoint(e){
  const r = canvas.getBoundingClientRect();
  const cx = (e.clientX - r.left) / r.width;
  const cy = (e.clientY - r.top) / r.height;
  return { x: clamp(cx, 0.08, 0.92),
           d: clamp((cy - 0.30) / 0.62, 0.05, 1) };
}
let dragging = false;
let paintStroke = null;   // { C, part, pts }
function canvasPoint(e){
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX - r.left)/r.width*canvas.width,
           y:(e.clientY - r.top)/r.height*canvas.height };
}
function charAt(pt){
  const list = [...characters].sort((a,b)=>b.game.d - a.game.d); // near first
  for (const C of list){
    const w = C._world;
    const top = w.wy - (C.M.groundY - (C.M.shoulderY - C.M.ry*2.4))*w.s;
    if (Math.abs(pt.x - w.wx) < C.M.shw*0.9*w.s && pt.y > top - 10 && pt.y < w.wy + 14)
      return C;
  }
  return null;
}
function toFigure(C, pt){
  const w = C._world;
  return { x:(pt.x - w.wx)/w.s + C.M.W/2, y:(pt.y - w.wy)/w.s + C.M.groundY };
}
stage.addEventListener("pointerdown", e=>{
  if (gate.style.display !== "none") return;
  const pt = canvasPoint(e);
  if (view === "ATLAS"){
    for (const r of atlasRects){
      if (pt.x>=r.x && pt.x<=r.x+r.w && pt.y>=r.y && pt.y<=r.y+r.h){
        if (r.act.save){
          const n = saveScene();
          hint.textContent = "saved as " + n + " — thumbnail on next stage view";
          view = "STAGE"; applyView();
          pendingThumb = n;
        }
        if (r.act.load){ loadScene(r.act.load); view = "STAGE"; applyView(); }
        return;
      }
    }
    return;
  }
  if (drive === "DRAW"){
    const C = charAt(pt) || selected;
    if (!C || !C._anchors) return;
    const f = toFigure(C, pt);
    const a = C._anchors;
    const part = dist(f, a.headC) < C.M.ry*1.6 ? "head" : "torso";
    const loc = part === "head"
      ? { x:(f.x-a.headC.x)/C.M.ry, y:(f.y-a.headC.y)/C.M.ry }
      : { x:(f.x-a.cx)/C.M.shw,     y:(f.y-a.shoulderY)/C.M.shw };
    paintStroke = { C, part, pts:[loc] };
    return;
  }
  if (drive === "WORLD"){
    const p = stagePoint(e);
    if (armedAsset){
      placed.push({ type:armedAsset, x:p.x, d:p.d, scale:1 });
      worldSel = placed.length - 1;
      armedAsset = null;
      buildWorldChips();
      hint.textContent = HINTS.WORLD;
      return;
    }
    const hi = assetAt(pt);
    worldSel = hi;
    dragAsset = hi >= 0;
    return;
  }
  if (drive === "GAME"){
    const hit = charAt(pt);
    if (hit && hit !== selected){ selectChar(hit.id); return; }
    dragging = true;
    const p = stagePoint(e); selected.game.tx = p.x; selected.game.td = p.d;
    return;
  }
  if (drive === "PUPPET"){
    const hit = charAt(pt);
    if (hit && hit !== selected){ selectChar(hit.id); return; }
    nextPose(); return;
  }
  if (drive === "MAKE"){
    const hit = charAt(pt);
    if (hit) selectChar(hit.id);
    return;
  }
  neutral = null;
  hint.textContent = "recentered — hold a relaxed straight-ahead pose";
  setTimeout(()=>{ if (drive==="CAPTURE") hint.textContent = HINTS.CAPTURE; }, 1800);
});
stage.addEventListener("pointermove", e=>{
  const pt = canvasPoint(e);
  if (paintStroke && drive==="DRAW"){
    const C = paintStroke.C, a = C._anchors;
    const f = toFigure(C, pt);
    const loc = paintStroke.part === "head"
      ? { x:(f.x-a.headC.x)/C.M.ry, y:(f.y-a.headC.y)/C.M.ry }
      : { x:(f.x-a.cx)/C.M.shw,     y:(f.y-a.shoulderY)/C.M.shw };
    const last = paintStroke.pts[paintStroke.pts.length-1];
    if (Math.hypot(loc.x-last.x, loc.y-last.y) > 0.02) paintStroke.pts.push(loc);
    return;
  }
  if (dragging && drive==="GAME"){
    const p = stagePoint(e); selected.game.tx = p.x; selected.game.td = p.d;
  }
  if (dragAsset && drive==="WORLD" && worldSel >= 0){
    const p = stagePoint(e);
    placed[worldSel].x = p.x; placed[worldSel].d = p.d;
  }
});
window.addEventListener("pointerup", ()=>{
  dragging = false; dragAsset = false;
  if (paintStroke && paintStroke.pts.length > 1)
    paintStroke.C.decals[paintStroke.part].push({ pts:paintStroke.pts });
  paintStroke = null;
});

function stepGame(t, isSel){
  const kx = (isSel && drive==="GAME") ? ((keys["d"]||keys["arrowright"]?1:0) - (keys["a"]||keys["arrowleft"]?1:0)) : 0;
  const kd = (isSel && drive==="GAME") ? ((keys["s"]||keys["arrowdown"]?1:0) - (keys["w"]||keys["arrowup"]?1:0)) : 0;
  let vx, vd;
  if (kx || kd){
    vx = kx*0.0042; vd = kd*0.0036;
    game.tx = game.x; game.td = game.d;
  } else {
    const dx = game.tx - game.x, dd = game.td - game.d;
    const m = Math.hypot(dx, dd);
    const sp = Math.min(m*0.22, 0.0048);        // decelerate into the target
    vx = m>0.008 ? dx/m*sp : 0;
    vd = m>0.008 ? dd/m*sp : 0;
  }
  game.vx = lerp(game.vx, vx, 0.2);
  game.vd = lerp(game.vd, vd, 0.2);
  game.x = clamp(game.x + game.vx, 0.06, 0.94);
  game.d = clamp(game.d + game.vd, 0.05, 1);
  game.speed = Math.hypot(game.vx, game.vd*1.3);

  if (game.speed > 0.0012){
    game.walkPh += game.speed * 900;
    if (Math.abs(game.vx) > Math.abs(game.vd)*0.85)
      Ftgt = Math.sign(game.vx) * 1.0;                    // profile
    else if (game.vd < -0.0004)
      Ftgt = (Math.abs(Ftgt)>1.3 ? Math.sign(Ftgt) : (Math.sign(F)||1)) * 1.6; // back
    else if (game.vd > 0.0004) Ftgt = 0;                  // front
  } else if (game.speed > 0.0006){
    game.walkPh += game.speed * 900;                      // finish the step, keep facing
  }
}

/* ───────────── [4] rig config ───────────── */
const INK = "#141414", PAPER = "#ebebe8";
const LW = 4;
let AV = null, TONES = null, TONESETS = null;

function mkTone(base, dotR, gap){
  const c = document.createElement("canvas");
  c.width = gap; c.height = gap;
  const g = c.getContext("2d");
  g.fillStyle = "#1c1c1c";
  g.beginPath(); g.arc(gap/2, gap/2, dotR, 0, 7); g.fill();
  return { base, pat: mainCtx.createPattern(c, "repeat") };
}
const solid = base => ({ base, pat:null });

function initRig(){
  const H = canvas.height, W = canvas.width;
  TONESETS = {
    sheet: {
      skin:    mkTone("#e3e0d9", 0.62, 4.0),
      sweater: mkTone("#d3d3cd", 1.10, 4.0),
      pants:   mkTone("#ccccc6", 1.25, 4.0),
      shoe:    mkTone("#c2c2bc", 1.35, 3.4),
    },
    clean: {   // no outlines: tone steps carry the silhouettes
      skin:    mkTone("#eae7e0", 0.55, 4.0),
      sweater: mkTone("#c6c6bf", 1.20, 4.0),
      pants:   mkTone("#b4b4ad", 1.35, 4.0),
      shoe:    mkTone("#9d9d96", 1.45, 3.4),
    },
    post: {    // solid high-contrast field for GRID/MESH dotify
      skin:    solid("#8a8a8a"),
      sweater: solid("#2a2a2a"),
      pants:   solid("#3a3a3a"),
      shoe:    solid("#161616"),
    },
  };
  TONES = TONESETS[STYLE.tones];
  buf = document.createElement("canvas");
  buf.width = W; buf.height = H;
  bufCtx = buf.getContext("2d", { willReadFrequently:true });
  if (!characters.length){
    // spread the cast evenly across the full width, staggered in depth
    const xs = [0.08, 0.22, 0.36, 0.50, 0.64, 0.78, 0.92, 0.29];
    const ds = [0.44, 0.82, 0.40, 0.88, 0.42, 0.80, 0.46, 0.62];
    Object.keys(CAST_PRESETS).forEach((id, i)=>{
      spawnChar(id, CAST_PRESETS[id], xs[i] ?? 0.5, ds[i] ?? 0.8);
    });
    selected = characters[0];
    bind(selected);
  }
}

function easePt(cur, tgt, a=0.26){
  if (!cur) return { x:tgt.x, y:tgt.y };
  return { x:lerp(cur.x,tgt.x,a), y:lerp(cur.y,tgt.y,a) };
}

/* ───────────── [4b] characters — the cast ─────────────
   Every character is spec + metrics + its own signal state.
   bind(C) points the module globals at C so all drawing and
   drive code runs unchanged per character. */
const CAST_PRESETS = {
  HERO: { hair:"none", glasses:false, beard:false, headS:1.00, build:1.00, h:1.00,
          browW:1.0, eyeS:1.00, mouthW:1.00, shirt:"#d3d3cd", skin:"#e3e0d9", garment:"sweater" },
  SLIM: { hair:"cap",  glasses:false, beard:false, headS:0.92, build:0.80, h:1.10,
          browW:0.8, eyeS:0.90, mouthW:0.85, shirt:"#c2c2bb", skin:"#cbbfae", garment:"sweater" },
  BOSS: { hair:"none", glasses:false, beard:true,  headS:1.05, build:1.24, h:0.94,
          browW:1.6, eyeS:0.85, mouthW:1.10, shirt:"#b8b8b1", skin:"#a28b74", garment:"sweater" },
  PROF: { hair:"ring", glasses:true,  beard:false, headS:1.00, build:0.95, h:1.00,
          browW:1.1, eyeS:1.00, mouthW:0.90, shirt:"#cbcbc4", skin:"#e3e0d9", garment:"sweater" },
  KID:  { hair:"flat", glasses:false, beard:false, headS:1.16, build:0.80, h:0.80,
          browW:0.9, eyeS:1.30, mouthW:0.80, shirt:"#dcdcd5", skin:"#b7a68f", garment:"tee" },
  NOVA: { hair:"long", glasses:false, beard:false, headS:1.00, build:0.88, h:1.04,
          browW:0.85, eyeS:1.10, mouthW:0.95, shirt:"#c8c8c1", skin:"#8f7a64", garment:"dress" },
  JUNE: { hair:"bun",  glasses:false, beard:false, headS:0.98, build:0.92, h:0.98,
          browW:0.9, eyeS:1.05, mouthW:0.90, shirt:"#d6d6cf", skin:"#cbbfae", garment:"tee" },
  ACE:  { hair:"curly",glasses:false, beard:false, headS:1.02, build:1.05, h:1.02,
          browW:1.2, eyeS:0.95, mouthW:1.00, shirt:"#bfbfb8", skin:"#e3e0d9", garment:"hoodie" },
};
let characters = [], selected = null;

function shade(hex, amt){
  const n = parseInt(hex.slice(1),16);
  const c = v => clamp(v+amt,0,255);
  const r=c(n>>16), g=c((n>>8)&255), b=c(n&255);
  return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");
}

function mkMetrics(spec){
  const H = canvas.height, W = canvas.width;
  const hs = spec.h, bs = spec.build;
  const groundY = H*0.94;
  const ry = H*0.118*spec.headS*hs, rx = ry*0.82;
  const baseR = H*0.118*0.82;
  const shoulderY = groundY - H*0.485*hs;
  const hipY = groundY - H*0.275*hs;
  return {
    W, H, groundY, hipY, shoulderY, rx, ry,
    shw: baseR*2*1.42*hs*bs, hipW: baseR*2*0.72*hs*bs,
    L1: H*0.115*hs, L2: H*0.105*hs,
    LT: H*0.130*hs, LS: H*0.125*hs,
    handLen: H*0.045*hs*(0.5 + 0.5*bs),
    arms: { L:{el:null,wr:null}, R:{el:null,wr:null} },
    legs: { L:{k:null,a:null},  R:{k:null,a:null} },
  };
}
function hexLum(hex){
  const n = parseInt(hex.slice(1),16);
  return ((n>>16)*0.299 + ((n>>8)&255)*0.587 + (n&255)*0.114)/255;
}
function mkCharTones(spec){
  const skin = spec.skin || "#e3e0d9";
  const sl = hexLum(skin);
  const skinDot = 0.5 + (1-sl)*1.5;               // deeper tone = denser screen
  const postGray = Math.round(0x58 + sl*0x60);
  return {
    sweater: {
      sheet: mkTone(spec.shirt, 1.10, 4.0),
      clean: mkTone(shade(spec.shirt,-16), 1.20, 4.0),
      post:  solid("#2a2a2a"),
    },
    skin: {
      sheet: mkTone(skin, skinDot, 4.0),
      clean: mkTone(shade(skin,-8), skinDot*1.05, 4.0),
      post:  solid("#"+((postGray<<16)|(postGray<<8)|postGray).toString(16).padStart(6,"0")),
    },
  };
}
function spawnChar(id, spec, x, d){
  const C = {
    id, spec:{...spec},
    M:null, S:mkSignals(), F:0, Ftgt:0, pose:"neutral",
    game:mkGame(x, d), handSm:{L:null,R:null},
    decals:{ head:[], torso:[] },
    _world:{wx:0,wy:0,s:1}, _anchors:null, tones:null,
  };
  C.M = mkMetrics(C.spec);
  C.tones = mkCharTones(C.spec);
  characters.push(C);
  if (!selected) selected = C;
  return C;
}
function rebuildChar(C){
  const old = C.M;
  C.M = mkMetrics(C.spec);
  if (old){ C.M.arms = old.arms; C.M.legs = old.legs; }
  C.tones = mkCharTones(C.spec);
}
function bind(C){
  CC = C; S = C.S; AV = C.M; F = C.F; Ftgt = C.Ftgt;
  poseName = C.pose; game = C.game; handSm = C.handSm;
  SWEATER = (C.tones && C.tones.sweater && C.tones.sweater[STYLE.tones]) || (TONES && TONES.sweater);
  SKINT   = (C.tones && C.tones.skin && C.tones.skin[STYLE.tones]) || (TONES && (SKINT||TONES.skin));
}
function unbind(C){
  C.F = F; C.Ftgt = Ftgt; C.pose = poseName;
}
function solveElbow(sh, wr, L1, L2){
  const dx = wr.x-sh.x, dy = wr.y-sh.y;
  let d = clamp(Math.hypot(dx,dy), Math.abs(L1-L2)*1.05, (L1+L2)*0.995);
  const a = Math.atan2(dy,dx);
  const off = Math.acos(clamp((L1*L1 + d*d - L2*L2)/(2*L1*d), -1, 1));
  const e1 = { x: sh.x + Math.cos(a+off)*L1, y: sh.y + Math.sin(a+off)*L1 };
  const e2 = { x: sh.x + Math.cos(a-off)*L1, y: sh.y + Math.sin(a-off)*L1 };
  return e1.y >= e2.y ? e1 : e2;
}

function restArm(AJ, side, t){
  const { L1, L2 } = AV;
  const sway = Math.sin(t/1000 + (side<0?0:2.1)) * 0.015;
  const d1 = norm({ x: side*0.14 + sway, y: 0.99 });
  const el = { x:AJ.x + d1.x*L1, y:AJ.y + d1.y*L1 };
  const d2 = norm({ x: side*0.04, y: 1 });
  return { el, wr:{ x:el.x + d2.x*L2, y:el.y + d2.y*L2 } };
}

function walkArm(slot, AJ, t, ph){
  const { L1, L2 } = AV;
  const p = ph + (slot==="L"?0:Math.PI);
  const d1 = norm({ x: 0.38*Math.sin(p), y: 0.95 });
  const d2 = norm({ x: 0.22*Math.sin(p-0.5), y: 1 });
  const el = { x:AJ.x + d1.x*L1, y:AJ.y + d1.y*L1 };
  return { el, wr:{ x:el.x + d2.x*L2, y:el.y + d2.y*L2 } };
}
function walkLeg(slot, HJ, ph){
  const { LT, LS } = AV;
  const p = ph + (slot==="L"?Math.PI:0);
  const d1 = norm({ x: 0.5*Math.sin(p), y: 1 });
  const kneeBend = Math.max(0, -Math.sin(p-0.9))*0.55;
  const d2 = norm({ x: 0.5*Math.sin(p) - kneeBend*0.3, y: 1 });
  const k = { x:HJ.x + d1.x*LT, y:HJ.y + d1.y*LT };
  return { k, a:{ x:k.x + d2.x*LS, y:k.y + d2.y*LS } };
}

function armTargets(slot, AJ, side, t){
  if (drive !== "CAPTURE"){
    const p = POSES[poseName] || {};
    if (drive==="GAME" && game.speed > 0.0006) return walkArm(slot, AJ, t, game.walkPh);
    if (p.fx === "walk") return walkArm(slot, AJ, t, t/360);
    const spec = p[slot==="L"?"armL":"armR"];
    if (!spec) return restArm(AJ, side, t);
    let d1 = norm({ x:spec.d1[0], y:spec.d1[1] });
    let d2 = norm({ x:spec.d2[0], y:spec.d2[1] });
    if (p.fx === "wave" && slot==="R") d2 = rot(d2, 0.45*Math.sin(t/170));
    const el = { x:AJ.x + d1.x*AV.L1, y:AJ.y + d1.y*AV.L1 };
    return { el, wr:{ x:el.x + d2.x*AV.L2, y:el.y + d2.y*AV.L2 } };
  }
  const cap = capArms[slot];
  const { L1, L2, shw } = AV;
  if (cap && cap.elVis && cap.wrVis){
    const d1 = norm({ x:cap.el.x-cap.sh.x, y:cap.el.y-cap.sh.y });
    const d2 = norm({ x:cap.wr.x-cap.el.x, y:cap.wr.y-cap.el.y });
    const el = { x:AJ.x + d1.x*L1, y:AJ.y + d1.y*L1 };
    return { el, wr:{ x:el.x + d2.x*L2, y:el.y + d2.y*L2 } };
  }
  let wrCap = (cap && cap.wrVis) ? cap.wr : null;
  if (!wrCap){
    const hand = nearestHand(slot);
    if (hand) wrCap = px(hand[0]);
  }
  if (wrCap && cap && capShoulders){
    const scale = shw / capShoulders.w;
    const tw = { x: AJ.x + (wrCap.x - cap.sh.x)*scale,
                 y: AJ.y + (wrCap.y - cap.sh.y)*scale };
    return { el: solveElbow(AJ, tw, L1, L2), wr: tw };
  }
  return restArm(AJ, side, t);
}

function legTargets(slot, HJ, side, t){
  const { LT, LS, hipW } = AV;
  if (drive !== "CAPTURE"){
    const p = POSES[poseName] || {};
    if (drive==="GAME" && game.speed > 0.0006) return walkLeg(slot, HJ, game.walkPh);
    if (p.fx === "walk") return walkLeg(slot, HJ, t/360);
    const k = { x:HJ.x + side*hipW*0.05, y:HJ.y + LT };
    return { k, a:{ x:k.x, y:k.y + LS } };
  }
  const cap = capLegs[slot];
  if (cap && cap.kVis && cap.aVis && capHips){
    const d1 = norm({ x:cap.k.x-cap.hip.x, y:cap.k.y-cap.hip.y });
    const d2 = norm({ x:cap.a.x-cap.k.x,  y:cap.a.y-cap.k.y  });
    const k = { x:HJ.x + d1.x*LT, y:HJ.y + d1.y*LT };
    return { k, a:{ x:k.x + d2.x*LS, y:k.y + d2.y*LS } };
  }
  const k = { x:HJ.x + side*hipW*0.05, y:HJ.y + LT };
  return { k, a:{ x:k.x, y:k.y + LS } };
}

function nearestHand(slot){
  if (!capHands.length) return null;
  if (capHands.length === 2){
    const sorted = [...capHands].sort((a,b)=> px(a[0]).x - px(b[0]).x);
    return slot==="L" ? sorted[0] : sorted[1];
  }
  const w = px(capHands[0][0]);
  const dL = w.x, dR = canvas.width - w.x;
  return (slot==="L" ? dL<=dR : dR<dL) ? capHands[0] : null;
}

/* ---------- paint helpers (style-aware) ---------- */
function paint(pathFn, tone, lw=LW){
  ctx.beginPath(); pathFn();
  ctx.fillStyle = tone.base; ctx.fill();
  if (tone.pat){ ctx.fillStyle = tone.pat; ctx.fill(); }
  if (STYLE.outline){
    ctx.strokeStyle = INK; ctx.lineWidth = lw;
    ctx.lineJoin = "round"; ctx.stroke();
  }
}
function limb(pathFn, tone, lw){
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  if (STYLE.outline){
    ctx.strokeStyle = INK; ctx.lineWidth = lw + LW*1.9;
    ctx.beginPath(); pathFn(); ctx.stroke();
  }
  ctx.strokeStyle = tone.base; ctx.lineWidth = lw;
  ctx.beginPath(); pathFn(); ctx.stroke();
  if (tone.pat){
    ctx.strokeStyle = tone.pat; ctx.lineWidth = lw;
    ctx.beginPath(); pathFn(); ctx.stroke();
  }
}
function ink(pathFn, lw=3){
  ctx.strokeStyle = INK; ctx.lineWidth = lw;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath(); pathFn(); ctx.stroke();
}
// garment seams (hem, soles, back seam) follow the style; facial ink doesn't
function seam(pathFn, lw=3){ if (STYLE.outline) ink(pathFn, lw); }

/* ───────────── [5] compositor ───────────── */
function band(){
  const a = Math.abs(F);
  return a<0.4 ? "front" : a<0.85 ? "threeq" : a<1.3 ? "profile" : "back";
}

/* the stage — a horizon and a receding floor the cast stands on.
   Drawn into whichever buffer is active, so MESH re-dots it into scene grain. */
function drawStageFloor(W, H){
  const horizon = H*0.50, near = H*0.965;
  // sky/floor split
  const g = ctx.createLinearGradient(0, horizon, 0, near);
  g.addColorStop(0, "rgba(20,20,20,0.02)");
  g.addColorStop(1, "rgba(20,20,20,0.13)");
  ctx.fillStyle = g; ctx.fillRect(0, horizon, W, near - horizon);
  // horizon line
  ctx.strokeStyle = "rgba(20,20,20,0.35)"; ctx.lineWidth = Math.max(1, H*0.003);
  ctx.beginPath(); ctx.moveTo(0, horizon); ctx.lineTo(W, horizon); ctx.stroke();
  // receding depth rails (perspective toward centre)
  ctx.strokeStyle = "rgba(20,20,20,0.12)"; ctx.lineWidth = Math.max(1, H*0.002);
  const cx = W/2;
  for (let i = -6; i <= 6; i++){
    const fx = cx + i*(W/12);
    ctx.beginPath(); ctx.moveTo(cx + i*(W/72), horizon); ctx.lineTo(fx, near); ctx.stroke();
  }
  // depth bands
  for (let k = 1; k <= 5; k++){
    const y = horizon + (near - horizon)*Math.pow(k/5, 1.7);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}
function drawAvatar(t){
  const W = canvas.width, H = canvas.height;
  const list = [
    ...characters.map(C=>({ kind:"char", d:C.game.d, C })),
    ...placed.map((it,i)=>({ kind:"asset", d:it.d, it, i })),
  ].sort((a,b)=>a.d - b.d);

  const renderCast = ()=>{
    for (const item of list){
      if (item.kind === "asset"){ drawPlacedAsset(item.it); continue; }
      const C = item.C;
      bind(C);
      let wx = C.game.x * W;
      let wy = lerp(H*0.52, H*0.95, C.game.d);
      let sc = lerp(0.40, 0.74, C.game.d);
      if (drive === "CAPTURE" && C === selected) wx += S.bodyX * W * 0.06;
      ctx.save();
      ctx.translate(wx, wy); ctx.scale(sc, sc); ctx.translate(-W/2, -AV.groundY);
      drawFigure(t);
      ctx.restore();
      C._world = { wx, wy, s:sc };
      unbind(C);
    }
  };

  if (STYLE.post){
    ctx = bufCtx;
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,W,H);
    drawStageFloor(W, H);
    renderCast();
    ctx = mainCtx;
    dotify(STYLE.post);
  } else {
    ctx.fillStyle = PAPER; ctx.fillRect(0,0,W,H);
    drawStageFloor(W, H);
    renderCast();
  }

  if (drive==="WORLD" && worldSel >= 0 && placed[worldSel] && placed[worldSel]._world){
    const w = placed[worldSel]._world;
    ctx.strokeStyle = "rgba(20,20,20,0.5)";
    ctx.lineWidth = 2; ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.ellipse(w.wx, w.wy + 4, w.u*0.6, w.u*0.09, 0, 0, 7);
    ctx.stroke(); ctx.setLineDash([]);
  }
  // selection ring drawn on top so it survives post styles
  if (selected && characters.length > 1){
    const w = selected._world;
    ctx.strokeStyle = "rgba(20,20,20,0.5)";
    ctx.lineWidth = 2; ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.ellipse(w.wx, w.wy + 6, selected.M.hipW*1.8*w.s, selected.M.hipW*0.22*w.s, 0, 0, 7);
    ctx.stroke(); ctx.setLineDash([]);
  }

  if (drive === "CAPTURE" && camOn) drawInset();
}

/* halftone the field buffer onto the page: dot radius = darkness */
function dotify(post){
  const { W, H } = AV;
  const cell = post.cell;
  ctx.fillStyle = "#fdfdfa"; ctx.fillRect(0,0,W,H);
  if (post.bg === "lines"){
    ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let y=2; y<H; y+=4){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
    ctx.stroke();
  } else {
    ctx.fillStyle = "rgba(0,0,0,0.10)";
    for (let y=cell/2; y<H; y+=cell)
      for (let x=cell/2; x<W; x+=cell){
        ctx.beginPath(); ctx.arc(x,y,0.8,0,7); ctx.fill();
      }
  }
  const img = bufCtx.getImageData(0,0,W,H).data;
  ctx.fillStyle = "#0a0a0a";
  for (let y=Math.floor(cell/2); y<H; y+=cell)
    for (let x=Math.floor(cell/2); x<W; x+=cell){
      const i = (y*W + x)*4;
      const lum = (img[i]*0.299 + img[i+1]*0.587 + img[i+2]*0.114)/255;
      const d = 1 - lum;
      if (d < 0.10) continue;
      ctx.beginPath();
      ctx.arc(x, y, Math.pow(d, 0.9)*cell*0.62*post.gain, 0, 7);
      ctx.fill();
    }
}

function drawFigure(t){
  const { W, groundY, hipY, shoulderY, shw, hipW, rx, ry } = AV;
  const bd = band();
  const dir = Math.sign(F) || 1;
  const sq = bd==="front" ? 1 : bd==="threeq" ? 0.84 : bd==="profile" ? 0.58 : 1;
  const shwE = shw*sq, hipWE = hipW*(0.55 + 0.45*sq);
  const cx = W/2;

  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.beginPath();
  ctx.ellipse(cx, groundY + 5, hipW*1.6, hipW*0.20, 0, 0, 7);
  ctx.fill();

  // band-aware girdles: in profile both collapse to a near-single column,
  // the near-side joint sits slightly forward of the far one
  let aL = -shwE/2 + shwE*0.03, aR = shwE/2 - shwE*0.03;
  let hL = -hipWE/2, hR = hipWE/2;
  if (bd === "profile"){
    aL = dir>0 ? -shw*0.055 : -shw*0.105;
    aR = dir>0 ?  shw*0.105 :  shw*0.055;
    hL = dir>0 ? -AV.hipW*0.05 : -AV.hipW*0.12;
    hR = dir>0 ?  AV.hipW*0.12 :  AV.hipW*0.05;
  } else if (bd === "threeq"){
    aL = -shwE*(dir>0?0.40:0.47); aR = shwE*(dir>0?0.47:0.40);
    hL = -hipWE*(dir>0?0.40:0.50); hR = hipWE*(dir>0?0.50:0.40);
  }
  const HJL = { x:cx + hL, y:hipY }, HJR = { x:cx + hR, y:hipY };
  const tiltDy = Math.tan(S.tilt*0.6)*shwE/2;
  const AJL = { x:cx + aL, y:shoulderY - tiltDy };
  const AJR = { x:cx + aR, y:shoulderY + tiltDy };

  for (const [slot, HJ, side] of [["L",HJL,-1],["R",HJR,1]]){
    const tgt = legTargets(slot, HJ, side, t);
    const l = AV.legs[slot];
    l.k = easePt(l.k, tgt.k); l.a = easePt(l.a, tgt.a);
  }
  for (const [slot, AJ, side] of [["L",AJL,-1],["R",AJR,1]]){
    const tgt = armTargets(slot, AJ, side, t);
    const a = AV.arms[slot];
    a.el = easePt(a.el, tgt.el, 0.28); a.wr = easePt(a.wr, tgt.wr, 0.28);
  }

  // painter order by band: in profile the far arm goes behind the torso
  const nearSlot = dir>0 ? "R" : "L", farSlot = dir>0 ? "L" : "R";
  const farBehind = (bd==="profile" || bd==="threeq");

  if (farBehind) drawArm(farSlot, farSlot==="L"?AJL:AJR, t,
    (drive!=="CAPTURE" && (POSES[poseName]||{}).prop) || null);

  drawLegs(HJL, HJR, bd, dir);
  drawTorso(cx, shoulderY, hipY, shwE, hipWE, bd);
  if (CC && CC.decals.torso.length){
    ctx.save(); ctx.translate(cx, shoulderY);
    for (const st of CC.decals.torso)
      ink(()=>{
        ctx.moveTo(st.pts[0].x*AV.shw, st.pts[0].y*AV.shw);
        for (const q of st.pts.slice(1)) ctx.lineTo(q.x*AV.shw, q.y*AV.shw);
      }, 3.2);
    ctx.restore();
  }
  drawNeckAndHead(cx, shoulderY, shwE, bd, dir, t);

  const prop = (drive!=="CAPTURE" && (POSES[poseName]||{}).prop) || null;
  if (prop === "box") drawBox(AV.arms.L.wr, AV.arms.R.wr);

  if (farBehind){ drawArm(nearSlot, nearSlot==="L"?AJL:AJR, t, prop); }
  else { drawArm("L", AJL, t, prop); drawArm("R", AJR, t, prop); }
}

function drawLegs(HJL, HJR, bd, dir){
  const order = (bd==="profile" || bd==="threeq")
    ? (dir>0 ? [["L",HJL],["R",HJR]] : [["R",HJR],["L",HJL]])   // far leg first
    : [["L",HJL],["R",HJR]];
  for (const [slot, HJ] of order){
    const l = AV.legs[slot];
    limb(()=>{ ctx.moveTo(HJ.x, HJ.y);
               ctx.lineTo(l.k.x, l.k.y);
               ctx.lineTo(l.a.x, l.a.y); }, TONES.pants, AV.hipW*0.50);
    const fw = AV.hipW*0.46;
    const toe = bd==="profile" ? dir*fw*0.40 : (slot==="L"?-1:1)*fw*0.16;
    const fx0 = l.a.x + toe;
    const fy0 = l.a.y + AV.hipW*0.16;
    paint(()=>{ ctx.ellipse(fx0, fy0, fw*0.60, fw*0.30, 0, 0, 7); }, TONES.shoe);
    seam(()=>{ ctx.moveTo(fx0-fw*0.58, fy0+fw*0.20); ctx.lineTo(fx0+fw*0.58, fy0+fw*0.20); }, 3);
  }
}

function drawTorso(cx, shoulderY, hipY, shwE, hipWE, bd){
  const g = SPEC().garment || "sweater";
  const hemY = hipY + AV.hipW*(g==="dress" ? 0.95 : 0.26);
  const hemW = g==="dress" ? 0.62 : 0.40;
  ctx.save();
  ctx.translate(cx, hipY);
  const sy = shoulderY - hipY;
  paint(()=>{
    ctx.moveTo(-shwE*hemW, hemY - hipY);
    ctx.quadraticCurveTo(-shwE*0.47, sy*0.45, -shwE*0.44, sy + shwE*0.10);
    ctx.quadraticCurveTo(-shwE*0.44, sy - shwE*0.075, -shwE*0.20, sy - shwE*0.085);
    ctx.quadraticCurveTo(0, sy - shwE*0.10, shwE*0.20, sy - shwE*0.085);
    ctx.quadraticCurveTo(shwE*0.44, sy - shwE*0.075, shwE*0.44, sy + shwE*0.10);
    ctx.quadraticCurveTo(shwE*0.47, sy*0.45, shwE*hemW, hemY - hipY);
    ctx.closePath();
  }, SWEATER || TONES.sweater);
  if (g === "hoodie"){
    seam(()=>{ ctx.moveTo(-shwE*0.20, hemY-hipY-AV.hipW*0.55);
               ctx.lineTo(-shwE*0.20, hemY-hipY-AV.hipW*0.22);
               ctx.lineTo( shwE*0.20, hemY-hipY-AV.hipW*0.22);
               ctx.lineTo( shwE*0.20, hemY-hipY-AV.hipW*0.55); }, 2.5);
  }
  if (g !== "dress")
    seam(()=>{ ctx.moveTo(-shwE*0.38, hemY-hipY-AV.hipW*0.15);
               ctx.lineTo( shwE*0.38, hemY-hipY-AV.hipW*0.15); }, 2.5);
  if (bd === "back")
    seam(()=>{ ctx.moveTo(0, sy + shwE*0.14); ctx.lineTo(0, hemY-hipY-AV.hipW*0.3); }, 2.5);
  ctx.restore();
}

function drawNeckAndHead(cx, shoulderY, shwE, bd, dir, t){
  const { rx, ry } = AV;
  const headC = {
    x: cx + clamp(S.headX, -1, 1) * rx * 0.28,
    y: shoulderY - shwE*0.085 - ry*0.92 + S.headY * ry * 0.22,
  };
  const chin = { x: headC.x, y: headC.y + ry*0.70 };
  limb(()=>{ ctx.moveTo(chin.x, chin.y);
             ctx.lineTo(cx, shoulderY - shwE*0.04); }, (SKINT||TONES.skin), rx*0.50);
  if (SPEC().garment === "hoodie")
    paint(()=>{
      ctx.ellipse(headC.x, headC.y + ry*0.55, rx*1.22, ry*0.62, 0, 0, 7);
    }, SWEATER || TONES.sweater, 3);
  paint(()=>{
    ctx.ellipse(cx, shoulderY - shwE*0.065, rx*0.46*Math.max(0.7,shwE/AV.shw+0.3), rx*0.17, 0, 0, 7);
  }, SWEATER || TONES.sweater, 3);
  HEADS[bd](headC, dir, t);
  if (CC){
    CC._anchors = { headC:{...headC}, cx, shoulderY };
    if (CC.decals.head.length){
      ctx.save();
      ctx.translate(headC.x, headC.y);
      ctx.rotate(S.roll * 0.85);
      for (const st of CC.decals.head)
        ink(()=>{
          ctx.moveTo(st.pts[0].x*ry, st.pts[0].y*ry);
          for (const q of st.pts.slice(1)) ctx.lineTo(q.x*ry, q.y*ry);
        }, 3.0);
      ctx.restore();
    }
  }
}

function drawArm(slot, AJ, t, prop){
  const a = AV.arms[slot];
  const lw = AV.shw*0.125;
  const shortSleeve = ["tee","dress"].includes(SPEC().garment);
  if (!shortSleeve){
    limb(()=>{ ctx.moveTo(AJ.x, AJ.y);
               ctx.lineTo(a.el.x, a.el.y);
               ctx.lineTo(a.wr.x, a.wr.y); }, SWEATER || TONES.sweater, lw);
  } else {
    // one continuous ink silhouette; sleeve ends at the elbow, skin below
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (STYLE.outline){
      ctx.strokeStyle = INK; ctx.lineWidth = lw + LW*1.9;
      ctx.beginPath();
      ctx.moveTo(AJ.x, AJ.y); ctx.lineTo(a.el.x, a.el.y); ctx.lineTo(a.wr.x, a.wr.y);
      ctx.stroke();
    }
    const seg = (p, q, tone, w)=>{
      ctx.strokeStyle = tone.base; ctx.lineWidth = w;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
      if (tone.pat){
        ctx.strokeStyle = tone.pat; ctx.lineWidth = w;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
      }
    };
    seg(AJ, a.el, SWEATER || TONES.sweater, lw);
    seg(a.el, a.wr, (SKINT||TONES.skin), lw*0.88);
    // sleeve hem at the elbow
    const d1 = norm({ x:a.el.x-AJ.x, y:a.el.y-AJ.y });
    seam(()=>{
      const n = { x:-d1.y, y:d1.x }, w2 = lw*0.55;
      ctx.moveTo(a.el.x - d1.x*4 + n.x*w2, a.el.y - d1.y*4 + n.y*w2);
      ctx.lineTo(a.el.x - d1.x*4 - n.x*w2, a.el.y - d1.y*4 - n.y*w2);
    }, 2.5);
  }
  const d2 = norm({ x:a.wr.x-a.el.x, y:a.wr.y-a.el.y });
  if (STYLE.outline) ink(()=>{
    const n = { x:-d2.y, y:d2.x }, w = AV.shw*0.066;
    ctx.moveTo(a.wr.x - d2.x*AV.handLen*0.25 + n.x*w, a.wr.y - d2.y*AV.handLen*0.25 + n.y*w);
    ctx.lineTo(a.wr.x - d2.x*AV.handLen*0.25 - n.x*w, a.wr.y - d2.y*AV.handLen*0.25 - n.y*w);
  }, 2.5);
  if (prop && prop !== "box" && slot === "R"){
    const wrP = { x: a.wr.x + d2.x*AV.handLen*0.3, y: a.wr.y + d2.y*AV.handLen*0.3 };
    drawProp(prop, wrP, d2);
  }
  drawHand(slot, a, d2);
}

/* ───────────── [6] hands — one parametric drawer ─────────────
   Capture reduces 21 landmarks to {curls[4], thumb, spread, dir}
   and the SAME chunky drawer renders both capture and puppet, so
   fingers always have sheet thickness. Never a skeleton. */
const HAND_SHAPES = {
  open:  { curls:[0.02,0.02,0.02,0.02], thumb:0.1,  spread:0.7 },
  mitt:  { curls:[0.62,0.60,0.62,0.65], thumb:0.65, spread:0.1 },
  fist:  { curls:[1,1,1,1],             thumb:0.9,  spread:0 },
  point: { curls:[0,1,1,1],             thumb:0.85, spread:0 },
  grip:  { curls:[0.82,0.80,0.82,0.85], thumb:0.35, spread:0.05 },
};
function handParams(h){
  const W0 = px(h[0]);
  const sc = Math.max(8, dist(W0, px(h[9])));
  const curls = [];
  for (const [mcp,tip] of [[5,8],[9,12],[13,16],[17,20]]){
    const r = dist(px(h[tip]), W0) / Math.max(1, dist(px(h[mcp]), W0));
    curls.push(clamp((1.72 - r)/0.8, 0, 1));
  }
  const thumb = clamp(1.25 - dist(px(h[4]), px(h[17]))/(1.5*sc), 0, 1);
  const spread = clamp((dist(px(h[8]), px(h[20]))/sc - 0.55)/0.9, 0, 1);
  const dirV = norm({ x:px(h[9]).x - W0.x, y:px(h[9]).y - W0.y });
  return { curls, thumb, spread, dir:dirV };
}

let handSm = { L:null, R:null };
function smoothParams(slot, prm){
  let s = handSm[slot];
  if (!s) s = handSm[slot] = { curls:[...prm.curls], thumb:prm.thumb, spread:prm.spread, dir:{...prm.dir} };
  for (let i=0;i<4;i++) s.curls[i] = lerp(s.curls[i], prm.curls[i], 0.3);
  s.thumb  = lerp(s.thumb,  prm.thumb,  0.3);
  s.spread = lerp(s.spread, prm.spread, 0.3);
  s.dir = norm({ x:lerp(s.dir.x, prm.dir.x, 0.3), y:lerp(s.dir.y, prm.dir.y, 0.3) });
  return s;
}

function drawHand(slot, arm, d2){
  const wr = { x: arm.wr.x + d2.x*AV.handLen*0.3, y: arm.wr.y + d2.y*AV.handLen*0.3 };
  if (drive === "CAPTURE"){
    const h = nearestHand(slot);
    if (h){ const prm = smoothParams(slot, handParams(h)); drawParamHand(wr, prm.dir, prm, slot); return; }
    drawParamHand(wr, d2, HAND_SHAPES.mitt, slot); return;
  }
  const p = POSES[poseName] || {};
  const shape = p[slot==="L"?"handL":"handR"] || p.hand || "mitt";
  if (shape === "thumb"){
    drawParamHand(wr, { x: slot==="L"?1:-1, y:0 },
      { curls:[1,1,1,1], thumb:0, spread:0 }, slot);
    return;
  }
  if (shape === "peace"){
    drawParamHand(wr, { x:0, y:-1 },
      { curls:[0,0,1,1], thumb:0.9, spread:0.5,
        thumbSide: slot==="L" ? -1 : 1 }, slot);
    return;
  }
  drawParamHand(wr, d2, HAND_SHAPES[shape] || HAND_SHAPES.mitt, slot);
}

/* the whole hand is ONE closed path — palm, scalloped fingertips,
   thumb bump. A fist collapses to a clean mitt with no interior
   marks; an open hand is a notched paddle. No capsules anywhere. */
function handSilhouette(prm, r){
  const FL = prm.curls.map(c => r*(0.22 + 0.72*(1-c)));
  const spread = prm.spread || 0;
  const ys = [-0.40,-0.135,0.135,0.40].map(v => v*r*1.12*(1 + spread*0.3));
  const fw = r*0.15;
  const px0 = 0.42*r;
  const tl = r*(0.12 + 0.72*(1 - clamp(prm.thumb ?? 0.6, 0, 1)));

  ctx.moveTo(-0.32*r, -0.50*r);
  ctx.lineTo(px0*0.92, -0.52*r);
  for (let i=0;i<4;i++){
    const tip = px0 + FL[i];
    ctx.lineTo(tip - fw, ys[i] - fw*1.05);
    ctx.quadraticCurveTo(tip + fw*0.95, ys[i], tip - fw, ys[i] + fw*1.05);
    if (i<3) ctx.lineTo(px0 + Math.min(FL[i],FL[i+1])*0.42, (ys[i]+ys[i+1])/2);
  }
  ctx.lineTo(px0*0.92, 0.52*r);
  // thumb bump on the +y side (mirrored outside for the other hand)
  ctx.lineTo(0.30*r, 0.52*r);
  ctx.lineTo(0.16*r + tl*0.55, 0.52*r + tl*0.9);
  ctx.quadraticCurveTo(0.02*r + tl*0.35, 0.62*r + tl*0.95, -0.02*r, 0.56*r);
  ctx.lineTo(-0.32*r, 0.50*r);
  ctx.quadraticCurveTo(-0.52*r, 0, -0.32*r, -0.50*r);
  ctx.closePath();
}
function drawParamHand(wr, dirV, prm, slot){
  const r = AV.handLen*1.18;
  const a = Math.atan2(dirV.y, dirV.x);
  const ts = prm.thumbSide ?? (slot==="L" ? -1 : 1);
  ctx.save();
  ctx.translate(wr.x, wr.y);
  ctx.rotate(a);
  if (ts < 0) ctx.scale(1,-1);
  paint(()=>handSilhouette(prm, r), (SKINT||TONES.skin), 3.2);
  ctx.restore();
}

/* ---------- props: the hand holds things ---------- */
function drawProp(kind, wr, d2){
  const r = AV.handLen;
  const n = norm({ x:-d2.y, y:d2.x });        // across the grip
  if (kind === "stick"){
    limb(()=>{
      ctx.moveTo(wr.x - n.x*r*2.6, wr.y - n.y*r*2.6);
      ctx.lineTo(wr.x + n.x*r*2.6, wr.y + n.y*r*2.6);
    }, TONES.shoe, r*0.28);
  }
  if (kind === "cup"){
    const cx0 = wr.x - n.x*r*0.9, cy0 = wr.y - n.y*r*0.9;
    paint(()=>{
      ctx.moveTo(cx0 - r*0.5, cy0 - r*0.7);
      ctx.lineTo(cx0 + r*0.5, cy0 - r*0.7);
      ctx.lineTo(cx0 + r*0.38, cy0 + r*0.55);
      ctx.lineTo(cx0 - r*0.38, cy0 + r*0.55);
      ctx.closePath();
    }, TONES.pants, 3);
    seam(()=>{ ctx.ellipse(cx0, cy0 - r*0.7, r*0.5, r*0.14, 0, 0, 7); }, 2.5);
  }
  if (kind === "phone"){
    ctx.save();
    ctx.translate(wr.x, wr.y);
    ctx.rotate(Math.atan2(d2.y, d2.x) + Math.PI/2);
    paint(()=>{
      const w = r*0.62, h = r*1.5;
      ctx.moveTo(-w, -h/2); ctx.lineTo(w, -h/2);
      ctx.lineTo(w, h/2); ctx.lineTo(-w, h/2); ctx.closePath();
    }, TONES.shoe, 3);
    ctx.restore();
  }
}
function drawBox(wrL, wrR){
  const midX = (wrL.x + wrR.x)/2, midY = (wrL.y + wrR.y)/2;
  const w = Math.max(AV.handLen*2.2, Math.abs(wrR.x - wrL.x)*0.9);
  const h = w*0.72;
  paint(()=>{
    ctx.moveTo(midX - w/2, midY - h/2);
    ctx.lineTo(midX + w/2, midY - h/2);
    ctx.lineTo(midX + w/2, midY + h/2);
    ctx.lineTo(midX - w/2, midY + h/2);
    ctx.closePath();
  }, TONES.pants, 3.5);
  seam(()=>{ ctx.moveTo(midX - w/2, midY - h*0.18); ctx.lineTo(midX + w/2, midY - h*0.18); }, 2.5);
}

/* ───────────── [7] heads — facing bands ───────────── */
const HEADS = { front:frontHead, threeq:threeQHead, profile:profileHead, back:backHead };

function skull(){
  const { rx, ry } = AV;
  paint(()=>{
    ctx.moveTo(-rx, 0);
    ctx.bezierCurveTo(-rx, -ry*1.33, rx, -ry*1.33, rx, 0);
    ctx.bezierCurveTo(rx*0.97, ry*0.58, rx*0.56, ry, 0, ry);
    ctx.bezierCurveTo(-rx*0.56, ry, -rx*0.97, ry*0.58, -rx, 0);
    ctx.closePath();
  }, (SKINT||TONES.skin));
}
function ear(x, y, sc){
  const { rx } = AV;
  paint(()=>{ ctx.ellipse(x, y, rx*0.15*sc, rx*0.24*sc, 0, 0, 7); }, (SKINT||TONES.skin), 3.5);
  ink(()=>{ ctx.arc(x, y, rx*0.075*sc, -1.2, 1.6); }, 2.4);
}
function mouthAt(mx, my){
  const { rx, ry } = AV;
  const curve = S.smile - S.frown;
  const mw = rx*(0.46 + S.smile*0.20 - S.pucker*0.24 + S.press*0.14)*SPEC().mouthW;
  const mh = ry*(0.02 + S.jaw*0.50);
  ctx.save();
  ctx.translate(mx, my);
  if (mh < ry*0.07){
    ink(()=>{
      ctx.moveTo(-mw/2, -curve*ry*0.07);
      ctx.quadraticCurveTo(0, curve*ry*0.15 + ry*0.01, mw/2, -curve*ry*0.07);
    }, ry*(0.05 - S.press*0.018));
  } else {
    ctx.fillStyle = "#3c3733"; ctx.strokeStyle = INK; ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(-mw/2, -curve*ry*0.06);
    ctx.quadraticCurveTo(0, -mh*0.3, mw/2, -curve*ry*0.06);
    ctx.quadraticCurveTo(mw*0.55, mh*0.45, 0, mh);
    ctx.quadraticCurveTo(-mw*0.55, mh*0.45, -mw/2, -curve*ry*0.06);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.clip();
    ctx.fillStyle = "#f2efe9";
    ctx.fillRect(-mw/2, -mh*0.55, mw, mh*0.42);
  }
  ctx.restore();
}
function eyeAt(ex, ey, blink, wScale=1){
  const { rx, ry } = AV;
  const open = clamp(1 - blink*1.25 - S.squint*0.45 + S.wide*0.5, 0, 1.2);
  const es = SPEC().eyeS;
  const ew = rx*0.195*wScale*es, eh = ry*0.125*Math.min(open,1)*es;
  if (open < 0.14){
    ink(()=>{
      ctx.moveTo(ex - ew, ey);
      ctx.quadraticCurveTo(ex, ey + ry*0.05, ex + ew, ey);
    }, ry*0.045);
    return;
  }
  ctx.fillStyle = "#f7f6f2";
  ctx.strokeStyle = INK; ctx.lineWidth = 2.6;
  ctx.beginPath(); ctx.ellipse(ex, ey, ew, eh, 0, 0, 7);
  ctx.fill(); ctx.stroke();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(ex, ey, ew, eh, 0, 0, 7); ctx.clip();
  ctx.fillStyle = INK;
  ctx.beginPath();
  ctx.arc(ex + S.gazeX*ew*0.45, ey + S.gazeY*eh*0.5, AV.rx*0.075*wScale, 0, 7);
  ctx.fill();
  ctx.restore();
  ink(()=>{
    ctx.moveTo(ex - ew*0.95, ey - eh*0.55);
    ctx.quadraticCurveTo(ex, ey - eh*1.35, ex + ew*0.95, ey - eh*0.55);
  }, ry*0.045);
}
function browAt(bx, by, s){
  const { rx, ry } = AV;
  const knitDip = S.browKnit * ry*0.10;
  ink(()=>{
    ctx.moveTo(bx - s*rx*0.27, by + knitDip);
    ctx.quadraticCurveTo(bx, by - ry*0.055, bx + s*rx*0.24, by + ry*0.01);
  }, ry*0.075*SPEC().browW);
}

function SPEC(){ return (CC && CC.spec) || CAST_PRESETS.HERO; }

function drawHairBack(band, dir, fx, fy){
  const { rx, ry } = AV;
  const kind = SPEC().hair;
  const dark = TONES.shoe;
  if (kind === "long"){
    paint(()=>{
      ctx.moveTo(-rx*1.12, -ry*0.35);
      ctx.bezierCurveTo(-rx*1.12, -ry*1.30, rx*1.12, -ry*1.30, rx*1.12, -ry*0.35);
      ctx.quadraticCurveTo(rx*1.18, ry*1.15, rx*0.85, ry*1.35);
      ctx.lineTo(-rx*0.85, ry*1.35);
      ctx.quadraticCurveTo(-rx*1.18, ry*1.15, -rx*1.12, -ry*0.35);
      ctx.closePath();
    }, dark, 3);
  }
  if (kind === "bun"){
    paint(()=>{ ctx.ellipse(0, -ry*1.18, rx*0.30, rx*0.28, 0, 0, 7); }, dark, 3);
  }
  if (kind === "braids"){
    for (const sd of [-1,1])
      paint(()=>{
        ctx.moveTo(sd*rx*0.85, -ry*0.15);
        ctx.quadraticCurveTo(sd*rx*1.15, ry*0.5, sd*rx*0.95, ry*1.35);
        ctx.lineTo(sd*rx*0.70, ry*1.30);
        ctx.quadraticCurveTo(sd*rx*0.88, ry*0.5, sd*rx*0.62, -ry*0.10);
        ctx.closePath();
      }, dark, 3);
  }
  if (kind === "curly"){
    paint(()=>{ ctx.ellipse(0, -ry*0.85, rx*1.12, ry*0.55, 0, 0, 7); }, dark, 3);
  }
}
function drawHair(band, dir, fx, fy){
  const { rx, ry } = AV;
  const kind = SPEC().hair;
  if (!kind || kind === "none") return;
  const dark = TONES.shoe;
  if (kind === "long" || kind === "bun" || kind === "braids"){
    paint(()=>{
      ctx.moveTo(-rx*0.97, -ry*0.30);
      ctx.bezierCurveTo(-rx*0.97, -ry*1.26, rx*0.97, -ry*1.26, rx*0.97, -ry*0.30);
      ctx.quadraticCurveTo(rx*0.55, -ry*0.58, 0, -ry*0.60);
      ctx.quadraticCurveTo(-rx*0.55, -ry*0.58, -rx*0.97, -ry*0.30);
      ctx.closePath();
    }, dark, 3);
    return;
  }
  if (kind === "curly"){
    for (const o of [-0.72,-0.36,0,0.36,0.72])
      paint(()=>{ ctx.ellipse(o*rx, -ry*0.92 + Math.abs(o)*ry*0.12, rx*0.28, rx*0.26, 0, 0, 7); }, dark, 3);
    return;
  }
  if (kind === "cap"){
    paint(()=>{
      ctx.moveTo(-rx*0.97, -ry*0.22);
      ctx.bezierCurveTo(-rx*0.97, -ry*1.28, rx*0.97, -ry*1.28, rx*0.97, -ry*0.22);
      ctx.quadraticCurveTo(rx*0.55, -ry*0.55, 0, -ry*0.56);
      ctx.quadraticCurveTo(-rx*0.55, -ry*0.55, -rx*0.97, -ry*0.22);
      ctx.closePath();
    }, dark, 3);
  }
  if (kind === "flat"){
    paint(()=>{
      ctx.moveTo(-rx*0.9, -ry*0.55);
      ctx.lineTo(-rx*0.85, -ry*1.12);
      ctx.lineTo(rx*0.85, -ry*1.12);
      ctx.lineTo(rx*0.9, -ry*0.55);
      ctx.quadraticCurveTo(0, -ry*0.68, -rx*0.9, -ry*0.55);
      ctx.closePath();
    }, dark, 3);
  }
  if (kind === "ring"){
    for (const sd of (band==="profile" ? [-1] : [-1,1]))
      paint(()=>{
        ctx.ellipse(sd*rx*0.82, ry*0.02, rx*0.20, rx*0.34, 0, 0, 7);
      }, dark, 3);
  }
}
function drawGlasses(band, dir, fx, eyeY, eyeDX){
  if (!SPEC().glasses) return;
  const { rx, ry } = AV;
  const gr = rx*0.26;
  if (band === "profile"){
    ink(()=>{ ctx.arc(rx*0.42, eyeY - ry*0.03, gr, 0, 7); }, 3);
    ink(()=>{ ctx.moveTo(rx*0.42 - gr, eyeY - ry*0.03);
              ctx.lineTo(-rx*0.15, eyeY - ry*0.03); }, 2.6);
    return;
  }
  for (const sd of [-1,1])
    ink(()=>{ ctx.arc(fx + sd*eyeDX, eyeY, gr, 0, 7); }, 3);
  ink(()=>{ ctx.moveTo(fx - eyeDX + gr, eyeY); ctx.lineTo(fx + eyeDX - gr, eyeY); }, 2.6);
  ink(()=>{ ctx.moveTo(fx - eyeDX - gr, eyeY); ctx.lineTo(-rx*0.96, eyeY + ry*0.04); }, 2.4);
  ink(()=>{ ctx.moveTo(fx + eyeDX + gr, eyeY); ctx.lineTo(rx*0.96, eyeY + ry*0.04); }, 2.4);
}
function drawBeard(band, fx, fy){
  if (!SPEC().beard) return;
  const { rx, ry } = AV;
  paint(()=>{
    ctx.moveTo(fx - rx*0.72, ry*0.18 + fy*0.5);
    ctx.quadraticCurveTo(fx - rx*0.6, ry*0.95, fx, ry*0.98);
    ctx.quadraticCurveTo(fx + rx*0.6, ry*0.95, fx + rx*0.72, ry*0.18 + fy*0.5);
    ctx.quadraticCurveTo(fx + rx*0.4, ry*0.60 + fy*0.5, fx, ry*0.58 + fy*0.5);
    ctx.quadraticCurveTo(fx - rx*0.4, ry*0.60 + fy*0.5, fx - rx*0.72, ry*0.18 + fy*0.5);
    ctx.closePath();
  }, TONES.shoe, 3);
}

function frontHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(S.roll * 0.85);
  const fx = clamp(F, -0.4, 0.4) * rx * 0.9;
  const fy = S.pitch * ry * 0.38;
  drawHairBack("front", dir, fx, fy);
  ear(-rx*0.98 + fx*0.12, ry*0.06 + fy*0.4, 1);
  ear( rx*0.98 + fx*0.12, ry*0.06 + fy*0.4, 1);
  skull();
  drawBeard("front", fx, fy);
  drawHair("front", dir, fx, fy);
  const eyeY = -ry*0.02 + fy, eyeDX = rx*0.40;
  const browY = eyeY - ry*0.24 - S.browUp*ry*0.13 + S.browKnit*ry*0.06;
  browAt(fx - eyeDX, browY, -1); browAt(fx + eyeDX, browY, 1);
  eyeAt(fx - eyeDX, eyeY, S.blinkL); eyeAt(fx + eyeDX, eyeY, S.blinkR);
  drawGlasses("front", dir, fx, eyeY, eyeDX);
  const hook = (Math.abs(F) > 0.05 ? Math.sign(F) : 1) * rx*0.11;
  ink(()=>{
    ctx.moveTo(fx*1.1, eyeY + ry*0.06);
    ctx.lineTo(fx*1.1, eyeY + ry*0.32);
    ctx.lineTo(fx*1.1 + hook, eyeY + ry*0.36);
  }, ry*0.042);
  mouthAt(fx*0.9, ry*0.60 + fy*0.7);
  ctx.restore();
}

function threeQHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(S.roll * 0.7);
  const fx = dir * rx * 0.42;
  const fy = S.pitch * ry * 0.36;
  // only the trailing ear shows, pushed to the back edge
  drawHairBack("threeq", dir, fx, fy);
  ear(-dir*rx*0.92, ry*0.06 + fy*0.4, 1.05);
  skull();
  drawBeard("threeq", fx, fy);
  drawHair("threeq", dir, fx, fy);
  const eyeY = -ry*0.02 + fy;
  const nearX = fx + dir*rx*0.34, farX = fx - dir*rx*0.42;
  const browY = eyeY - ry*0.24 - S.browUp*ry*0.13 + S.browKnit*ry*0.06;
  browAt(farX, browY, -dir); browAt(nearX, browY, dir);
  eyeAt(farX, eyeY, dir>0?S.blinkL:S.blinkR, 0.62);   // far eye compressed
  eyeAt(nearX, eyeY, dir>0?S.blinkR:S.blinkL, 1);
  drawGlasses("front", dir, fx, eyeY, dir*rx*0.38);
  // nose rides the leading cheek — bridge + hook outward
  ink(()=>{
    ctx.moveTo(fx + dir*rx*0.06, eyeY + ry*0.04);
    ctx.lineTo(fx + dir*rx*0.10, eyeY + ry*0.30);
    ctx.lineTo(fx + dir*rx*0.24, eyeY + ry*0.34);
  }, ry*0.045);
  mouthAt(fx*0.9, ry*0.60 + fy*0.7);
  ctx.restore();
}

function profileHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(dir, 1);                     // draw facing +x, mirror for left
  ctx.rotate(S.roll * 0.5 * dir);
  const fy = S.pitch * ry * 0.3;
  // profile skull with brow shelf, nose wedge, lip step, chin
  paint(()=>{
    ctx.moveTo(-rx*0.55, ry*0.74);                              // jaw back
    ctx.bezierCurveTo(-rx*1.05, ry*0.45, -rx*1.05, -ry*0.9, -rx*0.25, -ry*1.06);
    ctx.bezierCurveTo(rx*0.25, -ry*1.18, rx*0.72, -ry*0.72, rx*0.74, -ry*0.28); // forehead
    ctx.lineTo(rx*0.70, fy - ry*0.10);                          // brow shelf
    ctx.lineTo(rx*0.98, fy + ry*0.24);                          // nose tip
    ctx.lineTo(rx*0.72, fy + ry*0.32);                          // under nose
    ctx.lineTo(rx*0.74, fy + ry*0.46);                          // upper lip
    ctx.lineTo(rx*0.62, fy + ry*0.56);                          // mouth corner step
    ctx.quadraticCurveTo(rx*0.66, ry*0.82, rx*0.30, ry*0.92);   // chin
    ctx.quadraticCurveTo(-rx*0.1, ry*1.0, -rx*0.55, ry*0.74);   // jawline
    ctx.closePath();
  }, (SKINT||TONES.skin));
  ear(-rx*0.18, ry*0.08, 1.1);
  drawHair("profile", 1, 0, fy);
  // single eye near the front edge
  eyeAt(rx*0.42, fy - ry*0.05, Math.max(S.blinkL,S.blinkR), 0.62);
  const browY = fy - ry*0.30 - S.browUp*ry*0.12;
  ink(()=>{ ctx.moveTo(rx*0.20, browY + S.browKnit*ry*0.08);
            ctx.lineTo(rx*0.62, browY - ry*0.02); }, ry*0.07);
  drawGlasses("profile", 1, 0, fy - ry*0.05, 0);
  // mouth: short line cut in from the lip step
  const curve = S.smile - S.frown;
  ink(()=>{
    ctx.moveTo(rx*0.66, fy + ry*0.50);
    ctx.quadraticCurveTo(rx*0.44, fy + ry*(0.52 + 0.1*curve) + S.jaw*ry*0.1,
                         rx*0.30, fy + ry*(0.50 - 0.08*curve));
  }, ry*0.05);
  ctx.restore();
}

function backHead(c, dir, t){
  const { rx, ry } = AV;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(S.roll * 0.4);
  ear(-rx*0.99, ry*0.06, 0.85);
  drawHairBack("back", 1, 0, 0);
  ear(-rx*0.99, ry*0.06, 0.85);
  ear( rx*0.99, ry*0.06, 0.85);
  skull();
  drawHair("back", 1, 0, 0);
  ctx.restore();
}

function drawInset(){
  const W = canvas.width, iw = W*0.20, ih = iw*samp.height/samp.width;
  const x = W - iw - 10, y = 10;
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.globalAlpha = 0.92;
  ctx.drawImage(samp, x, y, iw, ih);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = S.faceSeen ? INK : "#9a9a95";
  ctx.lineWidth = 3;
  ctx.strokeRect(x, y, iw, ih);
  ctx.restore();
}

/* ───────────── [7c] scenes + atlas — the whole vision ─────────────
   character ⊂ scene ⊂ world. A scene is a frozen stage: world
   assets + cast placements + poses + style + a thumbnail. The
   atlas is the world seen as its scenes; tap a character in the
   cast bar while in ATLAS to see every scene they appear in. */
let atlasWorld = { name:"WORLD 01", scenes:[] };
let atlasImgs = {};
let atlasRects = [];
let atlasFilter = null;
let pendingThumb = null;
let lastOnboard = 0;
const ONBOARD_POSES = ["wave","happy","look left","look right","thumbs up",
                       "thinking","shrug","peace","neutral","laughing"];

function snapshotScene(name){
  return {
    name,
    style: styleName,
    placed: placed.map(p=>({ ...p })),
    generated: JSON.parse(JSON.stringify(genAssets)),
    cast: characters.map(C=>({ id:C.id, spec:{ ...C.spec },
      x:C.game.x, d:C.game.d, pose:C.pose, F:C.F })),
    thumb: null,
  };
}
function captureThumb(sc){
  try{
    const t = document.createElement("canvas");
    t.width = 96; t.height = 128;
    t.getContext("2d").drawImage(canvas, 0, 0, 96, 128);
    sc.thumb = t.toDataURL("image/png");
    delete atlasImgs[sc.name];
  } catch(e){}
}
function saveScene(name){
  name = name || ("scene-" + String(atlasWorld.scenes.length+1).padStart(2,"0"));
  const sc = snapshotScene(name);
  const i = atlasWorld.scenes.findIndex(x=>x.name===name);
  if (i>=0) atlasWorld.scenes[i] = sc; else atlasWorld.scenes.push(sc);
  if (view==="STAGE" && !gateOn) captureThumb(sc);
  return name;
}
function loadScene(name){
  const sc = atlasWorld.scenes.find(x=>x.name===name);
  if (!sc) return false;
  genAssets = JSON.parse(JSON.stringify(sc.generated || {}));
  placed = (sc.placed || []).map(p=>({ ...p }));
  worldSel = -1; armedAsset = null;
  characters = []; selected = null;
  for (const c of sc.cast || []){
    const C = spawnChar(c.id, c.spec, c.x, c.d);
    C.pose = POSES[c.pose] ? c.pose : "neutral";
    C.F = C.Ftgt = c.F || 0;
  }
  selected = characters[0] || null;
  if (selected) bind(selected);
  if (sc.style && STYLES[sc.style]){ styleName = sc.style; applyStyle(); }
  buildCastChips();
  if (drive==="WORLD") buildWorldChips();
  else if (drive==="PUPPET" || drive==="GAME") buildPoseChips(drive==="GAME");
  if (!sc.thumb) pendingThumb = name;
  return true;
}
function scenesOf(id){
  return atlasWorld.scenes
    .filter(sc => (sc.cast||[]).some(c=>c.id===id))
    .map(sc => sc.name);
}
function thumbImgFor(sc){
  if (!sc.thumb || typeof Image === "undefined") return null;
  let im = atlasImgs[sc.name];
  if (!im){ im = new Image(); im.src = sc.thumb; atlasImgs[sc.name] = im; }
  return im;
}
function drawAtlas(t){
  const W = canvas.width, H = canvas.height;
  ctx = mainCtx;
  ctx.fillStyle = PAPER; ctx.fillRect(0,0,W,H);
  atlasRects = [];
  ctx.fillStyle = "#141414";
  ctx.font = "700 15px ui-monospace, Menlo, monospace";
  ctx.textAlign = "left";
  ctx.fillText(atlasWorld.name, 16, 30);
  ctx.font = "11px ui-monospace, Menlo, monospace";
  ctx.fillStyle = "#8a8a86";
  ctx.fillText(atlasWorld.scenes.length + " scenes" +
    (atlasFilter ? " · showing " + atlasFilter : ""), 16, 48);

  const cols = 3, gap = 12, cw = (W - gap*(cols+1)) / cols, chh = cw*4/3 + 22;
  let x = gap, y = 64;
  const card = (label, act, sc)=>{
    ctx.strokeStyle = "#141414"; ctx.lineWidth = 2;
    ctx.strokeRect(x, y, cw, chh - 18);
    if (sc){
      const im = thumbImgFor(sc);
      if (im && im.complete && im.naturalWidth)
        ctx.drawImage(im, x+2, y+2, cw-4, chh-22);
      else {
        ctx.fillStyle = "#dddcd6"; ctx.fillRect(x+2, y+2, cw-4, chh-22);
      }
      if (atlasFilter && (sc.cast||[]).some(c=>c.id===atlasFilter)){
        ctx.strokeStyle = "#141414"; ctx.setLineDash([3,3]); ctx.lineWidth = 2;
        ctx.strokeRect(x-4, y-4, cw+8, chh-10);
        ctx.setLineDash([]);
      }
    } else {
      ctx.fillStyle = "#141414";
      ctx.font = "700 26px ui-monospace, Menlo, monospace";
      ctx.textAlign = "center";
      ctx.fillText("+", x+cw/2, y+(chh-18)/2+9);
      ctx.textAlign = "left";
    }
    ctx.fillStyle = "#141414";
    ctx.font = "10px ui-monospace, Menlo, monospace";
    ctx.fillText(label.slice(0,14), x+1, y+chh-4);
    atlasRects.push({ x, y, w:cw, h:chh, act });
    x += cw + gap;
    if (x + cw > W){ x = gap; y += chh + gap; }
  };
  card("save current", { save:true }, null);
  for (const sc of atlasWorld.scenes) card(sc.name, { load:sc.name }, sc);

  ctx.fillStyle = "#8a8a86";
  ctx.font = "10px ui-monospace, Menlo, monospace";
  ctx.textAlign = "center";
  ctx.fillText("tap a cast chip below to trace a character across scenes", W/2, H-12);
  ctx.fillText("type below to generate a scene", W/2, H-26);
  ctx.textAlign = "left";
}
function instantiateGeneratedScene(spec){
  const name = (spec.name || ("gen-" + (atlasWorld.scenes.length+1))).slice(0,14);
  const sc = {
    name,
    style: styleName,
    placed: (spec.assets||[])
      .filter(a => ASSET_DRAW[a.type] || genAssets[a.type])
      .map(a => ({ type:a.type, x:clamp(+a.x||0.5,0.05,0.95),
                   d:clamp(+a.d||0.5,0.05,1), scale:+a.scale||1 })),
    generated: JSON.parse(JSON.stringify(genAssets)),
    cast: (spec.cast||[]).slice(0,8).map((c,i)=>({
      id: String(c.id || c.preset || ("P"+i)).slice(0,8),
      spec: { ...(CAST_PRESETS[c.preset] || CAST_PRESETS[c.id] || CAST_PRESETS.HERO) },
      x: clamp(+c.x||0.5,0.06,0.94), d: clamp(+c.d||0.7,0.05,1),
      pose: POSES[c.pose] ? c.pose : "neutral", F:0,
    })),
    thumb: null,
  };
  atlasWorld.scenes.push(sc);
  loadScene(name);
  view = "STAGE"; applyView();
}
async function callSceneGen(promptText){
  hint.textContent = "generating scene…";
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1200,
        messages:[{ role:"user", content:
`Compose a scene for a halftone paper stage.
Character presets: ${Object.keys(CAST_PRESETS).join(", ")}.
Asset types: ${[...Object.keys(ASSET_DRAW), ...Object.keys(genAssets)].join(", ")}.
Poses: ${POSE_ORDER.join(", ")}.
Coords: x 0..1 left-right, d 0..1 far-near (far is smaller).
Respond ONLY JSON, no prose, no fences:
{"name":"short_name","cast":[{"id":"ANA","preset":"NOVA","x":0.4,"d":0.8,"pose":"thinking"}],
 "assets":[{"type":"tree","x":0.15,"d":0.9,"scale":1}]}
2-6 characters, 1-6 assets. Scene to compose: ${promptText}` }],
      }),
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.type==="text"?b.text:"").join("");
    const spec = JSON.parse(text.replace(/```json|```/g,"").trim());
    if (spec && (spec.cast || spec.assets)){
      instantiateGeneratedScene(spec);
      hint.textContent = HINTS[drive];
    } else hint.textContent = "scene generator returned nothing usable";
  } catch(err){
    hint.textContent = "generation failed — serve over http(s), not file://";
  }
}

/* ───────────── [7a] world — scenery the cast lives in ─────────────
   Assets share the stage depth field: characters walk in front of
   and behind them. Built-ins draw in a unit space (u = nominal
   height); generated assets are draw-command JSON from an LLM. */
let placed = [];          // { type, x, d, scale }
let worldSel = -1;
let armedAsset = null;
let genAssets = {};       // name -> cmds
let dragAsset = false;

const ASSET_DRAW = {
  tree(u){
    limb(()=>{ ctx.moveTo(0,0); ctx.lineTo(0,-u*0.55); }, TONES.shoe, u*0.10);
    paint(()=>{ ctx.ellipse(0, -u*0.85, u*0.42, u*0.40, 0, 0, 7); }, SWEATER0(), 3.5);
    paint(()=>{ ctx.ellipse(-u*0.22, -u*0.68, u*0.24, u*0.20, 0, 0, 7); }, SWEATER0(), 3);
    paint(()=>{ ctx.ellipse( u*0.24, -u*0.70, u*0.22, u*0.19, 0, 0, 7); }, SWEATER0(), 3);
  },
  house(u){
    paint(()=>{ ctx.moveTo(-u*0.55, 0); ctx.lineTo(-u*0.55, -u*0.55);
                ctx.lineTo( u*0.55, -u*0.55); ctx.lineTo( u*0.55, 0); ctx.closePath(); },
      TONES.pants, 3.5);
    paint(()=>{ ctx.moveTo(-u*0.62, -u*0.55); ctx.lineTo(0, -u*0.95);
                ctx.lineTo( u*0.62, -u*0.55); ctx.closePath(); }, TONES.shoe, 3.5);
    paint(()=>{ ctx.moveTo(-u*0.12, 0); ctx.lineTo(-u*0.12, -u*0.32);
                ctx.lineTo( u*0.12, -u*0.32); ctx.lineTo( u*0.12, 0); ctx.closePath(); },
      TONES.shoe, 3);
    seam(()=>{ ctx.moveTo(u*0.24, -u*0.36); ctx.lineTo(u*0.44, -u*0.36);
               ctx.lineTo(u*0.44, -u*0.22); ctx.lineTo(u*0.24, -u*0.22); ctx.closePath(); }, 2.5);
  },
  stage(u){
    paint(()=>{ ctx.moveTo(-u*0.85, 0); ctx.lineTo(-u*0.85, -u*0.14);
                ctx.lineTo( u*0.85, -u*0.14); ctx.lineTo( u*0.85, 0); ctx.closePath(); },
      TONES.shoe, 3.5);
    limb(()=>{ ctx.moveTo(-u*0.78, -u*0.14); ctx.lineTo(-u*0.78, -u*0.95); }, TONES.pants, u*0.07);
    limb(()=>{ ctx.moveTo( u*0.78, -u*0.14); ctx.lineTo( u*0.78, -u*0.95); }, TONES.pants, u*0.07);
    paint(()=>{ ctx.moveTo(-u*0.85, -u*0.95); ctx.lineTo(-u*0.85, -u*1.06);
                ctx.lineTo( u*0.85, -u*1.06); ctx.lineTo( u*0.85, -u*0.95); ctx.closePath(); },
      TONES.pants, 3);
    seam(()=>{ for (let i=-3;i<=3;i++){ ctx.moveTo(i*u*0.24, -u*0.95); ctx.lineTo((i+1)*u*0.24, -u*1.06); } }, 2);
  },
  room(u){
    paint(()=>{ ctx.moveTo(-u*0.9, 0); ctx.lineTo(-u*0.9, -u*0.85);
                ctx.lineTo( u*0.9, -u*0.85); ctx.lineTo( u*0.9, 0); ctx.closePath(); },
      { base:"#f3f2ee", pat:null }, 3.5);
    seam(()=>{ ctx.moveTo(-u*0.9, -u*0.62); ctx.lineTo(u*0.9, -u*0.62); }, 2);
    paint(()=>{ ctx.moveTo(u*0.35, -u*0.30); ctx.lineTo(u*0.35, -u*0.55);
                ctx.lineTo(u*0.75, -u*0.55); ctx.lineTo(u*0.75, -u*0.30); ctx.closePath(); },
      TONES.pants, 2.5);
    paint(()=>{ ctx.moveTo(-u*0.75, 0); ctx.lineTo(-u*0.75, -u*0.35);
                ctx.lineTo(-u*0.35, -u*0.35); ctx.lineTo(-u*0.35, 0); ctx.closePath(); },
      TONES.pants, 2.5);
  },
  bench(u){
    paint(()=>{ ctx.moveTo(-u*0.55, -u*0.28); ctx.lineTo( u*0.55, -u*0.28);
                ctx.lineTo( u*0.55, -u*0.20); ctx.lineTo(-u*0.55, -u*0.20); ctx.closePath(); },
      TONES.pants, 3);
    limb(()=>{ ctx.moveTo(-u*0.45, -u*0.20); ctx.lineTo(-u*0.45, 0); }, TONES.shoe, u*0.06);
    limb(()=>{ ctx.moveTo( u*0.45, -u*0.20); ctx.lineTo( u*0.45, 0); }, TONES.shoe, u*0.06);
  },
};
function SWEATER0(){ return TONES.sweater; }

function execGenAsset(cmds, u){
  const k = u/100;
  const toneOf = t => t==="ink" ? { base:INK, pat:null }
    : t==="paper" ? { base:"#f3f2ee", pat:null }
    : TONES[t] || TONES.pants;
  for (const c of cmds){
    try{
      if (c.op === "ellipse"){
        paint(()=>{ ctx.ellipse(c.x*k, c.y*k, Math.abs(c.rx*k), Math.abs(c.ry*k), 0, 0, 7); },
          toneOf(c.tone), 2.5);
      } else if (c.op === "path" && Array.isArray(c.pts) && c.pts.length > 1){
        if (c.fill){
          paint(()=>{
            ctx.moveTo(c.pts[0][0]*k, c.pts[0][1]*k);
            for (const q of c.pts.slice(1)) ctx.lineTo(q[0]*k, q[1]*k);
            ctx.closePath();
          }, toneOf(c.tone), 2.5);
        } else {
          ink(()=>{
            ctx.moveTo(c.pts[0][0]*k, c.pts[0][1]*k);
            for (const q of c.pts.slice(1)) ctx.lineTo(q[0]*k, q[1]*k);
          }, (c.lw||2.5));
        }
      }
    } catch(e){}
  }
}
function drawPlacedAsset(it){
  const W = canvas.width, H = canvas.height;
  const wy = lerp(H*0.55, H*0.945, it.d);
  const sc = lerp(0.60, 1.06, it.d) * (it.scale || 1);
  ctx.save();
  ctx.translate(it.x*W, wy);
  ctx.scale(sc, sc);
  ctx.fillStyle = "rgba(0,0,0,0.07)";
  ctx.beginPath(); ctx.ellipse(0, 4, H*0.09, H*0.014, 0, 0, 7); ctx.fill();
  const u = H*0.30;
  if (ASSET_DRAW[it.type]) ASSET_DRAW[it.type](u);
  else if (genAssets[it.type]) execGenAsset(genAssets[it.type], u);
  ctx.restore();
  it._world = { wx:it.x*W, wy, s:sc, u:u*sc };
}
function assetAt(pt){
  const list = [...placed].map((it,i)=>({it,i})).sort((a,b)=>b.it.d - a.it.d);
  for (const {it,i} of list){
    const w = it._world; if (!w) continue;
    if (Math.abs(pt.x - w.wx) < w.u*0.7 && pt.y > w.wy - w.u*1.15 && pt.y < w.wy + 12)
      return i;
  }
  return -1;
}
function buildWorldChips(){
  poseBar.innerHTML = ""; chips = {};
  const lib = [...Object.keys(ASSET_DRAW), ...Object.keys(genAssets)];
  for (const name of lib){
    const b = mkChip(name.toUpperCase(), "pchip", ()=>{
      armedAsset = armedAsset===name ? null : name;
      for (const el of poseBar.querySelectorAll(".pchip"))
        el.classList.toggle("on", el.textContent === name.toUpperCase() && armedAsset);
      hint.textContent = armedAsset ? "tap the ground to place " + name : HINTS.WORLD;
    });
    if (armedAsset === name) b.classList.add("on");
  }
  mkChip("SIZE", "pchip aud", ()=>{
    if (worldSel < 0) return;
    const it = placed[worldSel];
    const sizes = [0.7, 1, 1.4, 2];
    it.scale = sizes[(sizes.indexOf(it.scale||1)+1) % sizes.length];
  });
  mkChip("DELETE", "pchip aud", ()=>{
    if (worldSel >= 0){ placed.splice(worldSel,1); worldSel = -1; }
  });
  mkChip("CLEAR", "pchip aud", ()=>{ placed = []; worldSel = -1; });
  mkChip("EXPORT", "pchip aud", ()=>{
    console.log("HALFTRACK world:", JSON.stringify(window.HALFTRACK.world()));
    hint.textContent = "world JSON logged to console · HALFTRACK.world()";
  });
}

/* ───────────── [7b] scenes + the agentic seam ─────────────
   A scene is a cue list; the same three verbs an LLM, a game
   loop, or a narrative script would use: pose / walk / face.
   window.HALFTRACK is the embedding surface. */
let scene = null;
function playScene(cues){
  scene = { cues:[...cues].sort((a,b)=>a.at-b.at), t0:performance.now(), i:0 };
}
function sceneTick(t){
  if (!scene) return;
  const el = (t - scene.t0)/1000;
  while (scene.i < scene.cues.length && scene.cues[scene.i].at <= el){
    const c = scene.cues[scene.i++];
    if (c.place){
      placed.push({ type:c.place.type, x:clamp(c.place.x,0.05,0.95),
                    d:clamp(c.place.d,0.05,1), scale:c.place.scale||1 });
      continue;
    }
    const C = characters.find(k=>k.id===c.id);
    if (!C) continue;
    if (c.pose && POSES[c.pose]) C.pose = c.pose;
    if (c.walk){ C.game.tx = clamp(c.walk[0],0.06,0.94); C.game.td = clamp(c.walk[1],0.05,1); }
    if (typeof c.face === "number") C.Ftgt = clamp(c.face,-1.6,1.6);
  }
  if (scene.i >= scene.cues.length) scene = null;
}
const DEMO_SCENE = [
  {at:0.0, id:"HERO", walk:[0.38,0.84]}, {at:0.0, id:"BOSS", walk:[0.62,0.84]},
  {at:0.2, id:"PROF", walk:[0.16,0.68]}, {at:0.2, id:"KID",  walk:[0.84,0.68]},
  {at:2.0, id:"HERO", pose:"wave"},      {at:2.4, id:"BOSS", pose:"wave"},
  {at:4.0, id:"BOSS", pose:"pointing"},  {at:4.8, id:"HERO", pose:"surprised"},
  {at:6.0, id:"HERO", pose:"laughing"},  {at:6.4, id:"BOSS", pose:"thumbs up"},
  {at:6.6, id:"KID",  pose:"both raised"},{at:6.8, id:"PROF", pose:"thinking"},
  {at:8.6, id:"HERO", pose:"neutral"},   {at:8.6, id:"BOSS", pose:"neutral"},
  {at:8.8, id:"KID",  pose:"neutral"},   {at:8.8, id:"PROF", pose:"neutral"},
];

async function callDirector(promptText){
  hint.textContent = "directing…";
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{ role:"user", content:
`You direct a 2D halftone puppet stage.
Cast ids: ${characters.map(c=>c.id).join(", ")}.
Pose vocabulary: ${POSE_ORDER.join(", ")}.
Stage coords: x 0..1 (left to right), d 0..1 (far to near).
Respond ONLY with a JSON array of cues, no prose, no fences.
Cue forms: {"at":seconds,"id":"HERO","pose":"wave"} | {"at":s,"id":"BOSS","walk":[x,d]} | {"at":s,"id":"KID","face":1}
6-16 cues, finish under 20 seconds, end characters on "neutral".
Beat to direct: ${promptText}` }],
      }),
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.type==="text"?b.text:"").join("");
    const cues = JSON.parse(text.replace(/```json|```/g,"").trim());
    if (Array.isArray(cues) && cues.length){ playScene(cues); hint.textContent = HINTS[drive]; }
    else hint.textContent = "director returned nothing usable";
  } catch(err){
    hint.textContent = "director failed — serve over http(s), not file://";
  }
}
$("directGo").addEventListener("click", ()=>{
  const v = $("directIn").value.trim();
  if (!v) return;
  if (view === "ATLAS") callSceneGen(v);
  else if (drive === "WORLD") callAssetGen(v);
  else callDirector(v);
});

async function callAssetGen(promptText){
  hint.textContent = "generating asset…";
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1400,
        messages:[{ role:"user", content:
`Design a simple 2D vector asset for a halftone paper-toned stage.
Respond ONLY JSON, no prose, no fences:
{"name":"short_id","cmds":[
 {"op":"path","pts":[[x,y],...],"fill":true,"tone":"pants"},
 {"op":"path","pts":[[x,y],...],"fill":false,"lw":2.5},
 {"op":"ellipse","x":0,"y":-60,"rx":20,"ry":18,"tone":"sweater"}
]}
Coordinates: x -100..100, y 0 (ground) to -200 (up). 6-18 commands.
Tones: "pants","sweater","shoe","skin","ink","paper". Filled shapes get outlines automatically.
Asset to design: ${promptText}` }],
      }),
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.type==="text"?b.text:"").join("");
    const spec = JSON.parse(text.replace(/```json|```/g,"").trim());
    if (spec && spec.name && Array.isArray(spec.cmds)){
      genAssets[spec.name] = spec.cmds;
      armedAsset = spec.name;
      buildWorldChips();
      hint.textContent = "tap the ground to place " + spec.name;
    } else hint.textContent = "generator returned nothing usable";
  } catch(err){
    hint.textContent = "generation failed — serve over http(s), not file://";
  }
}

/* embedding surface for agentic systems, narrative works, engines */
window.HALFTRACK = {
  cast:  () => characters.map(c=>c.id),
  poses: () => [...POSE_ORDER],
  spawn: (id, preset="HERO", x=0.5, d=0.8) => {
    if (characters.find(c=>c.id===id)) return false;
    spawnChar(id, { ...(CAST_PRESETS[preset]||CAST_PRESETS.HERO) }, x, d);
    buildCastChips(); return true;
  },
  act:   (id, pose) => { const C=characters.find(c=>c.id===id); if (C && POSES[pose]) C.pose = pose; },
  walk:  (id, x, d) => { const C=characters.find(c=>c.id===id); if (C){ C.game.tx=clamp(x,0.06,0.94); C.game.td=clamp(d,0.05,1); } },
  face:  (id, f)    => { const C=characters.find(c=>c.id===id); if (C) C.Ftgt = clamp(f,-1.6,1.6); },
  select: id => selectChar(id),
  style:  n  => { if (STYLES[n]){ styleName = n; applyStyle(); } },
  scene:  playScene,
  spec:   id => { const C=characters.find(c=>c.id===id); return C ? {...C.spec} : null; },
  assets: () => [...Object.keys(ASSET_DRAW), ...Object.keys(genAssets)],
  defineAsset: (name, cmds) => { if (name && Array.isArray(cmds)){ genAssets[name]=cmds; if (drive==="WORLD") buildWorldChips(); return true; } return false; },
  place:  (type, x, d, scale=1) => { placed.push({ type, x:clamp(x,0.05,0.95), d:clamp(d,0.05,1), scale }); return placed.length-1; },
  removeAsset: i => { if (placed[i]){ placed.splice(i,1); if (worldSel>=placed.length) worldSel=-1; return true; } return false; },
  world:  () => ({ placed: placed.map(p=>({type:p.type,x:p.x,d:p.d,scale:p.scale||1})), generated: {...genAssets} }),
  saveScene: n => saveScene(n),
  loadScene: n => loadScene(n),
  scenes:  () => atlasWorld.scenes.map(sc=>sc.name),
  scenesOf: id => scenesOf(id),
  atlas:   () => JSON.parse(JSON.stringify({ name:atlasWorld.name,
             scenes: atlasWorld.scenes.map(({thumb, ...rest})=>rest) })),
  loadAtlas: a => { if (a && Array.isArray(a.scenes)){
             atlasWorld = { name:a.name||"WORLD 01", scenes:a.scenes.map(sc=>({...sc, thumb:sc.thumb||null})) };
             atlasImgs = {}; return true; } return false; },
  composeScene: spec => instantiateGeneratedScene(spec),
  loadWorld: w => {
    if (!w) return false;
    if (w.generated) genAssets = { ...w.generated };
    if (Array.isArray(w.placed)) placed = w.placed.map(p=>({ ...p }));
    worldSel = -1;
    if (drive==="WORLD") buildWorldChips();
    return true;
  },
};

/* ───────────── [8] cam view ───────────── */
const POSE_PAIRS = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],
  [23,24],[23,25],[25,27],[24,26],[26,28],[27,31],[28,32]];
const HAND_PAIRS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],
  [9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],
  [18,19],[19,20],[0,17]];

function sampleVideo(){
  sctx.save();
  sctx.scale(-1,1);
  sctx.drawImage(video, -samp.width, 0, samp.width, samp.height);
  sctx.restore();
}

function drawCam(){
  sampleVideo();
  ctx.fillStyle = "#050805";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const img = sctx.getImageData(0,0,samp.width,samp.height).data;
  const cell = canvas.width / samp.width;
  ctx.fillStyle = "#1c3322";
  for (let y=0; y<samp.height; y++)
    for (let x=0; x<samp.width; x++){
      const i = (y*samp.width + x)*4;
      const lum = (img[i]*0.299 + img[i+1]*0.587 + img[i+2]*0.114)/255;
      if (lum < 0.06) continue;
      ctx.beginPath();
      ctx.arc((x+0.5)*cell, (y+0.5)*cell, lum*cell*0.48, 0, 6.2832);
      ctx.fill();
    }
  const face = results.face;
  if (face && face.faceLandmarks && face.faceLandmarks[0]){
    const lm = face.faceLandmarks[0];
    ctx.fillStyle = "rgba(216,240,255,0.85)";
    for (let i=0;i<lm.length;i+=2){
      const p = px(lm[i]);
      ctx.beginPath(); ctx.arc(p.x,p.y,1.1,0,6.2832); ctx.fill();
    }
  }
  const hands = results.hands;
  if (hands && hands.landmarks)
    for (const lm of hands.landmarks){
      bonesCam(lm, HAND_PAIRS, "rgba(255,179,71,0.45)");
      ctx.fillStyle = "#ffb347";
      for (let i=0;i<lm.length;i++){
        const p = px(lm[i]);
        ctx.beginPath(); ctx.arc(p.x,p.y, i%4===0?3.4:2.2, 0, 6.2832); ctx.fill();
      }
    }
  const body = results.body;
  if (body && body.landmarks && body.landmarks[0]){
    const lm = body.landmarks[0];
    bonesCam(lm, POSE_PAIRS, "rgba(77,255,106,0.4)");
    ctx.fillStyle = "#4dff6a";
    for (let i=11;i<lm.length;i++){
      const p = px(lm[i]);
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,6.2832); ctx.fill();
    }
  }
}
function bonesCam(landmarks, pairs, color){
  ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash([2,4]);
  ctx.beginPath();
  for (const [a,b] of pairs){
    if (!landmarks[a] || !landmarks[b]) continue;
    const p = px(landmarks[a]), q = px(landmarks[b]);
    ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
  }
  ctx.stroke(); ctx.setLineDash([]);
}

setInterval(()=>{ if (running && camOn && view==="STAGE" && drive==="CAPTURE") sampleVideo(); }, 100);

/* ───────────── [9] meters ───────────── */
const shapeEls = {};
document.querySelectorAll(".shape").forEach(el=>{
  shapeEls[el.dataset.key] = el.querySelectorAll(".dots i");
});
function setMeter(key, v){
  const dots = shapeEls[key];
  const lit = Math.round(clamp(v,0,1)*dots.length);
  dots.forEach((d,i)=> d.classList.toggle("lit", i<lit));
}
function updateShapes(bs){
  if (!bs){ for (const k in shapeEls) setMeter(k,0); return; }
  const g = n => { const c = bs.categories.find(c=>c.categoryName===n); return c?c.score:0; };
  setMeter("jawOpen", g("jawOpen"));
  setMeter("smile", (g("mouthSmileLeft")+g("mouthSmileRight"))/2);
  setMeter("browInnerUp", g("browInnerUp"));
  setMeter("blink", (g("eyeBlinkLeft")+g("eyeBlinkRight"))/2);
}

boot();
