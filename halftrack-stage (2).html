<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HALFTRACK — rig</title>
<style>
  :root{
    --bg:#050805; --panel:#0a0f0a; --grid:#0f1a0f;
    --green:#4dff6a; --green-dim:#1f6b2e;
    --amber:#ffb347; --white:#d8f0ff;
    --text:#8fd39a; --text-dim:#3f6b47; --err:#ff5d5d;
    --paper:#ebebe8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    overflow:hidden;user-select:none;-webkit-user-select:none}
  #app{height:100%;display:flex;flex-direction:column}

  header{display:flex;align-items:center;gap:8px;padding:8px 10px;
    background:var(--panel);border-bottom:1px solid var(--grid);flex-shrink:0}
  .wordmark{font-size:13px;letter-spacing:.22em;color:var(--green);font-weight:700}
  .wordmark .half{color:var(--text-dim)}
  header button{background:none;border:1px solid var(--green-dim);color:var(--green);
    font:inherit;font-size:10px;letter-spacing:.14em;padding:5px 8px;cursor:pointer}
  header button:active{background:var(--green-dim)}
  #fps{margin-left:auto;font-size:12px;color:var(--text-dim);
    font-variant-numeric:tabular-nums;letter-spacing:.05em}
  #fps b{color:var(--green);font-weight:700}

  #stage{position:relative;flex:1;min-height:0;display:flex;
    align-items:center;justify-content:center;background:var(--bg);touch-action:none}
  #stage.paper{background:var(--paper)}
  canvas#out{max-width:100%;max-height:100%;display:block}
  video{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
  #stage::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,
      rgba(0,0,0,.18) 0px, rgba(0,0,0,.18) 1px,
      transparent 1px, transparent 3px)}
  #stage.paper::after{background:none}
  #hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;
    font-size:10px;letter-spacing:.1em;color:var(--text-dim);pointer-events:none}
  #stage.paper #hint{color:#8a8a86}

  #gate{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;z-index:10;
    padding:14px;text-align:center;pointer-events:none}
  #gatePanel{pointer-events:auto;background:rgba(235,235,232,0.93);
    border:2px solid #141414;padding:18px 20px 14px;max-width:340px;width:100%;
    display:flex;flex-direction:column;gap:12px}
  #gatePanel .wordmark{color:#141414}
  #gatePanel .wordmark .half{color:#8a8a86}
  #gate .brief{font-size:11px;line-height:1.7;color:#55554f;margin:0}
  #gate .brief em{color:#141414;font-style:normal}
  .gbtn{background:none;border:2px solid #141414;color:#141414;
    font:inherit;font-size:12px;letter-spacing:.18em;padding:13px 10px;cursor:pointer}
  .gbtn:active{background:#141414;color:#ebebe8}
  .gbtn.alt{border-width:1px;color:#55554f;font-size:10px;padding:9px}
  #gateStatus{color:#8a5a2a}
  .shutter{display:inline-block;width:13px;height:13px;border:2px solid currentColor;
    border-radius:50%;position:relative;vertical-align:-2px;margin-right:10px}
  .shutter::after{content:'';position:absolute;inset:3px;background:currentColor;border-radius:50%}
  #gateStatus{font-size:11px;min-height:1.4em;line-height:1.6;
    letter-spacing:.05em;white-space:pre-line}
  #gateStatus.err{color:var(--err)}
  body.nocam #toggles{display:none}

  footer{flex-shrink:0;background:var(--panel);border-top:1px solid var(--grid);
    padding:8px 10px;display:flex;flex-direction:column;gap:8px}
  #toggles{display:flex;gap:8px}
  .tg{flex:1;border:1px solid var(--grid);background:none;color:var(--text-dim);
    font:inherit;font-size:11px;letter-spacing:.14em;padding:10px 4px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-variant-numeric:tabular-nums}
  .tg .lamp{width:8px;height:8px;border-radius:50%;border:1px solid currentColor;flex-shrink:0}
  .tg.on{color:var(--tgc);border-color:var(--tgc)}
  .tg.on .lamp{background:var(--tgc);box-shadow:0 0 6px var(--tgc)}
  .tg.loading .lamp{animation:pulse .7s infinite alternate}
  @keyframes pulse{from{opacity:.2}to{opacity:1}}
  .tg .ms{font-size:10px;opacity:.75}

  #shapes{display:flex;gap:12px;justify-content:space-between;
    font-size:10px;letter-spacing:.08em;color:var(--text-dim);min-height:26px}
  .shape{flex:1;display:flex;flex-direction:column;gap:4px}
  .shape .dots{display:flex;gap:3px;height:6px}
  .shape .dots i{flex:1;border-radius:50%;background:var(--grid)}
  .shape .dots i.lit{background:var(--white);box-shadow:0 0 4px var(--white)}
  .shape label{text-align:center}

  #poseBar{display:none;gap:6px;overflow-x:auto;padding-bottom:2px;
    -webkit-overflow-scrolling:touch}
  .pchip{flex-shrink:0;border:1px solid var(--grid);background:none;
    color:var(--text-dim);font:inherit;font-size:10px;letter-spacing:.08em;
    padding:7px 10px;cursor:pointer;white-space:nowrap}
  .pchip.on{color:var(--amber);border-color:var(--amber)}
  .pchip.aud{color:var(--green)}
  .pchip.aud.on{border-color:var(--green)}
  .pchip b{opacity:.6;font-weight:400}

  body.chips #shapes{display:none}
  body.chips #poseBar{display:flex}
  #castBar{display:none;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  body.started #castBar{display:flex}
  .cchip{flex-shrink:0;border:1px solid var(--grid);background:none;color:var(--text-dim);
    font:inherit;font-size:10px;letter-spacing:.1em;padding:6px 10px;cursor:pointer}
  .cchip.on{color:var(--white);border-color:var(--white)}
  #directRow{display:none;gap:6px}
  body.gamemode #directRow{display:flex}
  body.atlasmode #directRow{display:flex}
  #directIn{flex:1;background:var(--bg);border:1px solid var(--grid);color:var(--text);
    font:inherit;font-size:11px;padding:7px 8px;min-width:0}
  #directGo{border:1px solid var(--green-dim);background:none;color:var(--green);
    font:inherit;font-size:10px;letter-spacing:.14em;padding:7px 12px;cursor:pointer}

  @media (prefers-reduced-motion: reduce){
    .tg.loading .lamp{animation:none;opacity:.6}
  }

  /* ═══ OPERATOR PRAGMATIC SKIN — paper, black ink, hard-shadow buttons ═══
     Kills the terminal-green chrome and the black letterbox: the stage IS
     paper, the canvas fills its container, the buttons speak operator. */
  html,body{ background:#e9e8e2; color:#141414; }
  #app{ background:#e9e8e2; }
  header{ background:#fff; border-bottom:3px solid #141414; padding:9px 12px; }
  .wordmark{ color:#141414; } .wordmark .half{ color:#9a9a94; }
  header button, footer .tg, .pchip, .cchip, #directGo{
    background:#fff; color:#141414; border:2px solid #141414; box-shadow:2px 2px 0 #141414;
    font-weight:700; letter-spacing:.1em; border-radius:0; transition:transform .05s, box-shadow .05s; }
  header button:active, .tg:active, .pchip:active, .cchip:active, #directGo:active{
    transform:translate(2px,2px); box-shadow:0 0 0 #141414; background:#141414; color:#fff; }
  header button{ font-size:10px; padding:7px 10px; }
  #fps{ color:#9a9a94; } #fps b{ color:#141414; font-weight:700; }
  #stage{ background:#e9e8e2; }
  #stage::after{ background:none !important; }          /* no scanlines */
  #stage.paper{ background:#e9e8e2; }
  canvas#out{ width:100%; height:100%; max-width:100%; max-height:100%; }
  #hint, #stage.paper #hint{ color:#8a8a86; }
  footer{ background:#fff; border-top:3px solid #141414; }
  footer .tg{ color:#141414; }
  footer .tg.on{ color:#141414; border-color:#141414; box-shadow:2px 2px 0 #b0261a; }
  footer .tg.on .lamp{ background:#b0261a; box-shadow:none; border-color:#141414; }
  footer .tg .lamp{ border-color:#141414; }
  #shapes{ color:#55554f; } .shape .dots i{ background:#cfcec8; } .shape .dots i.lit{ background:#141414; box-shadow:none; }
  .pchip{ color:#141414; } .pchip.on{ color:#b0261a; border-color:#141414; box-shadow:2px 2px 0 #b0261a; }
  .pchip.aud, .pchip.aud.on{ color:#141414; }
  .cchip{ color:#55554f; } .cchip.on{ color:#141414; border-color:#141414; box-shadow:2px 2px 0 #b0261a; }
  #directIn{ background:#fff; border:2px solid #141414; color:#141414; box-shadow:2px 2px 0 #141414 inset; }
  #directGo{ color:#141414; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="wordmark"><span class="half">HALF</span>TRACK</span>
    <button id="viewBtn">VIEW: AVATAR</button>
    <button id="driveBtn">DRIVE: CAPTURE</button>
    <button id="styleBtn">STYLE: SHEET</button>
    <span id="fps">— fps</span>
  </header>

  <div id="stage">
    <canvas id="out"></canvas>
    <video id="cam" playsinline muted autoplay></video>
    <div id="hint"></div>

    <div id="gate">
      <div id="gatePanel">
        <span class="wordmark" style="font-size:16px"><span class="half">HALF</span>TRACK</span>
        <p class="brief">a cast · scenes · worlds.<br>
          drive them with your <em>camera</em>, with <em>chips and keys</em>,
          or hand the whole stage to a <em>script or an AI director</em>.</p>
        <button class="gbtn" id="startBtn"><span class="shutter"></span>OPEN CAMERA</button>
        <button class="gbtn alt" id="startNoCam">ENTER WITHOUT CAMERA</button>
        <div id="gateStatus"></div>
      </div>
    </div>
  </div>

  <footer>
    <div id="toggles">
      <button class="tg" id="tgBody"  style="--tgc:var(--green)"><span class="lamp"></span>BODY<span class="ms"></span></button>
      <button class="tg" id="tgHands" style="--tgc:var(--amber)"><span class="lamp"></span>HANDS<span class="ms"></span></button>
      <button class="tg" id="tgFace"  style="--tgc:var(--white)"><span class="lamp"></span>FACE<span class="ms"></span></button>
    </div>
    <div id="castBar"></div>
    <div id="poseBar"></div>
    <div id="directRow">
      <input id="directIn" placeholder="direct a beat, e.g. BOSS scolds HERO, HERO shrugs it off" />
      <button id="directGo">DIRECT</button>
    </div>
    <div id="shapes">
      <div class="shape" data-key="jawOpen"><div class="dots"></div><label>jaw</label></div>
      <div class="shape" data-key="smile"><div class="dots"></div><label>smile</label></div>
      <div class="shape" data-key="browInnerUp"><div class="dots"></div><label>brow</label></div>
      <div class="shape" data-key="blink"><div class="dots"></div><label>blink</label></div>
    </div>
  </footer>
</div>

<script type="module">
import { FilesetResolver, PoseLandmarker, HandLandmarker, FaceLandmarker }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

/* ════════════════════════════════════════════════════════════════
   HALFTRACK RIG v5
   Sections: [1] app shell  [2] signals  [3] drives (capture /
   puppet / game)  [4] rig config + parts  [5] compositor
   [6] hands (one parametric drawer for capture AND puppet)
   [7] heads (facing bands: front / three-quarter / profile / back)
   [8] cam view  [9] meters
   Upgrade seams: PROPORTIONS + TONES for look; POSES for vocabulary;
   HEADS / drawParamHand / torso() for parts; DRIVES for new inputs.
   ════════════════════════════════════════════════════════════════ */

const MODELS = {
  body : "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
  hands: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
  face : "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
};

/* ───────────── [1] app shell ───────────── */
const $ = id => document.getElementById(id);
const video = $("cam"), canvas = $("out");
let ctx = canvas.getContext("2d");
const mainCtx = ctx;
let buf = null, bufCtx = null;               // offscreen field for post styles

/* STYLES — the selectable aesthetic set. Each entry decides:
   outline (ink lines or none), tones (which tone set), post
   (null = draw direct; else render the figure to a field and
   halftone it: cell size, background treatment, dot gain).
   CAM view is the "REAL" analog of this family. */
const STYLES = {
  SHEET:  { outline:true,  tones:"sheet", post:null },
  NOLINE: { outline:false, tones:"clean", post:null },
  GRID:   { outline:true,  tones:"post",  post:{ cell:8, bg:"dots",  gain:1.0 } },
  MESH:   { outline:true,  tones:"post",  post:{ cell:5, bg:"lines", gain:1.05 } },
};
const STYLE_ORDER = Object.keys(STYLES);
let styleName = "MESH", STYLE = STYLES.MESH;   // boot in MESH — the shared true look
function applyStyle(){
  STYLE = STYLES[styleName];
  $("styleBtn").textContent = "STYLE: " + styleName;
  if (TONESETS) TONES = TONESETS[STYLE.tones];
}

const gate = $("gate"), gateStatus = $("gateStatus");
const fpsEl = $("fps"), hint = $("hint"), stage = $("stage");

document.querySelectorAll(".shape .dots").forEach(d=>{
  for(let i=0;i<8;i++) d.appendChild(document.createElement("i"));
});

const mods = {
  body : { btn:$("tgBody"),  on:true, model:null, ms:0 },
  hands: { btn:$("tgHands"), on:true, model:null, ms:0 },
  face : { btn:$("tgFace"),  on:true, model:null, ms:0 },
};
for (const k in mods){
  mods[k].btn.addEventListener("click", ()=>{
    mods[k].on = !mods[k].on;
    mods[k].btn.classList.toggle("on", mods[k].on);
  });
}

const DRIVES = ["CAPTURE","PUPPET","GAME","WORLD","MAKE","DRAW"];
let view = "STAGE";
let camOn = false;
let gateOn = true;
let drive = "CAPTURE";
const HINTS = {
  CAPTURE:"tap to recenter · camera drives the selected character",
  PUPPET:"tap a character to select · tap ground for next pose · keys 1-9",
  GAME:"drag to move · tap a character to select · WASD works",
  WORLD:"tap an asset chip, then tap the ground to place · drag to move",
  MAKE:"tap a character, then tap trait chips to rebuild them",
  DRAW:"draw on a character — marks stick to head or torso",
};
function applyView(){
  $("viewBtn").textContent = "VIEW: " + view;
  stage.classList.toggle("paper", view!=="CAM");
  document.body.classList.toggle("atlasmode", view==="ATLAS");
}
function applyDrive(){
  $("driveBtn").textContent = "DRIVE: " + drive;
  document.body.classList.toggle("chips", drive!=="CAPTURE");
  document.body.classList.toggle("gamemode", drive==="GAME" || drive==="WORLD");
  $("directIn").placeholder =
    view==="ATLAS" ? "generate a scene, e.g. two friends argue outside a house at dusk"
    : drive==="WORLD" ? "generate an asset, e.g. streetlamp, fountain, robot dog"
    : "direct a beat, e.g. BOSS scolds HERO, HERO shrugs it off";
  hint.textContent = HINTS[drive];
  if (drive==="MAKE") buildMakeChips();
  else if (drive==="DRAW") buildDrawChips();
  else if (drive==="WORLD") buildWorldChips();
  else buildPoseChips(drive==="GAME");
}
$("viewBtn").addEventListener("click", ()=>{
  const cycle = camOn ? ["STAGE","ATLAS","CAM"] : ["STAGE","ATLAS"];
  view = cycle[(cycle.indexOf(view)+1) % cycle.length];
  applyView();
});
$("driveBtn").addEventListener("click", ()=>{
  let i = DRIVES.indexOf(drive);
  do { i = (i+1) % DRIVES.length; } while (DRIVES[i]==="CAPTURE" && !camOn);
  drive = DRIVES[i]; applyDrive();
});
$("styleBtn").addEventListener("click", ()=>{
  styleName = STYLE_ORDER[(STYLE_ORDER.indexOf(styleName)+1)%STYLE_ORDER.length];
  applyStyle();
});

let fileset = null, running = false, lastVideoTime = -1;
let results = { body:null, hands:null, face:null };
let fpsEMA = 0, lastFrame = performance.now();

const samp = document.createElement("canvas");
const sctx = samp.getContext("2d", { willReadFrequently:true });
const GRID_W = 96;

function say(msg, err=false){
  gateStatus.textContent = msg;
  gateStatus.classList.toggle("err", err);
}

async function loadModule(key){
  const m = mods[key];
  m.btn.classList.add("loading");
  const mk = async delegate => {
    const common = { baseOptions:{ modelAssetPath:MODELS[key], delegate }, runningMode:"VIDEO" };
    if (key==="body")  return PoseLandmarker.createFromOptions(fileset, { ...common, numPoses:1 });
    if (key==="hands") return HandLandmarker.createFromOptions(fileset, { ...common, numHands:2 });
    return FaceLandmarker.createFromOptions(fileset, { ...common, numFaces:1, outputFaceBlendshapes:true });
  };
  try{ m.model = await mk("GPU"); } catch(e){ m.model = await mk("CPU"); }
  m.btn.classList.remove("loading");
  m.btn.classList.add("on");
}

$("startBtn").addEventListener("click", startCamera);
$("startNoCam").addEventListener("click", enterNoCam);

function resizeStage(w, h){
  canvas.width = w; canvas.height = h;
  buf.width = w; buf.height = h;
  for (const C of characters) rebuildChar(C);
}
function fitStage(){
  // fill the stage container so there are no letterbox bars and the cast
  // spreads across the full width; figure metrics scale to canvas height.
  const st = $("stage");
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const w = Math.max(320, st.clientWidth), h = Math.max(240, st.clientHeight);
  canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
  if (buf){ buf.width = canvas.width; buf.height = canvas.height; }
  for (const C of characters) rebuildChar(C);
}
function boot(){
  fitStage();
  samp.width = GRID_W;
  samp.height = Math.round(GRID_W * 640/480);
  initRig();
  applyStyle();
  buildCastChips();
  applyView();
  running = true;
  let rt = null;
  const ro = new ResizeObserver(()=>{ clearTimeout(rt); rt = setTimeout(fitStage, 80); });
  ro.observe($("stage"));
  addEventListener("resize", ()=>{ clearTimeout(rt); rt = setTimeout(fitStage, 80); });
  requestAnimationFrame(loop);
}
function closeGate(){
  gate.style.display = "none";
  gateOn = false;
  document.body.classList.add("started");
  saveScene("opening");
  pendingThumb = "opening";
}
function enterNoCam(){
  camOn = false;
  document.body.classList.add("nocam");
  for (const k in mods){ mods[k].on = false; mods[k].btn.classList.remove("on"); }
  drive = "PUPPET";
  closeGate();
  applyView(); applyDrive();
}
async function startCamera(){
  $("startBtn").style.display = "none";
  try{
    say("requesting camera…");
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user", width:{ideal:640}, height:{ideal:480} }, audio:false });
    video.srcObject = stream;
    await new Promise(res => video.onloadedmetadata = res);
    await video.play();

    resizeStage(video.videoWidth, video.videoHeight);
    samp.width = GRID_W;
    samp.height = Math.round(GRID_W * video.videoHeight / video.videoWidth);

    say("loading wasm runtime…");
    fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");

    say("loading models —\nbody · hands · face");
    await Promise.all(["body","hands","face"].map(loadModule));

    camOn = true;
    drive = "CAPTURE";
    closeGate();
    applyView(); applyDrive();
  } catch(e){
    $("startBtn").style.display = "";
    say("could not start: " + (e.message||e) + "\ncheck camera permission, or enter without it", true);
  }
}

function loop(){
  if (!running) return;
  const now = performance.now();

  if (camOn && video.currentTime !== lastVideoTime){
    lastVideoTime = video.currentTime;
    for (const k of ["body","hands","face"]){
      const m = mods[k];
      if (m.on && m.model){
        const t0 = performance.now();
        try{ results[k] = m.model.detectForVideo(video, now); }
        catch(e){ results[k] = null; }
        m.ms = m.ms*0.8 + (performance.now()-t0)*0.2;
      } else results[k] = null;
    }
    if (drive === "CAPTURE" && selected){ bind(selected); readSignals(); unbind(selected); }
  }
  for (const C of characters){
    bind(C);
    const isSel = C === selected;
    if (!(drive === "CAPTURE" && isSel)) applyPose(now);
    stepGame(now, isSel);            // target-seek runs for everyone (scenes walk the cast)
    stepFacing();
    unbind(C);
  }
  sceneTick(now);
  if (gateOn && now - lastOnboard > 2600){
    lastOnboard = now;
    const C = characters[Math.floor(Math.random()*characters.length)];
    if (C) C.pose = ONBOARD_POSES[Math.floor(Math.random()*ONBOARD_POSES.length)];
  }

  if (view === "ATLAS") drawAtlas(now);
  else if (view === "STAGE"){
    drawAvatar(now);
    if (pendingThumb){
      const sc = atlasWorld.scenes.find(x=>x.name===pendingThumb);
      if (sc) captureThumb(sc);
      pendingThumb = null;
    }
  }
  else drawCam();

  const dt = now - lastFrame; lastFrame = now;
  fpsEMA = fpsEMA ? fpsEMA*0.9 + (1000/dt)*0.1 : 1000/dt;
  fpsEl.innerHTML = `<b>${fpsEMA.toFixed(0)}</b> fps`;
  for (const k in mods)
    mods[k].btn.querySelector(".ms").textContent =
      mods[k].on && mods[k].model ? mods[k].ms.toFixed(0)+"ms" : "";

  requestAnimationFrame(loop);
}

/* ───────────── [2] signals ───────────── */
const px = l => ({ x:(1 - l.x)*canvas.width, y:l.y*canvas.height });
const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const clamp = (v,lo,hi) => Math.min(hi, Math.max(lo, v));
const lerp = (a,b,t) => a + (b-a)*t;
const dead = (v,d) => Math.sign(v) * Math.max(0, Math.abs(v)-d);
const norm = v => { const n = Math.hypot(v.x,v.y)||1; return { x:v.x/n, y:v.y/n }; };

function mkSignals(){ return {
  faceSeen:false, poseSeen:false,
  yaw:0, pitch:0, roll:0, headX:0, headY:0,
  jaw:0, smile:0, frown:0, pucker:0, press:0,
  browUp:0, browKnit:0,
  blinkL:0, blinkR:0, squint:0, wide:0,
  gazeX:0, gazeY:0,
  tilt:0, bodyX:0,
}; }
let S = mkSignals();
let F = 0, Ftgt = 0;                 // facing: 0 front, ±1 profile, ±1.6 back
let CC = null;                       // currently bound character
let SWEATER = null;                  // bound character's sweater tone
let SKINT = null;                    // bound character's skin tone
let neutral = null;                  // camera calibration — global, not per character
let capShoulders = null;
let capArms = { L:null, R:null };
let capLegs = { L:null, R:null };
let capHips = null;
let capHands = [];

function ema(key, target, a=0.42){ S[key] = lerp(S[key], target, a); }

function readSignals(){
  const f = results.face;
  if (f && f.faceLandmarks && f.faceLandmarks[0]){
    const lm = f.faceLandmarks[0];
    const pL = px(lm[33]), pR = px(lm[263]);
    const eyeMid = { x:(pL.x+pR.x)/2, y:(pL.y+pR.y)/2 };
    const iod = Math.max(1, dist(pL, pR));
    const nose = px(lm[1]);

    const rollRaw  = Math.atan2(pR.y - pL.y, pR.x - pL.x);
    const yawRaw   = (nose.x - eyeMid.x) / iod;
    const pitchRaw = (nose.y - eyeMid.y) / iod;
    const hx = (eyeMid.x / canvas.width  - 0.5) * 2;
    const hy = (eyeMid.y / canvas.height - 0.5) * 2;

    if (!neutral) neutral = { yaw:yawRaw, pitch:pitchRaw, roll:rollRaw, headX:hx, headY:hy };

    ema("yaw",   clamp(dead(yawRaw   - neutral.yaw,   0.02) * 3.4, -1, 1));
    ema("pitch", clamp(dead(pitchRaw - neutral.pitch, 0.02) * 3.2, -1, 1));
    ema("roll",  clamp(dead(rollRaw  - neutral.roll,  0.06) * 0.6, -0.35, 0.35), 0.3);
    ema("headX", clamp((hx - neutral.headX) * 1.4, -1, 1));
    ema("headY", clamp((hy - neutral.headY) * 1.4, -1, 1));
    Ftgt = clamp(S.yaw * 1.35, -1.15, 1.15);   // hard head-turn reaches profile

    const bs = f.faceBlendshapes && f.faceBlendshapes[0];
    if (bs){
      const g = n => { const c = bs.categories.find(c=>c.categoryName===n); return c?c.score:0; };
      ema("jaw",    g("jawOpen"));
      ema("smile", (g("mouthSmileLeft")+g("mouthSmileRight"))/2);
      ema("frown", (g("mouthFrownLeft")+g("mouthFrownRight"))/2);
      ema("pucker", Math.max(g("mouthPucker"), g("mouthFunnel")));
      ema("press", (g("mouthPressLeft")+g("mouthPressRight"))/2);
      ema("browUp",  g("browInnerUp"));
      ema("browKnit",(g("browDownLeft")+g("browDownRight"))/2);
      ema("blinkL",  g("eyeBlinkLeft"),  0.6);
      ema("blinkR",  g("eyeBlinkRight"), 0.6);
      ema("squint", (g("eyeSquintLeft")+g("eyeSquintRight"))/2);
      ema("wide",   (g("eyeWideLeft")+g("eyeWideRight"))/2);
      ema("gazeX", clamp((g("eyeLookOutRight")+g("eyeLookInLeft")
                        - g("eyeLookOutLeft") - g("eyeLookInRight"))/2, -1, 1));
      ema("gazeY", clamp((g("eyeLookDownLeft")+g("eyeLookDownRight")
                        - g("eyeLookUpLeft")  - g("eyeLookUpRight"))/2, -1, 1));
      updateShapes(bs);
    }
    S.faceSeen = true;
  } else { S.faceSeen = false; updateShapes(null); }

  const b = results.body;
  capArms = { L:null, R:null };
  capLegs = { L:null, R:null };
  capHips = null;
  if (b && b.landmarks && b.landmarks[0]){
    const lm = b.landmarks[0];
    const vis = i => (lm[i].visibility ?? 1);
    if (vis(11) > 0.4 && vis(12) > 0.4){
      const sA = px(lm[11]), sB = px(lm[12]);
      const left  = sA.x < sB.x ? {s:sA, e:13, w:15} : {s:sB, e:14, w:16};
      const right = sA.x < sB.x ? {s:sB, e:14, w:16} : {s:sA, e:13, w:15};
      capShoulders = { L:left.s, R:right.s, w:Math.max(20, dist(left.s, right.s)) };
      const mid = (left.s.x + right.s.x)/2;
      ema("bodyX", clamp((mid/canvas.width - 0.5)*2, -1, 1), 0.3);
      ema("tilt",  clamp(Math.atan2(right.s.y-left.s.y, right.s.x-left.s.x), -0.5, 0.5), 0.3);
      for (const [slot, side] of [["L",left],["R",right]]){
        capArms[slot] = {
          sh: side.s,
          el: px(lm[side.e]), elVis: vis(side.e) > 0.5,
          wr: px(lm[side.w]), wrVis: vis(side.w) > 0.5,
        };
      }
      S.poseSeen = true;
    } else S.poseSeen = false;

    if (vis(23) > 0.4 && vis(24) > 0.4){
      const hA = px(lm[23]), hB = px(lm[24]);
      const left  = hA.x < hB.x ? {h:hA, k:25, a:27} : {h:hB, k:26, a:28};
      const right = hA.x < hB.x ? {h:hB, k:26, a:28} : {h:hA, k:25, a:27};
      capHips = { L:left.h, R:right.h, w:Math.max(16, dist(left.h,right.h)) };
      for (const [slot, side] of [["L",left],["R",right]]){
        capLegs[slot] = {
          hip: side.h,
          k: px(lm[side.k]), kVis: vis(side.k) > 0.5,
          a: px(lm[side.a]), aVis: vis(side.a) > 0.5,
        };
      }
    }
  } else S.poseSeen = false;

  const h = results.hands;
  capHands = (h && h.landmarks) ? h.landmarks : [];
}

function stepFacing(){ F = lerp(F, Ftgt, 0.16); }
